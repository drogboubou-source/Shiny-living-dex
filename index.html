<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shiny Living Dex</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#101218">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Pixelify+Sans:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">✦</div>
        <div>
          <h1>Shiny Living Dex</h1>
          <p>Collection personnelle</p>
        </div>
      </div>

      <nav class="region-list" id="regionList" aria-label="Régions"></nav>

      <div class="sidebar-card">
        <span class="sidebar-label">Sauvegarde</span>
        <div class="sidebar-actions">
          <button class="icon-btn" id="importButton" type="button" title="Importer">
            <span aria-hidden="true">↥</span>
            <span>Importer</span>
          </button>
          <button class="icon-btn" id="exportButton" type="button" title="Exporter">
            <span aria-hidden="true">↧</span>
            <span>Exporter</span>
          </button>
        </div>
        <input id="importFile" type="file" accept="application/json,.json" hidden>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="menu-btn" id="menuButton" type="button" aria-label="Afficher les régions">☰</button>
        <div class="search-wrap">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="Rechercher un Pokémon, un numéro, une région...">
        </div>
        <div class="top-actions" role="group" aria-label="Vues">
          <button class="view-btn active" type="button" data-view="dex">Dex</button>
          <button class="view-btn" type="button" data-view="stats">Stats</button>
        </div>
      </header>

      <section class="hero-panel">
        <div>
          <p class="eyebrow" id="currentScope">Tous les Pokémon</p>
          <h2 id="heroTitle">Ton Shiny Dex, sans friction.</h2>
        </div>
        <div class="hero-progress" aria-label="Progression globale">
          <strong id="globalPercent">0%</strong>
          <span id="globalCount">0 / 1025 capturés</span>
          <div class="meter"><i id="globalBar"></i></div>
        </div>
      </section>

      <section class="stats-row" id="summaryStats" aria-label="Résumé"></section>

      <section class="toolbar" id="dexToolbar">
        <div class="segmented" id="statusFilters" role="group" aria-label="Filtrer par statut">
          <button class="active" type="button" data-filter="all">Tous</button>
          <button type="button" data-filter="caught">Capturés</button>
          <button type="button" data-filter="missing">Manquants</button>
          <button type="button" data-filter="perfect">Parfaits</button>
        </div>
        <label class="select-label">
          Tri
          <select id="sortSelect">
            <option value="number">Numéro</option>
            <option value="name">Nom</option>
            <option value="recent">Récents</option>
            <option value="encounters">Rencontres</option>
          </select>
        </label>
      </section>

      <section class="content-view active" id="dexView">
        <div class="grid" id="pokemonGrid"></div>
      </section>

      <section class="content-view" id="statsView">
        <div class="stats-layout">
          <div class="panel">
            <h3>Progression par région</h3>
            <div id="regionStats"></div>
          </div>
          <div class="panel">
            <h3>Qualité de chasse</h3>
            <div id="huntStats"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="detail-drawer" id="detailDrawer" aria-hidden="true">
    <button class="drawer-close" id="drawerClose" type="button" aria-label="Fermer">×</button>
    <div id="detailContent"></div>
  </aside>

  <script src="data/pokemon-data.js"></script>
  <script src="src/storage.js"></script>
  <script src="src/stats.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
