<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiny Living Dex</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#111827">
</head>
<body>

<header>
    <h1>✨ Shiny Living Dex</h1>
    <p>Collectionnez et suivez tous les Pokémon shiny</p>
</header>

<nav>
    <button id="pokedexTab" class="active">Pokédex</button>
    <button id="statsTab">Statistiques</button>
</nav>

<main>
    <section id="pokedex">
        <h2>Pokédex</h2>
        <p>Le contenu arrivera ici.</p>
    </section>

    <section id="stats" style="display:none;">
        <h2>📊 Statistiques</h2>
        <p>0 Pokémon shiny obtenus</p>
        <div class="progress-bar">
            <div class="progress" style="width: 0%;"></div>
        </div>
    </section>
</main>

<script src="app.js"></script>
</body>
</html>
