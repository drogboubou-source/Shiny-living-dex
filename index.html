<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shiny Living Dex</title>
  <meta name="theme-color" content="#101218">
  
  <style>
:root {
  --bg: #101218;
  --bg-soft: #151922;
  --surface: #1b202b;
  --surface-2: #222938;
  --surface-3: #2a3344;
  --line: rgba(255,255,255,.09);
  --text: #f4f6fb;
  --muted: #9aa4b6;
  --soft: #c8cfdb;
  --gold: #f4c84a;
  --mint: #5ee0a0;
  --rose: #f06b8d;
  --blue: #66a3ff;
  --violet: #b890ff;
  --danger: #ff6b6b;
  --shadow: 0 20px 60px rgba(0,0,0,.34);
  --radius: 8px;
  --font: "DM Sans", system-ui, sans-serif;
  --font-display: "Pixelify Sans", var(--font);
}

* {
  box-sizing: border-box;
}

html {
  color-scheme: dark;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(135deg, rgba(244,200,74,.12), transparent 26%),
    linear-gradient(315deg, rgba(94,224,160,.10), transparent 30%),
    var(--bg);
  color: var(--text);
  font-family: var(--font);
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  color: inherit;
}

img {
  max-width: 100%;
}

.app-shell {
  display: grid;
  grid-template-columns: 278px minmax(0, 1fr);
  min-height: 100vh;
}

.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  padding: 22px 16px;
  border-right: 1px solid var(--line);
  background: rgba(16,18,24,.86);
  backdrop-filter: blur(18px);
  overflow: auto;
}

.brand {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 22px;
}

.brand-mark {
  display: grid;
  width: 42px;
  height: 42px;
  place-items: center;
  border: 1px solid rgba(244,200,74,.5);
  border-radius: 8px;
  background: rgba(244,200,74,.13);
  color: var(--gold);
  font-size: 24px;
}

.brand h1 {
  margin: 0;
  font: 700 25px/1 var(--font-display);
  letter-spacing: .01em;
}

.brand p,
.sidebar-label {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
}

.region-list {
  display: grid;
  gap: 6px;
}

.region-btn {
  display: grid;
  grid-template-columns: 8px 1fr auto;
  gap: 10px;
  align-items: center;
  width: 100%;
  padding: 10px;
  border: 1px solid transparent;
  border-radius: var(--radius);
  background: transparent;
  color: var(--soft);
  cursor: pointer;
  text-align: left;
}

.region-btn:hover,
.region-btn.active {
  border-color: var(--line);
  background: var(--surface);
}

.region-dot {
  width: 8px;
  height: 28px;
  border-radius: 20px;
  background: var(--region-color);
}

.region-name {
  font-weight: 800;
}

.region-meta {
  color: var(--muted);
  font-size: 12px;
}

.sidebar-card {
  margin-top: 18px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
}

.sidebar-actions {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}

.icon-btn,
.view-btn,
.segmented button,
.menu-btn {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface-2);
  cursor: pointer;
}

.icon-btn {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 9px 10px;
  font-weight: 800;
}

.main {
  min-width: 0;
  padding: 18px 22px 36px;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: grid;
  grid-template-columns: auto minmax(180px, 1fr) auto;
  gap: 12px;
  align-items: center;
  padding: 10px 0 16px;
  background: linear-gradient(to bottom, var(--bg) 70%, rgba(16,18,24,0));
}

.menu-btn {
  display: none;
  width: 42px;
  height: 42px;
}

.search-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 44px;
  padding: 0 13px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
}

.search-wrap input {
  width: 100%;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--text);
}

.top-actions,
.segmented {
  display: flex;
  gap: 6px;
  padding: 4px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
}

.view-btn,
.segmented button {
  padding: 8px 12px;
  color: var(--muted);
  font-weight: 800;
}

.view-btn.active,
.segmented button.active {
  background: var(--gold);
  color: #17150d;
}

.hero-panel {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 260px;
  gap: 20px;
  align-items: end;
  margin-bottom: 16px;
  padding: 22px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: linear-gradient(135deg, rgba(244,200,74,.12), rgba(94,224,160,.08)), var(--surface);
  box-shadow: var(--shadow);
}

.eyebrow {
  margin: 0 0 6px;
  color: var(--gold);
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
}

.hero-panel h2 {
  margin: 0;
  font-size: clamp(28px, 4vw, 48px);
  line-height: 1;
  letter-spacing: 0;
}

.hero-progress strong {
  display: block;
  font-size: 42px;
  line-height: 1;
}

.hero-progress span {
  color: var(--muted);
  font-weight: 700;
}

.meter {
  height: 8px;
  margin-top: 12px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(255,255,255,.1);
}

.meter i {
  display: block;
  width: 0;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--gold), var(--mint));
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}

.stat-card,
.panel {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
}

.stat-card {
  padding: 14px;
}

.stat-card span {
  display: block;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
}

.stat-card strong {
  display: block;
  margin-top: 6px;
  font-size: 24px;
}

.toolbar {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
  margin-bottom: 14px;
}

.select-label {
  display: flex;
  gap: 8px;
  align-items: center;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
}

.select-label select {
  height: 40px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
}

.content-view {
  display: none;
}

.content-view.active {
  display: block;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
  gap: 10px;
}

.pokemon-card {
  position: relative;
  min-height: 172px;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  cursor: pointer;
  overflow: hidden;
  text-align: left;
}

.pokemon-card:hover {
  border-color: rgba(244,200,74,.45);
  transform: translateY(-2px);
}

.pokemon-card.caught {
  background: linear-gradient(180deg, rgba(244,200,74,.12), rgba(27,32,43,.98));
}

.pokemon-card.perfect {
  border-color: rgba(184,144,255,.75);
}

.pokemon-card img {
  display: block;
  width: 78px;
  height: 78px;
  margin: 0 auto 8px;
  image-rendering: pixelated;
}

.pokemon-number {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.pokemon-name {
  margin-top: 2px;
  min-height: 36px;
  font-weight: 900;
  line-height: 1.1;
}

.badge-line {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.badge {
  padding: 3px 7px;
  border-radius: 999px;
  background: var(--surface-2);
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}

.badge.caught {
  background: rgba(244,200,74,.16);
  color: var(--gold);
}

.badge.perfect {
  background: rgba(184,144,255,.15);
  color: var(--violet);
}

.stats-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.3fr) minmax(280px, .7fr);
  gap: 14px;
}

.panel {
  padding: 18px;
}

.panel h3 {
  margin: 0 0 14px;
  font-size: 18px;
}

.region-stat {
  display: grid;
  grid-template-columns: 96px 1fr 62px;
  gap: 12px;
  align-items: center;
  padding: 9px 0;
  border-top: 1px solid var(--line);
}

.region-stat:first-child {
  border-top: 0;
}

.hunt-list {
  display: grid;
  gap: 10px;
}

.hunt-item {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  padding: 11px 0;
  border-top: 1px solid var(--line);
}

.drawer-backdrop {
  position: fixed;
  inset: 0;
  display: none;
  background: rgba(0,0,0,.5);
  z-index: 40;
}

.drawer-backdrop.open {
  display: block;
}

.detail-drawer {
  position: fixed;
  top: 0;
  right: 0;
  z-index: 50;
  width: min(460px, 100vw);
  height: 100vh;
  padding: 22px;
  border-left: 1px solid var(--line);
  background: #151922;
  box-shadow: var(--shadow);
  transform: translateX(102%);
  transition: transform .2s ease;
  overflow: auto;
}

.detail-drawer.open {
  transform: translateX(0);
}

.drawer-close {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 34px;
  height: 34px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface-2);
  cursor: pointer;
}

.detail-hero {
  display: grid;
  grid-template-columns: 96px 1fr;
  gap: 16px;
  align-items: center;
  margin: 18px 0 18px;
}

.detail-hero img {
  width: 96px;
  height: 96px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  image-rendering: pixelated;
}

.detail-hero h2 {
  margin: 4px 0;
  font-size: 30px;
  line-height: 1;
}

.form-grid {
  display: grid;
  gap: 12px;
}

.check-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  font-weight: 800;
}

.field {
  display: grid;
  gap: 6px;
}

.field span {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
}

.field input,
.field textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  padding: 10px;
}

.field textarea {
  min-height: 84px;
  resize: vertical;
}

.primary-action {
  width: 100%;
  margin-top: 14px;
  padding: 12px;
  border: 0;
  border-radius: var(--radius);
  background: var(--gold);
  color: #17150d;
  cursor: pointer;
  font-weight: 900;
}

.empty-state {
  grid-column: 1 / -1;
  padding: 60px 20px;
  border: 1px dashed var(--line);
  border-radius: var(--radius);
  color: var(--muted);
  text-align: center;
}

@media (max-width: 920px) {
  .app-shell {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: fixed;
    z-index: 60;
    width: 278px;
    transform: translateX(-102%);
    transition: transform .2s ease;
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .menu-btn {
    display: block;
  }

  .hero-panel,
  .stats-layout {
    grid-template-columns: 1fr;
  }

  .stats-row {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 620px) {
  .main {
    padding: 12px;
  }

  .topbar {
    grid-template-columns: auto 1fr;
  }

  .top-actions {
    grid-column: 1 / -1;
  }

  .hero-panel {
    padding: 16px;
  }

  .toolbar,
  .segmented {
    align-items: stretch;
    flex-direction: column;
  }

  .stats-row {
    grid-template-columns: 1fr;
  }

  .grid {
    grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
  }
}

</style>

(function () {
  const KEY = "shiny_living_dex_refonte_v3";

  function normalizeEntry(entry) {
    return {
      caught: Boolean(entry && entry.caught),
      perfect: Boolean(entry && entry.perfect),
      nickname: entry && entry.nickname ? String(entry.nickname) : "",
      eggs: Number(entry && entry.eggs) || 0,
      encounters: Number(entry && entry.encounters) || 0,
      captureDate: entry && entry.captureDate ? String(entry.captureDate) : "",
      videoUrl: entry && entry.videoUrl ? String(entry.videoUrl) : "",
      notes: entry && entry.notes ? String(entry.notes) : "",
      updatedAt: entry && entry.updatedAt ? String(entry.updatedAt) : ""
    };
  }

  function fromLegacyRow(row) {
    const caught = Boolean(row && (row["Date de capture"] || row["Nombre de rencontres"] || row["Surnoms"] || row["Lien YouTube"] || row["Contexte de capture"]));
    const perfectRaw = String(row && row["Parfait"] || "").toLowerCase();
    return normalizeEntry({
      caught,
      perfect: perfectRaw === "true" || perfectRaw === "oui" || perfectRaw === "1",
      nickname: row && row["Surnoms"],
      eggs: row && row["Oeufs parent parfait"],
      encounters: row && row["Nombre de rencontres"],
      captureDate: row && row["Date de capture"],
      videoUrl: row && row["Lien YouTube"],
      notes: row && row["Contexte de capture"]
    });
  }

  function loadCollection(pokemon) {
    const stored = localStorage.getItem(KEY);
    const parsed = stored ? JSON.parse(stored) : {};
    const collection = {};
    pokemon.forEach((p) => {
      collection[p.id] = normalizeEntry(parsed[p.id]);
    });
    return collection;
  }

  function saveCollection(collection) {
    localStorage.setItem(KEY, JSON.stringify(collection));
  }

  function exportCollection(collection, pokemon) {
    return pokemon.map((p) => {
      const entry = normalizeEntry(collection[p.id]);
      return {
        "NÂ° pokÃ©dex": p.id,
        "Noms": p.name,
        "Surnoms": entry.nickname,
        "Oeufs parent parfait": entry.eggs || "",
        "Nombre de rencontres": entry.encounters || "",
        "Date de capture": entry.captureDate,
        "Lien YouTube": entry.videoUrl,
        "Contexte de capture": entry.notes,
        "IV parfaits": "",
        "Parfait": entry.perfect ? "Oui" : ""
      };
    });
  }

  function importCollection(raw, pokemon) {
    const parsed = JSON.parse(raw);
    const next = {};
    if (Array.isArray(parsed)) {
      parsed.forEach((row) => {
        const id = Number(row["NÂ° pokÃ©dex"] || row.id);
        if (id) next[id] = fromLegacyRow(row);
      });
    } else {
      Object.keys(parsed).forEach((id) => {
        next[id] = normalizeEntry(parsed[id]);
      });
    }
    const collection = {};
    pokemon.forEach((p) => {
      collection[p.id] = normalizeEntry(next[p.id]);
    });
    saveCollection(collection);
    return collection;
  }

  window.DexStorage = {
    loadCollection,
    saveCollection,
    exportCollection,
    importCollection,
    normalizeEntry
  };
})();

(function () {
  function compute(pokemon, collection, regions) {
    const total = pokemon.length;
    const caught = pokemon.filter((p) => collection[p.id].caught).length;
    const perfect = pokemon.filter((p) => collection[p.id].perfect).length;
    const encounters = pokemon.reduce((sum, p) => sum + Number(collection[p.id].encounters || 0), 0);
    const eggs = pokemon.reduce((sum, p) => sum + Number(collection[p.id].eggs || 0), 0);
    const regionStats = regions.map((region) => {
      const list = pokemon.filter((p) => p.region === region.name);
      const regionCaught = list.filter((p) => collection[p.id].caught).length;
      return {
        ...region,
        total: list.length,
        caught: regionCaught,
        perfect: list.filter((p) => collection[p.id].perfect).length,
        percent: list.length ? Math.round((regionCaught / list.length) * 1000) / 10 : 0
      };
    });
    return {
      total,
      caught,
      missing: total - caught,
      perfect,
      encounters,
      eggs,
      percent: total ? Math.round((caught / total) * 1000) / 10 : 0,
      regionStats
    };
  }

  window.DexStats = { compute };
})();

    const scope = activeRegion === "all" ? "Tous les PokÃ©mon" : activeRegion;
    el.currentScope.textContent = `${scope} Â· ${visible.length} affichÃ©s`;
    el.heroTitle.textContent = activeView === "stats" ? "Vue d'ensemble de ta chasse." : "Ton Shiny Dex, sans friction.";
    if (!visible.length) {
      el.grid.innerHTML = `<div class="empty-state">Aucun PokÃ©mon ne correspond aux filtres actuels.</div>`;
      return;
    }
    el.grid.innerHTML = visible.map((p) => {
      const entry = collection[p.id];
      return `
        <button class="pokemon-card${entry.caught ? " caught" : ""}${entry.perfect ? " perfect" : ""}" type="button" data-id="${p.id}">
          <img src="${entry.caught ? p.shinySprite : p.sprite}" alt="">
          <div class="pokemon-number">${number(p.id)}</div>
          <div class="pokemon-name">${p.name}</div>
          <div class="badge-line">
            <span class="badge">${p.region}</span>
            ${entry.caught ? `<span class="badge caught">Shiny</span>` : `<span class="badge">Ã€ chasser</span>`}
            ${entry.perfect ? `<span class="badge perfect">Parfait</span>` : ""}
          </div>
        </button>`;
    }).join("");
  }

  function renderStatsPanels(stats) {
    el.regionStats.innerHTML = stats.regionStats.map((region) => `
      <div class="region-stat">
        <strong>${region.name}</strong>
        <div class="meter"><i style="width:${region.percent}%; background:${region.color}"></i></div>
        <span>${region.caught}/${region.total}</span>
      </div>`).join("");

    const averageEncounters = stats.caught ? Math.round(stats.encounters / stats.caught) : 0;
    const averageEggs = stats.perfect ? Math.round(stats.eggs / Math.max(stats.perfect, 1)) : 0;
    el.huntStats.innerHTML = `
      <div class="hunt-list">
        <div class="hunt-item"><span>Total rencontres</span><strong>${stats.encounters.toLocaleString("fr-FR")}</strong></div>
        <div class="hunt-item"><span>Moyenne rencontres/capture</span><strong>${averageEncounters.toLocaleString("fr-FR")}</strong></div>
        <div class="hunt-item"><span>Oeufs parent parfait</span><strong>${stats.eggs.toLocaleString("fr-FR")}</strong></div>
        <div class="hunt-item"><span>Moyenne oeufs/parfait</span><strong>${averageEggs.toLocaleString("fr-FR")}</strong></div>
      </div>`;
  }

  function render() {
    const stats = window.DexStats.compute(pokemon, collection, regions);
    renderRegions(stats);
    renderSummary(stats);
    renderGrid();
    renderStatsPanels(stats);
  }

  function openDetail(id) {
    currentPokemon = pokemon.find((p) => p.id === Number(id));
    const entry = collection[currentPokemon.id];
    el.detailContent.innerHTML = `
      <div class="detail-hero">
        <img src="${entry.caught ? currentPokemon.shinySprite : currentPokemon.sprite}" alt="">
        <div>
          <div class="pokemon-number">${number(currentPokemon.id)} Â· ${currentPokemon.region}</div>
          <h2>${currentPokemon.name}</h2>
          <div class="badge-line">
            ${entry.caught ? `<span class="badge caught">Shiny capturÃ©</span>` : `<span class="badge">Manquant</span>`}
            ${entry.perfect ? `<span class="badge perfect">Parent parfait</span>` : ""}
          </div>
        </div>
      </div>
      <form class="form-grid" id="detailForm">
        <label class="check-row">CapturÃ© <input name="caught" type="checkbox" ${entry.caught ? "checked" : ""}></label>
        <label class="check-row">Parfait <input name="perfect" type="checkbox" ${entry.perfect ? "checked" : ""}></label>
        <label class="field"><span>Surnom</span><input name="nickname" value="${escapeHtml(entry.nickname)}"></label>
        <label class="field"><span>Nombre de rencontres</span><input name="encounters" type="number" min="0" value="${entry.encounters || ""}"></label>
        <label class="field"><span>Oeufs parent parfait</span><input name="eggs" type="number" min="0" value="${entry.eggs || ""}"></label>
        <label class="field"><span>Date de capture</span><input name="captureDate" type="date" value="${entry.captureDate}"></label>
        <label class="field"><span>Lien YouTube</span><input name="videoUrl" type="url" value="${escapeHtml(entry.videoUrl)}"></label>
        <label class="field"><span>Contexte</span><textarea name="notes">${escapeHtml(entry.notes)}</textarea></label>
        <button class="primary-action" type="submit">Enregistrer</button>
      </form>`;
    el.detailDrawer.classList.add("open");
    el.drawerBackdrop.classList.add("open");
    el.detailDrawer.setAttribute("aria-hidden", "false");
  }

  function closeDetail() {
    el.detailDrawer.classList.remove("open");
    el.drawerBackdrop.classList.remove("open");
    el.detailDrawer.setAttribute("aria-hidden", "true");
  }

  function saveDetail(event) {
    event.preventDefault();
    const form = new FormData(event.target);
    collection[currentPokemon.id] = window.DexStorage.normalizeEntry({
      caught: form.get("caught") === "on",
      perfect: form.get("perfect") === "on",
      nickname: form.get("nickname"),
      encounters: form.get("encounters"),
      eggs: form.get("eggs"),
      captureDate: form.get("captureDate"),
      videoUrl: form.get("videoUrl"),
      notes: form.get("notes"),
      updatedAt: new Date().toISOString()
    });
    window.DexStorage.saveCollection(collection);
    render();
    closeDetail();
  }

  function escapeHtml(value) {
    return String(value || "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[char]));
  }

  function exportFile() {
    const blob = new Blob([JSON.stringify(window.DexStorage.exportCollection(collection, pokemon), null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "shiny-living-dex-export.json";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function bindEvents() {
    el.regionList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-region]");
      if (!button) return;
      activeRegion = button.dataset.region;
      el.sidebar.classList.remove("open");
      render();
    });
    el.statusFilters.addEventListener("click", (event) => {
      const button = event.target.closest("[data-filter]");
      if (!button) return;
      activeFilter = button.dataset.filter;
      el.statusFilters.querySelectorAll("button").forEach((item) => item.classList.toggle("active", item === button));
      render();
    });
    document.querySelectorAll("[data-view]").forEach((button) => {
      button.addEventListener("click", () => {
        activeView = button.dataset.view;
        document.querySelectorAll("[data-view]").forEach((item) => item.classList.toggle("active", item === button));
        el.dexView.classList.toggle("active", activeView === "dex");
        el.statsView.classList.toggle("active", activeView === "stats");
        el.dexToolbar.style.display = activeView === "dex" ? "" : "none";
        render();
      });
    });
    el.search.addEventListener("input", render);
    el.sortSelect.addEventListener("change", render);
    el.grid.addEventListener("click", (event) => {
      const card = event.target.closest("[data-id]");
      if (card) openDetail(card.dataset.id);
    });
    el.detailContent.addEventListener("submit", saveDetail);
    el.drawerClose.addEventListener("click", closeDetail);
    el.drawerBackdrop.addEventListener("click", closeDetail);
    el.menuButton.addEventListener("click", () => el.sidebar.classList.toggle("open"));
    el.exportButton.addEventListener("click", exportFile);
    el.importButton.addEventListener("click", () => el.importFile.click());
    el.importFile.addEventListener("change", () => {
      const file = el.importFile.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        collection = window.DexStorage.importCollection(reader.result, pokemon);
        render();
      };
      reader.readAsText(file);
    });
  }

  bindEvents();
  render();
})();

</script>
</body>
</html>
