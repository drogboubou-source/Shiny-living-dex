:root{
  /* Base palette — deep cosmic night, glass surfaces */
  --bg:        #0a0a12;
  --bg-2:      #12121e;
  --surface:   rgba(255,255,255,0.045);
  --surface-2: rgba(255,255,255,0.08);
  --border:    rgba(255,255,255,0.10);
  --border-strong: rgba(255,255,255,0.18);
  --text:      #f4f3fb;
  --muted:     #8e8da3;

  /* Signature accents */
  --gold:      #fbbf24;
  --gold-soft: rgba(251,191,36,0.35);
  --violet:    #a78bfa;
  --cyan:      #60a5fa;

  --font-logo:'Pokemon GB Local', 'Press Start 2P', monospace;
  --font-region:'Region GameBoy v70', 'Pokemon Classic', monospace;
  --font:     'Pokemon 3DS', 'Inter', system-ui, sans-serif;

  --r:        14px;
  --r-lg:     22px;
  --r-xl:     28px;
  --sidebar-w: 250px;
  --header-h:  64px;

  /* Region accent (overridden dynamically per-card / per-grid via JS) */
  --region-color: var(--gold);
  --region-rgb: 251,191,36;
  --grid-rgb: 251,191,36;
  --grid-next-rgb: 167,139,250;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:
    radial-gradient(circle at 15% -10%, rgba(167,139,250,.18), transparent 40%),
    radial-gradient(circle at 100% 0%, rgba(96,165,250,.12), transparent 35%),
    radial-gradient(circle at 50% 100%, rgba(251,191,36,.07), transparent 45%),
    linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
  color:var(--text);
  font-family:var(--font);
  overflow:hidden;
  -webkit-text-size-adjust:100%;
  -webkit-tap-highlight-color:transparent;
}
button,input,select,textarea{font-family:inherit}
button,.btn,.card,.gen-btn{-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}

/* faint scanline texture for retro/glass feel */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.012) 2px,rgba(255,255,255,.012) 4px);
  mix-blend-mode:overlay;
}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:99px}
::-webkit-scrollbar-track{background:transparent}

/* ═══════════ GLASS PRIMITIVES ═══════════ */
.glass{
  background:linear-gradient(155deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
  border:1px solid var(--border);
  -webkit-backdrop-filter:blur(22px) saturate(140%);
  backdrop-filter:blur(22px) saturate(140%);
}
.glass-strong{
  background:linear-gradient(155deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
  border:1px solid var(--border-strong);
  -webkit-backdrop-filter:blur(28px) saturate(160%);
  backdrop-filter:blur(28px) saturate(160%);
}

/* ═══════════ TOPBAR ═══════════ */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  display:flex;align-items:center;
  gap:.5rem;padding:0 .75rem;z-index:100;
  background:rgba(14,14,22,.78);
  border-bottom:1px solid var(--border);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  backdrop-filter:blur(24px) saturate(160%);
  box-shadow:0 8px 30px rgba(0,0,0,.35);
  overflow:hidden;
}
.topbar::after{
  content:'';position:absolute;left:0;right:0;bottom:-1px;height:1px;
  background:linear-gradient(90deg, var(--violet), var(--gold), var(--cyan), transparent);
  opacity:.55;pointer-events:none;
}
.title-actions{display:flex;align-items:center;gap:.6rem;min-width:0;flex:1 1 auto;overflow:hidden}
.logo{
  display:flex;align-items:center;gap:.55rem;background:none;border:none;color:inherit;
  padding:.25rem;border-radius:var(--r);cursor:pointer;min-width:0;
  transition:transform .15s ease, background .15s ease;
}
.logo:active{transform:scale(.95);background:rgba(255,255,255,.06)}
.logo-icon{border-radius:8px;box-shadow:0 2px 10px rgba(251,191,36,.25);flex-shrink:0;width:30px;height:30px}
.logo-stack{display:flex;flex-direction:column;align-items:flex-start;min-width:0;line-height:1.05;overflow:hidden}
.logo-text{font-family:var(--font-logo);font-size:11px;letter-spacing:.04em;display:flex;gap:.18em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.logo-word{display:inline-block}
.logo-shiny{color:var(--gold)}
.logo-living{color:var(--text)}
.logo-dex{
  background:linear-gradient(135deg,var(--violet),var(--cyan));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.logo-subline{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

.header-hunt-sprite{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  transition:opacity .25s ease, transform .25s ease;
}
.header-hunt-sprite.empty{opacity:0;transform:scale(.7);pointer-events:none}
.header-hunt-img{width:28px;height:28px;object-fit:contain;image-rendering:pixelated;
  filter:drop-shadow(0 0 6px rgba(251,191,36,.55));
  animation:huntPulse 1.8s ease-in-out infinite;
}
@keyframes huntPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

.topbar-stats{
  flex-shrink:0;max-width:38vw;cursor:pointer;border:none;background:none;padding:0;
  border-radius:999px;transition:transform .12s;
}
.topbar-stats:active{transform:scale(.96)}
#statsBar{
  display:flex;align-items:center;gap:.4rem;
  overflow-x:auto;scrollbar-width:none;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 12px,#000 calc(100% - 4px),transparent);
  mask-image:linear-gradient(90deg,transparent,#000 12px,#000 calc(100% - 4px),transparent);
}
#statsBar::-webkit-scrollbar{display:none}
.tstat{
  flex-shrink:0;display:flex;align-items:baseline;gap:.2rem;
  font-size:9px;color:var(--muted);white-space:nowrap;
  background:var(--surface);border:1px solid var(--border);border-radius:999px;
  padding:.3rem .5rem;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
}
.tstat strong{font-size:11px;font-weight:800;color:var(--text)}
@media (max-width:360px){
  .tstat:nth-child(n+3){display:none}
}

/* ═══════════ STATS POPIN ═══════════ */
.stats-popin{
  position:fixed;top:calc(var(--header-h) + .5rem);right:.75rem;left:.75rem;
  max-width:420px;margin-left:auto;
  z-index:140;border-radius:var(--r-lg);padding:1.1rem 1.2rem 1.3rem;
  background:rgba(18,18,30,.88);border:1px solid var(--border-strong);
  -webkit-backdrop-filter:blur(30px) saturate(160%);backdrop-filter:blur(30px) saturate(160%);
  box-shadow:0 24px 70px rgba(0,0,0,.55);
  opacity:0;visibility:hidden;transform:translateY(-12px) scale(.97);
  transition:opacity .22s ease, transform .22s ease, visibility .22s;
  max-height:calc(100vh - var(--header-h) - 2rem);overflow-y:auto;
}
.stats-popin.visible{opacity:1;visibility:visible;transform:translateY(0) scale(1)}
.stats-popin-head{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem;margin-bottom:.85rem}
.stats-popin-kicker{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:.15rem}
.stats-popin-title{font-size:17px;font-weight:700}
.stats-close{
  flex-shrink:0;width:32px;height:32px;border-radius:10px;border:1px solid var(--border);
  background:rgba(255,255,255,.05);color:var(--text);font-size:18px;line-height:1;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;
}
.stats-close:active{transform:scale(.9);background:rgba(255,255,255,.12)}

.stats-highlight{
  border-radius:var(--r);padding:.7rem .8rem;
  display:flex;flex-direction:column;gap:.25rem;
  background:linear-gradient(135deg, rgba(var(--region-rgb),.18), rgba(var(--region-rgb),.04));
  border:1px solid rgba(var(--region-rgb),.32);
}
.stats-highlight span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.stats-highlight strong{font-size:20px;font-weight:800;font-family:var(--font-region);color:var(--region-color)}
.stats-highlight-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem;margin-bottom:.85rem}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.55rem .85rem}
.stats-item{
  display:flex;flex-direction:column;gap:.15rem;padding:.55rem .65rem;border-radius:10px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
}
.stats-item span{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.stats-item strong{font-size:16px;font-weight:800}

/* ═══════════ PULL TO REFRESH ═══════════ */
.pull-refresh{
  position:fixed;top:var(--header-h);left:0;right:0;text-align:center;
  font-size:11px;color:var(--muted);padding:.4rem 0;z-index:90;
  background:rgba(14,14,22,.6);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  transform:translateY(-100%);transition:transform .2s ease;
}
.pull-refresh.ready{transform:translateY(0);color:var(--gold)}

/* ═══════════ SIDEBAR TOGGLE ═══════════ */
.sidebar-toggle{
  position:fixed;top:calc(var(--header-h) + .85rem);left:0;z-index:110;
  width:34px;height:48px;border-radius:0 14px 14px 0;border:1px solid var(--border);
  border-left:none;background:rgba(18,18,30,.82);color:var(--gold);font-size:13px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  -webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);
  box-shadow:4px 4px 18px rgba(0,0,0,.35);transition:left .28s cubic-bezier(.4,0,.2,1), transform .15s;
}
.sidebar-toggle.open{left:var(--sidebar-w)}
.sidebar-toggle:active{transform:scale(.92)}

.sidebar-backdrop{
  position:fixed;inset:0;z-index:104;background:rgba(0,0,0,.5);
  -webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);
  opacity:0;visibility:hidden;transition:opacity .25s ease, visibility .25s;
}
.sidebar-backdrop.open{opacity:1;visibility:visible}

/* ═══════════ LAYOUT / SIDEBAR ═══════════ */
.layout{display:flex;height:100%;padding-top:var(--header-h);overflow:hidden}
.sidebar{
  position:fixed;top:var(--header-h);bottom:0;left:0;width:var(--sidebar-w);z-index:106;
  transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  background:rgba(14,14,22,.88);border-right:1px solid var(--border);
  -webkit-backdrop-filter:blur(28px) saturate(150%);backdrop-filter:blur(28px) saturate(150%);
  box-shadow:12px 0 40px rgba(0,0,0,.4);
}
.sidebar.open{transform:translateX(0)}
.sidebar-inner{height:100%;overflow-y:auto;padding:1.1rem .9rem calc(1.5rem + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:.4rem}
.sidebar-head{padding:.4rem .35rem 1rem}
.sidebar-title{font-family:var(--font-region);font-size:15px;letter-spacing:.04em;color:var(--gold)}
.sidebar-subtitle{font-size:11px;color:var(--muted);margin-top:.2rem}
.sidebar-section-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:.9rem .35rem .4rem}

.gen-item{
  display:flex;flex-direction:column;margin-bottom:.4rem;padding:.6rem .7rem;
  border-radius:var(--r);background:rgba(255,255,255,.03);border:1px solid var(--border);
  transition:background .15s, border-color .15s;
}
.gen-item.active{
  background:linear-gradient(135deg, rgba(var(--region-rgb),.22), rgba(var(--region-rgb),.05));
  border-color:rgba(var(--region-rgb),.5);
  box-shadow:0 0 0 1px rgba(var(--region-rgb),.18), 0 8px 24px -8px rgba(var(--region-rgb),.45);
}
.gen-btn{
  display:flex;align-items:center;gap:.65rem;width:100%;text-align:left;
  background:none;border:none;padding:0;cursor:pointer;color:var(--text);
  transition:transform .12s;
}
.gen-btn:active{transform:scale(.98)}
.gen-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;background:var(--region-color);box-shadow:0 0 10px var(--region-color)}
.gen-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:.3rem}
.gen-name-row{display:flex;align-items:baseline;justify-content:space-between;gap:.4rem;min-width:0}
.gen-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gen-range{font-size:10px;color:var(--muted);font-family:var(--font-region);flex-shrink:0}
.gen-badge{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.gen-bar-wrap{height:5px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:.5rem}
.gen-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg, var(--region-color), rgba(var(--region-rgb),.5));transition:width .4s ease}
.gen-progress{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.gen-perfect-row{font-size:9.5px;color:var(--gold);margin-top:.3rem}

.sidebar-actions{display:flex;flex-direction:column;gap:.5rem;margin-top:.4rem}
.btn{
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  background:rgba(255,255,255,.045);border:1px solid var(--border);
  border-radius:var(--r);padding:.7rem .9rem;color:var(--text);font-size:13px;font-weight:600;
  cursor:pointer;transition:transform .12s, background .15s, border-color .15s;
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
}
.btn svg{width:16px;height:16px;flex-shrink:0}
.btn:active{transform:scale(.96);background:rgba(255,255,255,.09)}

/* ═══════════ MAIN ═══════════ */
.main{
  flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;scrollbar-gutter:stable;
  padding:1.1rem 1.1rem calc(6rem + env(safe-area-inset-bottom));
  scroll-padding-top:1rem;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
}

/* ═══════════ REGION HEADER ═══════════ */
.region-header{margin-bottom:1rem}
.region-name{
  font-family:var(--font-region);font-size:20px;letter-spacing:.05em;
  background:linear-gradient(135deg, var(--region-color), #fff8);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:.55rem;
}
.region-meta{font-size:12px;color:var(--muted);margin-bottom:.6rem}

.region-info-block{
  border-radius:var(--r-lg);padding:1rem;margin-bottom:.4rem;
  background:linear-gradient(155deg, rgba(var(--region-rgb),.14), rgba(255,255,255,.03));
  border:1px solid rgba(var(--region-rgb),.28);
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
}
.region-map-mosaic{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-bottom:.85rem;border-radius:var(--r);overflow:hidden}
.region-map-thumb{position:relative;min-width:0;width:100%;aspect-ratio:1;border-radius:8px;overflow:hidden}
.region-map-thumb img{display:block;width:100%;height:100%;object-fit:cover;filter:saturate(1.15)}
.region-map-thumb span{
  position:absolute;left:0;right:0;bottom:0;padding:.2rem .35rem;font-size:9px;font-weight:700;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.65));color:#fff;text-align:center;
}
.region-stat-row{display:flex;flex-direction:column;gap:.7rem;margin-bottom:.7rem}
.region-stat-main{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem}
.region-stat{
  display:flex;flex-direction:column;gap:.15rem;padding:.6rem .7rem;border-radius:10px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
}
.region-stat strong{font-size:18px;font-weight:800;font-family:var(--font-region);color:var(--region-color)}
.region-stat strong small{font-size:11px;font-weight:600;color:var(--muted);font-family:var(--font)}
.region-stat span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.1rem}
.region-stat.missing strong{color:var(--text)}
.region-stat.perfect strong{color:var(--violet)}
.region-stat.completion strong{color:var(--gold)}

.region-detail-row{display:flex;flex-wrap:wrap;gap:.6rem}
.region-detail-group{display:flex;gap:.4rem;flex:1;min-width:140px}
.region-detail-chip{
  flex:1;display:flex;flex-direction:column;gap:.1rem;text-align:center;
  font-size:10.5px;padding:.45rem .5rem;border-radius:10px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);
}
.region-detail-chip strong{font-size:14px;color:var(--text);font-weight:800}

.all-hero{
  border-radius:var(--r-xl);padding:1.4rem 1.2rem;margin-bottom:1rem;position:relative;overflow:hidden;
  background:
    radial-gradient(circle at 110% -10%, rgba(167,139,250,.25), transparent 55%),
    radial-gradient(circle at -10% 110%, rgba(96,165,250,.18), transparent 55%),
    linear-gradient(155deg, rgba(255,255,255,.07), rgba(255,255,255,.015));
  border:1px solid var(--border-strong);
  -webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);
}
.all-hero-copy{font-size:12.5px;color:var(--muted);line-height:1.5}
.all-progress{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-top:1rem}
.map-hero{width:100%;border-radius:var(--r);margin-bottom:.9rem;object-fit:cover;max-height:140px}

.progress-wrap{display:flex;flex-direction:column;gap:.3rem}
.progress-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:flex;justify-content:space-between}
.progress-track{height:7px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg, var(--gold), var(--violet));transition:width .5s ease}

/* ═══════════ FILTER BAR ═══════════ */
.filters{
  display:flex;flex-wrap:wrap;gap:.55rem;margin-bottom:1rem;align-items:stretch;
}
.filters input[type="text"]{
  flex:1 1 100%;min-width:0;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:.75rem 1rem;color:var(--text);font-size:14px;
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  transition:border-color .15s, box-shadow .15s;
}
.filters input[type="text"]::placeholder{color:var(--muted)}
.filters input[type="text"]:focus{outline:none;border-color:var(--gold-soft);box-shadow:0 0 0 3px rgba(251,191,36,.12)}

.sort-control{
  flex:1 1 calc(50% - .3rem);display:flex;align-items:center;gap:.5rem;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:.65rem .85rem;font-size:12px;color:var(--muted);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
}
.sort-control select{
  flex:1;background:transparent;border:none;color:var(--text);font-size:13px;font-weight:600;
  -webkit-appearance:none;appearance:none;outline:none;
}
.sort-control select option{background:#18181f;color:var(--text)}

.counter-button,.perfect-summary{
  flex:1 1 calc(50% - .3rem);min-height:52px;
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  border-radius:var(--r);border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:12px;font-weight:700;
  cursor:pointer;-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  transition:transform .12s, background .15s, border-color .15s, box-shadow .15s;
  padding:.5rem .8rem;
}
.counter-button:active,.perfect-summary:active{transform:scale(.96)}
.counter-button.active,.counter-button[data-active="true"]{
  background:linear-gradient(135deg, rgba(251,191,36,.28), rgba(251,191,36,.08));
  border-color:rgba(251,191,36,.55);color:var(--gold);
  box-shadow:0 0 0 1px rgba(251,191,36,.2), 0 10px 26px -10px rgba(251,191,36,.5);
}
.counter-icon{font-size:16px;line-height:1;display:flex}
.counter-icon svg{width:18px;height:18px}
.counter-label{display:flex;align-items:center;gap:.45rem}
.sprite-switch{display:flex;align-items:center;gap:.35rem}
.sprite-switch-option{padding:.18rem .5rem;border-radius:999px;font-size:10px;background:rgba(255,255,255,.05);transition:.15s}
.sprite-switch-option.active{background:linear-gradient(135deg,var(--violet),var(--cyan));color:#0a0a12;font-weight:800}

/* ═══════════ GENERATION DIVIDER ═══════════ */
.generation-divider{
  grid-column:1/-1;display:flex;align-items:center;gap:.6rem;
  margin:.9rem 0 .4rem;font-family:var(--font-region);font-size:12px;
  letter-spacing:.08em;color:rgba(var(--region-rgb),.95);
}
.generation-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg, rgba(var(--region-rgb),.45), transparent)}

/* ═══════════ GRID & CARDS ═══════════ */
.grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem;
  padding-bottom:1rem;
}
.grid.hunt-grid{grid-template-columns:repeat(2,1fr)}
.empty{
  grid-column:1/-1;text-align:center;padding:3rem 1rem;color:var(--muted);font-size:13px;
  border:1px dashed var(--border);border-radius:var(--r-lg);
}

.card{
  position:relative;border-radius:var(--r);padding:.65rem .55rem .7rem;
  display:flex;flex-direction:column;align-items:center;gap:.25rem;text-align:center;
  background:linear-gradient(160deg, rgba(255,255,255,.05), rgba(255,255,255,.015));
  border:1px solid var(--border);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  cursor:pointer;overflow:hidden;
  transition:transform .14s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease, border-color .2s ease, background .2s ease;
}
.card:active{transform:scale(.94)}
.card::before{
  content:'';position:absolute;inset:0;border-radius:inherit;opacity:0;pointer-events:none;
  background:radial-gradient(circle at 50% 0%, rgba(var(--region-rgb),.35), transparent 70%);
  transition:opacity .25s ease;
}
.card:hover::before{opacity:1}
.card .num{font-family:var(--font-region);font-size:9px;color:var(--muted);letter-spacing:.04em}
.card .pname{font-size:11px;font-weight:700;line-height:1.15;min-height:2.2em;display:flex;align-items:center}
.card .type-row{display:flex;gap:.18rem;min-height:16px}

.card .status{
  font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;
  padding:.18rem .5rem;border-radius:999px;background:rgba(255,255,255,.04);
}

/* caught */
.card.caught{
  border-color:rgba(var(--region-rgb),.45);
  background:linear-gradient(160deg, rgba(var(--region-rgb),.16), rgba(255,255,255,.02));
  box-shadow:0 8px 28px -12px rgba(var(--region-rgb),.65);
}
.card.caught .status{background:transparent}
.status-shiny{
  color:#0a0a12;font-weight:800;
  background:linear-gradient(135deg,var(--gold),#fde68a);
  padding:.18rem .55rem;border-radius:999px;
  box-shadow:0 0 12px rgba(251,191,36,.55);
}
.status-pair{display:flex;gap:.3rem;align-items:center}
.status-perfect{
  color:#0a0a12;font-weight:800;background:linear-gradient(135deg,var(--violet),var(--cyan));
  padding:.18rem .5rem;border-radius:999px;font-size:8.5px;
}
.card.perfect{box-shadow:0 0 0 1.5px var(--violet), 0 10px 30px -12px rgba(167,139,250,.6)}
.card.perfect::after{
  content:'⬡';position:absolute;top:.4rem;right:.4rem;font-size:11px;color:var(--violet);
  filter:drop-shadow(0 0 6px rgba(167,139,250,.8));
}

/* hunting / counter mode */
.card.hunting{
  border-color:rgba(96,165,250,.55);
  background:linear-gradient(160deg, rgba(96,165,250,.16), rgba(255,255,255,.02));
  animation:huntGlow 2.4s ease-in-out infinite;
}
@keyframes huntGlow{0%,100%{box-shadow:0 0 0 1px rgba(96,165,250,.3)}50%{box-shadow:0 0 22px 2px rgba(96,165,250,.4)}}
.card.hunting .status{background:linear-gradient(135deg,var(--cyan),var(--violet));color:#0a0a12;font-weight:800}

/* unavailable */
.card.unavailable{opacity:.4;filter:saturate(.3);cursor:default}
.card.unavailable:active{transform:none}

/* regional form cards */
.card.form-original,.card.form-card{position:relative}
.form-tag{
  position:absolute;top:.4rem;left:.4rem;font-size:8px;font-weight:800;letter-spacing:.05em;
  text-transform:uppercase;padding:.15rem .4rem;border-radius:6px;
  background:rgba(var(--region-rgb),.28);color:var(--region-color);
}

/* ═══════════ HEADER STATS (legacy chip support) ═══════════ */
.shiny{color:var(--gold)}
.primary{color:var(--violet)}
.current{color:var(--cyan)}
.previous{color:var(--muted)}
.completion{font-weight:800}

/* ═══════════ MODAL ═══════════ */
.overlay{
  position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;
  background:rgba(5,5,10,.6);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  opacity:0;visibility:hidden;transition:opacity .25s ease, visibility .25s;
}
.overlay.open{opacity:1;visibility:visible}
@media (min-width:768px){.overlay{align-items:center}}

.modal{
  position:relative;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;
  border-radius:var(--r-xl) var(--r-xl) 0 0;padding:1.35rem;
  background:linear-gradient(165deg, rgba(28,28,40,.92), rgba(16,16,26,.94));
  border:1px solid var(--border-strong);border-bottom:none;
  -webkit-backdrop-filter:blur(36px) saturate(160%);backdrop-filter:blur(36px) saturate(160%);
  box-shadow:0 -24px 70px rgba(0,0,0,.6);
  transform:translateY(40px);transition:transform .3s cubic-bezier(.32,.72,0,1);
}
.overlay.open .modal{transform:translateY(0)}
@media (min-width:768px){
  .modal{border-radius:var(--r-xl);border-bottom:1px solid var(--border-strong);transform:translateY(0) scale(.95)}

}

.sprite-pair{display:flex;gap:1.1rem;align-items:center}

.regional-form-link{

  background:rgba(255,255,255,.05);color:var(--muted);cursor:pointer;
}

.modal-form-fields{display:flex;flex-direction:column;gap:.75rem}
.caught-toggle,.shiny-perfect{

  cursor:pointer;transition:.15s;
}

.shiny-perfect:has(input:checked){background:rgba(167,139,250,.14);border-color:rgba(167,139,250,.4)}

.form-row{display:flex;flex-direction:column;gap:.35rem;min-width:0}

/* ═══════════ HUNT PANEL (big tactile counter) ═══════════ */
.hunt-panel{
  display:none;

function renderTypeBadges(id) {
  return renderTypeBadgesForTypes(POKEMON_TYPES[id] || []);
}

function renderTypeBadgesForTypes(types) {
  return (types || []).map(type => {
    const meta = TYPE_META[type] || TYPE_META.normal;
    return '<span class="type-pill" title="Type ' + meta.label + '" aria-label="Type ' + meta.label + '"><img src="' + meta.src + '" alt=""></span>';
  }).join('');
}

function typeLabel(type) {
  return TYPE_META[type]?.label || type || '';
}

function comparePokemonBySort(a, b, mode) {
  const pa = progress[a] || {};
  const pb = progress[b] || {};

  if (mode === 'date-desc' || mode === 'date-asc') {
    const da = pa.date || '';
    const db = pb.date || '';
    if (da !== db) return mode === 'date-asc' ? da.localeCompare(db) : db.localeCompare(da);
    return a - b;
  }

  if (mode === 'type') {
    const ta = POKEMON_TYPES[a] || [];
    const tb = POKEMON_TYPES[b] || [];
    const primary = typeLabel(ta[0]).localeCompare(typeLabel(tb[0]), 'fr', { sensitivity: 'base' });
    if (primary) return primary;
    const secondary = typeLabel(ta[1]).localeCompare(typeLabel(tb[1]), 'fr', { sensitivity: 'base' });
    if (secondary) return secondary;
    return a - b;
  }

  if (mode === 'caught') {
    if (!!pa.caught !== !!pb.caught) return pa.caught ? -1 : 1;
    return a - b;
  }

  if (mode === 'missing') {
    if (!!pa.caught !== !!pb.caught) return pa.caught ? 1 : -1;
    return a - b;
  }

  if (mode === 'perfect') {
    if (!!pa.perfect !== !!pb.perfect) return pa.perfect ? -1 : 1;
    return a - b;
  }

  return a - b;
}

function pokemonMatchesSortMode(p, mode) {
  if (mode === 'caught') return !!p.caught;
  if (mode === 'missing') return !p.caught;
  if (mode === 'perfect') return !!p.caught && !!p.perfect;
  if (mode === 'date-desc' || mode === 'date-asc') return !!p.caught && !!p.date;
  return true;
}

function getPokemonFamily(id) {
  return FAMILY_BY_POKEMON[id] || null;
}

function isFamilyComplete(id) {
  const family = getPokemonFamily(id);
  return !!family && family.every(familyId => progress[familyId]?.caught);
}

function init() {
  // Charge la progression locale depuis le localStorage
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const legacyRaw = localStorage.getItem(LEGACY_STORAGE_KEY);
    const sessionRegion = sessionStorage.getItem(REGION_SESSION_KEY);
    const savedSpriteMode = localStorage.getItem(SPRITE_MODE_KEY);
    const savedCounterMode = localStorage.getItem(COUNTER_MODE_KEY);
    currentRegion = sessionRegion === 'all' || REGIONS[parseInt(sessionRegion)] ? (sessionRegion === 'all' ? 'all' : parseInt(sessionRegion)) : 'all';
    spriteMode = savedSpriteMode === 'home' ? 'home' : 'pixel';
    counterMode = savedCounterMode === 'true';
    if (raw) {
      progress = sanitizeProgress(JSON.parse(raw), { trustCaught: true });
    } else if (legacyRaw) {
      progress = sanitizeProgress(JSON.parse(legacyRaw), { trustCaught: false });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    }
  } catch(e) { progress = {}; }

  // Affichage initial avec les données locales déjà disponibles
  renderAll();
}

function hasUserData(p) {
  if (!p) return false;
  const ivs = p.ivs || {};
  return !!(
    p.perfect ||
    p.hunting ||
    p.huntCount ||
    p.nickname ||
    p.encounters ||
    p.eggs ||
    p.date ||
    p.context ||
    p.youtube ||
    p.pokeball ||
    p.nature ||
    ivs.hp || ivs.atk || ivs.def || ivs.spa || ivs.spd || ivs.spe
  );
}

function sanitizeProgress(data, options = {}) {
  const trustCaught = options.trustCaught !== false;
  const clean = {};
  Object.entries(data || {}).forEach(([id, p]) => {
    if (!p || typeof p !== 'object') return;
    const entry = { ...p };
    entry.huntCount = parseInt(entry.huntCount) || 0;
    entry.hunting = !!entry.hunting || entry.huntCount > 0;
    entry.pokeball = entry.pokeball || '';
    entry.nature = entry.nature || '';
    // Ancienne logique: pokemon.json pouvait mettre caught=true juste parce que le nom etait rempli.
    if (!trustCaught && entry.caught && !hasUserData(entry)) delete entry.caught;
    const isEmpty = !entry.caught && !hasUserData(entry);
    if (!isEmpty) clean[id] = entry;
  });
  return clean;
}

function rowMeansCaught(p) {
  const explicit = p['Capturé'] ?? p['Capture'] ?? p['Caught'] ?? p['captured'];
  if (explicit !== undefined) {
    const value = String(explicit).trim().toLowerCase();
    return ['true', '1', 'oui', 'yes', '✓', 'x'].includes(value);
  }
  return !!(
    p['Surnoms'] ||
    p['Oeufs parent parfait'] ||
    p['Nombre de rencontres'] ||
    p['En cours'] ||
    p['Compteur en cours'] ||
    p['Date de capture'] ||
    p['Lien YouTube'] ||
    p['Contexte de capture'] ||
    p['Pokéball'] ||
    p['Nature'] ||
    p['IV parfaits'] ||
    p['Parfait']
  );
}

// Au chargement de la page, on tente de récupérer le fichier pokemon.json
document.addEventListener('DOMContentLoaded', () => {
  fetch('pokemon.json')
    .then(response => {
      if (!response.ok) {
        throw new Error("Le fichier pokemon.json n'a pas pu être chargé automatiquement.");
      }
      return response.json();
    })
    .then(data => {
      if (Array.isArray(data)) {
        pokedexData = {};
        data.forEach(p => {
          const id = p['N° pokédex'] || p['id'];
          if (id) pokedexData[id] = p;
        });

        // On fusionne avec la progression (appelle la fonction déjà existante dans ton code)
        mergePokedexIntoProgress();

        renderAll();
        console.log("Données Pokémon chargées avec succès depuis le serveur !");
      }
    })
    .catch(error => {
      console.warn("Chargement auto désactivé ou impossible (normal en local sans serveur) :", error.message);
    });
});

// Fusionne les champs du pokemon.json dans progress (sans écraser ce qui existe déjà)
function mergePokedexIntoProgress() {
  Object.entries(pokedexData).forEach(([id, p]) => {
    const numId = parseInt(id);
    if (!progress[numId]) progress[numId] = {};
    const existing = progress[numId];
    // Champs venant du JSON public (ne remplace que si vide)
    if (!existing.nickname   && p['Surnoms'])             existing.nickname   = p['Surnoms'];
    if (!existing.encounters && p['Nombre de rencontres'])existing.encounters = parseInt(p['Nombre de rencontres']) || 0;
    if (!existing.eggs       && p['Oeufs parent parfait'])existing.eggs       = parseInt(p['Oeufs parent parfait']) || 0;
    if (!existing.huntCount  && p['Compteur en cours'])    existing.huntCount  = parseInt(p['Compteur en cours']) || 0;
    if (String(p['En cours'] || '').trim().toLowerCase() === 'oui' || existing.huntCount > 0) existing.hunting = !existing.caught;
    if (!existing.date       && p['Date de capture'])     existing.date       = p['Date de capture'];
    if (!existing.context    && p['Contexte de capture']) existing.context    = p['Contexte de capture'];
    if (!existing.youtube    && p['Lien YouTube'])        existing.youtube    = p['Lien YouTube'];
    if (!existing.pokeball   && p['Pokéball'])            existing.pokeball   = p['Pokéball'];
    if (!existing.nature     && p['Nature'])              existing.nature     = p['Nature'];
    // Statuts: le nom seul ne signifie pas que le shiny est capturé.
    if (rowMeansCaught(p)) existing.caught = true;
    if (p['Parfait'] === true || p['Parfait'] === 'true' || p['Parfait'] === '✓') existing.perfect = true;
    // IVs depuis la chaîne "PV/Atq/Déf/..." ou objet
    if (!existing.ivs && p['IV parfaits']) existing.ivs = parseIVs(p['IV parfaits']);
  });
}

function parseIVs(raw) {
  if (!raw || raw === '') return {hp:false,atk:false,def:false,spa:false,spd:false,spe:false};
  if (typeof raw === 'object') return raw;
  // Chaîne type "PV / Atq / Vitesse"
  const s = raw.toLowerCase();
  return {
    hp:  s.includes('pv') || s.includes('hp'),
    atk: s.includes('atq') || s.includes('atk'),
    def: s.includes('déf') || s.includes('def'),
    spa: s.includes('atq spé') || s.includes('spa') || s.includes('spé'),
    spd: s.includes('déf spé') || s.includes('spd'),
    spe: s.includes('vitesse') || s.includes('spe') || s.includes('speed'),
  };
}

function readStoredIdList(key) {
  try {
    const value = JSON.parse(localStorage.getItem(key) || '[]');
    return Array.isArray(value) ? value.map(Number).filter(Number.isFinite) : [];
  } catch (_) {
    return [];
  }
}

function writeStoredIdList(key, ids) {

function getActiveHuntIds() {
  const active = Object.keys(progress)
    .map(Number)
    .filter(id => {
      const p = progress[id] || {};
      return !p.caught && (parseInt(p.huntCount) || 0) > 0;
    });
  const activeSet = new Set(active);
  const ordered = readStoredIdList(HUNT_ORDER_KEY).filter(id => activeSet.has(id));
  const missing = active.filter(id => !ordered.includes(id)).sort((a, b) => a - b);
  return [...ordered, ...missing];
}

function getHeaderHuntSprites() {
  const activeIds = getActiveHuntIds();
  const captured = readStoredIdList(HUNT_CAPTURED_KEY).filter(id => progress[id]?.caught);
  const currentId = activeIds[0] || captured[captured.length - 1] || null;
  const previousId = captured.filter(id => id !== currentId).slice(-1)[0] || null;
  const currentShiny = !!currentId && !!progress[currentId]?.caught && !activeIds.includes(currentId);
  return { previousId, currentId, currentShiny };
}

function updateHeaderHuntSprite() {
  const holder = document.getElementById('headerHuntSprite');

  const { previousId, currentId, currentShiny } = getHeaderHuntSprites();

    holder.classList.add('empty');
    holder.innerHTML = '';

  const previousHtml = previousId ? `
    <img class="header-hunt-img previous shiny"
         src="${getPokemonSpriteUrl(previousId, true, 'home')}"
         alt="${getPokemonDisplayName(previousId)}" width="34" height="34" decoding="async"

  const currentHtml = currentId ? `

         src="${getPokemonSpriteUrl(currentId, currentShiny, 'home')}"
         alt="${getPokemonDisplayName(currentId)}" width="52" height="52" decoding="async"

}

    if (isUnavailablePokemon(id)) continue;
    if (progress[id]?.caught && progress[id]?.perfect) perfect++;
  }
  return perfect;

function getCurrentStats() {
  const r = currentRegion === 'all' ? getAllRegionStats() : REGIONS[currentRegion];
  const availableIds = getAvailableIdsInRange(r);
  const total = availableIds.length;
  const entries = [];
  for (const id of availableIds) {
    if (progress[id]) entries.push(progress[id]);
  }
  const caught = entries.filter(p => p.caught).length;
  const missing = Math.max(0, total - caught);
  const perfect = entries.filter(p => p.caught && p.perfect).length;
  const totalEncounters = entries.reduce((a,p) => a + (parseInt(p.encounters) || 0), 0);
  const totalEggs = entries.reduce((a,p) => a + (parseInt(p.eggs) || 0), 0);
  const avgEncounters = caught > 0 ? Math.round(totalEncounters / caught) : 0;
  const avgEggs = caught > 0 ? Math.round(totalEggs / caught) : 0;
  const caughtPercent = total > 0 ? caught / total * 100 : 0;
  return {
    regionName: r.name,
    gen: r.gen,
    total,
    caught,
    missing,
    perfect,
    totalEncountersText: totalEncounters.toLocaleString('fr-FR'),
    avgEncountersText: avgEncounters.toLocaleString('fr-FR'),
    totalEggsText: totalEggs.toLocaleString('fr-FR'),
    avgEggsText: avgEggs.toLocaleString('fr-FR'),
    caughtPercent,
    caughtPercentText: formatPercent(caughtPercent),
  };
}

function initStatsButtonSwipe() {
  const button = document.getElementById('statsButton');
  if (!button) return;

  let startX = 0;
  let startY = 0;
  let canSwipe = false;

  button.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    canSwipe = true;
  }, { passive: true });

  button.addEventListener('touchend', e => {
    if (!canSwipe) return;
    canSwipe = false;
    const endX = e.changedTouches[0]?.clientX || startX;
    const endY = e.changedTouches[0]?.clientY || startY;
    const dx = endX - startX;
    const dy = endY - startY;
    if (dy > 36 && Math.abs(dy) > Math.abs(dx) * 1.25) {
      suppressStatsButtonClick = true;
      setStatsPopinOpen(true);
    }
  }, { passive: true });

  button.addEventListener('touchcancel', () => {
    canSwipe = false;
  }, { passive: true });
}

    e.stopPropagation();
    e.stopImmediatePropagation();

    return;

  e.stopImmediatePropagation();
  closeStatsPopin();
}

function renderRegion() {
  const isAll  = currentRegion === 'all';
  const r      = isAll ? getAllRegionStats() : REGIONS[currentRegion];
  const stats = getCurrentStats();
  const statsPanel = renderRegionStatsPanel(stats, r.color);
  const headerClass = isAll ? 'region-header all-hero' : 'region-header map-hero';
  const mapStyle = `--region-accent:${r.color};${!isAll && r.map ? `--region-map:url('${r.map}')` : ''}`;

  document.getElementById('regionHeader').className = headerClass;
  document.getElementById('regionHeader').setAttribute('style', mapStyle);
  if (isAll) {
    const mosaic = REGIONS.map(region => `
      <div class="region-map-thumb">
        <img src="${region.map}" alt="Carte de ${region.name}" loading="lazy">
        <span>${region.name}</span>
      </div>`).join('');
    document.getElementById('regionHeader').innerHTML = `
      <div class="all-hero-copy">
        <div class="region-info-block">
          <div>
            <div class="region-name" style="color:${r.color}">${r.name}</div>
            <div class="region-meta">Gen 1 à 9</div>
          </div>
          ${statsPanel}
        </div>
      </div>
      <div class="region-map-mosaic">${mosaic}</div>`;
    renderGrid();
    return;
  }

  document.getElementById('regionHeader').innerHTML = `
    <div class="region-info-block">
      <div>
        <div class="region-name" style="color:${r.color}">${r.name}</div>
        <div class="region-meta">Gen ${r.gen}</div>
      </div>
      ${statsPanel}
    </div>`;

  renderGrid();
}

function getRegionByPokemonId(id) {
  return REGIONS.find(region => id >= region.start && id <= region.end);
}

function hexToRgbString(hex) {
  const clean = String(hex || '').replace('#', '').trim();
  if (!/^[0-9a-fA-F]{6}$/.test(clean)) return '125,211,252';
  return [
    parseInt(clean.slice(0, 2), 16),
    parseInt(clean.slice(2, 4), 16),
    parseInt(clean.slice(4, 6), 16)
  ].join(',');
}

function setRegionVisualVars(element, region, prefix = 'region') {
  if (!element || !region) return;
  element.style.setProperty(`--${prefix}-color`, region.color);
  element.style.setProperty(`--${prefix}-rgb`, hexToRgbString(region.color));
}

function setGridVisualVars(grid, region) {
  if (!grid) return;
  const activeRegion = currentRegion === 'all' ? REGIONS[0] : region;
  const nextRegion = currentRegion === 'all'
    ? REGIONS[REGIONS.length - 1]
    : REGIONS[Math.min(REGIONS.length - 1, (REGIONS.indexOf(activeRegion) || 0) + 1)];
  grid.style.setProperty('--grid-rgb', hexToRgbString(activeRegion?.color || '#7dd3fc'));
  grid.style.setProperty('--grid-next-rgb', hexToRgbString(nextRegion?.color || '#c084fc'));
}

function createGenerationDivider(region, previousRegion = null) {
  const divider = document.createElement('div');
  divider.className = 'generation-divider';
  divider.style.setProperty('--gen-color', region.color);
  divider.style.setProperty('--gen-rgb', hexToRgbString(region.color));
  divider.style.setProperty('--prev-gen-color', previousRegion?.color || region.color);
  divider.style.setProperty('--prev-gen-rgb', hexToRgbString(previousRegion?.color || region.color));
  divider.innerHTML = `
    <strong>${region.name}</strong>
    <span>Génération ${region.gen} · #${region.start}-${region.end}</span>`;
  return divider;
}

function matchesRegionalSearch(form, search) {
  if (!search) return true;
  const baseName = (NAMES[form.baseId] || '').toLowerCase();
  return baseName.includes(search)
    || form.label.toLowerCase().includes(search)
    || form.region.toLowerCase().includes(search)
    || String(form.baseId).includes(search);
}

function getRegionalFormsForScope(range, search) {
  return REGIONAL_FORMS
    .filter(form => form.baseId >= range.start && form.baseId <= range.end)
    .filter(form => matchesRegionalSearch(form, search))
    .sort((a, b) => a.baseId - b.baseId || a.region.localeCompare(b.region, 'fr') || a.label.localeCompare(b.label, 'fr'));
}

function getCardStatusHtml(p, isHuntingCard = false) {
  if (isHuntingCard) return '<span>En cours</span>';
  if (p.caught && p.perfect) {
    return '<span class="status-pair"><span class="status-shiny">Shiny</span><span class="status-perfect">Parfait</span></span>';
  }
  return p.caught ? '<span class="status-shiny">Shiny</span>' : 'Manquant';
}

function createRegionalOriginalCard(id) {
  const name = NAMES[id] || `#${id}`;
  const p = progress[id] || {};
  const isHuntingCard = !p.caught && (p.hunting || p.huntCount);
  const statusHtml = getCardStatusHtml(p, isHuntingCard);
  const card = document.createElement('div');
  card.className = 'card form-original' + (isHomeSpriteMode() ? ' sprite-home' : '') + (p.caught ? ' caught' : '') + (p.perfect ? ' perfect' : '') + (isHuntingCard ? ' hunting' : '');
  setRegionVisualVars(card, getRegionByPokemonId(id));
  card.setAttribute('role', 'button');
  card.setAttribute('tabindex', '0');
  card.setAttribute('aria-label', `${name}, forme originale`);
  card.onclick = () => activatePokemonCard(card, id);
  card.onkeydown = e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      activatePokemonCard(card, id);
    }
  };
  card.innerHTML = `
    <div class="form-tag">Base</div>
    <div class="num">#${String(id).padStart(4,'0')}</div>
    <div class="pname">${name}</div>
    <div class="type-row">${renderTypeBadges(id)}</div>
    <img src="${getPokemonSpriteUrl(id, !!p.caught)}"
         alt="${name}" loading="lazy" width="64" height="64" onerror="handleSpriteError(this, ${id}, ${!!p.caught})">
    <div class="status">${statusHtml}</div>`;
  return card;
}

function createRegionalFormCard(form) {
  const p = progress[form.formId] || {};
  const isHuntingCard = !p.caught && (p.hunting || p.huntCount);
  const unavailable = isUnavailablePokemon(form.formId);
  const statusHtml = unavailable ? 'Indisponible' : getCardStatusHtml(p, isHuntingCard);
  const card = document.createElement('div');
  card.className = 'card form-card' + (isHomeSpriteMode() ? ' sprite-home' : '') + (p.caught && !unavailable ? ' caught' : '') + (p.perfect && !unavailable ? ' perfect' : '') + (isHuntingCard && !unavailable ? ' hunting' : '') + (unavailable ? ' unavailable' : '');
  setRegionVisualVars(card, REGIONS.find(region => region.name === form.region) || getRegionByPokemonId(form.baseId));
  card.setAttribute('role', 'button');
  card.setAttribute('tabindex', '0');
  card.setAttribute('aria-label', `${form.label}, forme de ${form.region}`);
  card.onclick = () => { if (!unavailable) activatePokemonCard(card, form.formId); };
  card.onkeydown = e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      if (!unavailable) activatePokemonCard(card, form.formId);
    }
  };
  card.innerHTML = `
    <div class="form-tag">${form.region}</div>
    <div class="num">#${String(form.baseId).padStart(4,'0')}</div>
    <div class="pname">${form.label}</div>
    <div class="type-row">${renderTypeBadgesForTypes(form.types)}</div>
    <img src="${getPokemonSpriteUrl(form.formId, !!p.caught, isHomeSpriteMode() ? 'home' : 'pixel')}"
         alt="${form.label}" loading="lazy" width="64" height="64" onerror="handleSpriteError(this, ${form.formId}, ${!!p.caught})">
    <div class="status">${statusHtml}</div>`;
  return card;
}

function renderRegionalFormsGrid(range, search, grid) {
  const forms = getRegionalFormsForScope(range, search);
  forms.forEach(form => grid.appendChild(createRegionalFormCard(form)));
  if (!forms.length) {
    grid.innerHTML = '<div class="empty">Aucune forme régionale trouvée.</div>';
  }
}

function renderGrid() {
  const r      = currentRegion === 'all' ? getAllRegionStats() : REGIONS[currentRegion];
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filter = document.getElementById('filterSelect')?.value || 'all';
  const sort   = document.getElementById('sortSelect')?.value || 'number';
  const isHuntingView = counterMode;
  const grid   = document.getElementById('grid');
  grid.classList.toggle('hunt-grid', isHuntingView);
  setGridVisualVars(grid, r);
  grid.innerHTML = '';
  const ids = [];

  if (!counterMode && sort === 'forms') {
    renderRegionalFormsGrid(r, search, grid);
    return;
  }

  for (let id = r.start; id <= r.end; id++) {
    const name = NAMES[id] || `#${id}`;
    const p    = progress[id] || {};
    const unavailable = isUnavailablePokemon(id);
    if (search && !name.toLowerCase().includes(search) && !String(id).includes(search)) continue;
    if (counterMode && (p.caught || (parseInt(p.huntCount) || 0) < 1)) continue;
    if (sort === 'legendary' && !LEGENDARY_ODDS_BASE_IDS.has(id)) continue;
    if (unavailable && ['caught','missing','perfect','date-desc','date-asc'].includes(sort)) continue;
    if (!pokemonMatchesSortMode(p, sort)) continue;
    if (filter === 'caught'  && !p.caught)  continue;
    if (filter === 'missing' && p.caught)   continue;
    if (filter === 'perfect' && (!p.caught || !p.perfect)) continue;
    ids.push(id);
  }

  ids.sort((a, b) => {
    if (!counterMode) return comparePokemonBySort(a, b, sort);
    const pa = progress[a] || {};
    const pb = progress[b] || {};
    const ha = !!pa.hunting || !!pa.huntCount;
    const hb = !!pb.hunting || !!pb.huntCount;
    if (ha !== hb) return ha ? -1 : 1;
    const ca = parseInt(pa.huntCount) || 0;
    const cb = parseInt(pb.huntCount) || 0;
    if (ca !== cb) return cb - ca;
    return a - b;
  });

  let lastDividerGen = null;
  let previousDividerRegion = null;
  const showGenerationDividers = currentRegion === 'all' && (sort === 'number' || sort === 'legendary') && !counterMode;

  ids.forEach(id => {
    const name = NAMES[id] || `#${id}`;
    const p    = progress[id] || {};
    const unavailable = isUnavailablePokemon(id);
    const isHuntingCard = !unavailable && !p.caught && (counterMode || p.hunting || p.huntCount);
    const cardRegion = showGenerationDividers ? getRegionByPokemonId(id) : null;
    if (showGenerationDividers) {
      const region = cardRegion;
      if (region && region.gen !== lastDividerGen) {
        grid.appendChild(createGenerationDivider(region, previousDividerRegion));
        previousDividerRegion = region;
        lastDividerGen = region.gen;
      }
    }
    const card = document.createElement('div');
    card.className = 'card' + (isHomeSpriteMode() ? ' sprite-home' : '') + (p.caught && !unavailable ? ' caught' : '') + (p.perfect && !unavailable ? ' perfect' : '') + (isHuntingCard ? ' hunting' : '') + (unavailable ? ' unavailable' : '');
    setRegionVisualVars(card, getRegionByPokemonId(id));
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', `${name}, #${String(id).padStart(4,'0')}${p.caught ? ', shiny capture' : (isHuntingCard ? ', en cours' : ', manquant')}`);
    card.onclick = () => { if (!unavailable) activatePokemonCard(card, id); };
    card.onkeydown = e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (!unavailable) activatePokemonCard(card, id);
      }
    };

    const useShinySprite = !!p.caught;
    const spriteUrl = getPokemonSpriteUrl(id, useShinySprite);
    const typeBadges = renderTypeBadges(id);
    const statusHtml = unavailable ? 'Indisponible' : getCardStatusHtml(p, isHuntingCard);

    card.innerHTML = `
      <div class="num">#${String(id).padStart(4,'0')}</div>
      <div class="pname">${name}</div>
      <div class="type-row">${typeBadges}</div>
      <img src="${spriteUrl}"
             alt="${name}" loading="lazy" width="64" height="64" onerror="handleSpriteError(this, ${id}, ${useShinySprite})">
      <div class="status">${statusHtml}</div>`;
    grid.appendChild(card);
  });

  if (ids.length === 0) {
    grid.innerHTML = '<div class="empty">Aucun Pokémon trouvé.</div>';
  }
}

/* ══════════════════════════════════════
   SIDEBAR TOGGLE
══════════════════════════════════════ */
function toggleSidebar() {
  setSidebar(!sidebarOpen);
}

function setSidebar(open) {
  sidebarOpen = open;
  const sb  = document.getElementById('sidebar');
  const tog = document.getElementById('sidebarToggle');
  const backdrop = document.getElementById('sidebarBackdrop');
  sb.classList.toggle('open', sidebarOpen);
  tog.classList.toggle('open', sidebarOpen);
  backdrop.classList.toggle('open', sidebarOpen);
  tog.innerHTML = sidebarOpen ? '&#9664;' : '&#9654;';
  sb.style.transform = '';
}

function initSidebarSwipe() {
  const sb = document.getElementById('sidebar');
  const maxWidth = () => parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'), 10) || 220;
  let startX = 0;
  let startY = 0;
  let dragging = false;
  let canDrag = false;

  document.addEventListener('touchstart', e => {
    if (window.innerWidth > 720 || e.touches.length !== 1) return;
    if (document.getElementById('overlay')?.classList.contains('open')) return;
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    canDrag = true;
    if (!canDrag) return;
    startX = x;
    startY = y;
    dragging = false;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!canDrag || window.innerWidth > 720 || e.touches.length !== 1) return;
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    const dx = x - startX;
    if (!dragging && Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(y - startY)) {
      dragging = true;
      sb.classList.add('dragging');
    }
    if (!dragging) return;
    e.preventDefault();
    const w = maxWidth();
    const offset = sidebarOpen ? Math.min(0, dx) : Math.min(0, -w + Math.max(0, dx));
    sb.style.transform = `translateX(${offset}px)`;
  }, { passive: false });

  document.addEventListener('touchend', e => {
    if (!canDrag) return;
    const endX = e.changedTouches[0]?.clientX || startX;
    const dx = endX - startX;
    sb.classList.remove('dragging');
    sb.style.transform = '';
    if (dragging) {
      if (!sidebarOpen && dx > 58) setSidebar(true);
      else if (sidebarOpen && dx < -58) setSidebar(false);
      else setSidebar(sidebarOpen);
    }
    canDrag = false;
    dragging = false;
  }, { passive: true });
}

function initPullToRefresh() {
  const main = document.getElementById('mainContent');
  const indicator = document.getElementById('pullRefresh');
  if (!main || !indicator) return;

  let startY = 0;
  let pulling = false;
  let distance = 0;
  const threshold = 76;

  main.addEventListener('touchstart', e => {
    if (main.scrollTop > 0 || e.touches.length !== 1) return;
    startY = e.touches[0].clientY;
    pulling = true;
    distance = 0;
  }, { passive: true });

  main.addEventListener('touchmove', e => {
    if (!pulling || e.touches.length !== 1) return;
    distance = e.touches[0].clientY - startY;
    if (distance <= 0 || main.scrollTop > 0) {
      indicator.classList.remove('visible', 'ready');
      return;
    }
    e.preventDefault();
    const offset = Math.min(distance * .42, 58);
    indicator.style.transform = `translate(-50%,${offset}px)`;
    indicator.textContent = distance >= threshold ? 'Relâche pour actualiser' : 'Tire pour actualiser';
    indicator.classList.toggle('ready', distance >= threshold);
    indicator.classList.add('visible');
  }, { passive: false });

  main.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    const shouldRefresh = distance >= threshold;
    distance = 0;
    if (shouldRefresh) {
      indicator.textContent = 'Actualisation...';
      indicator.classList.add('visible', 'ready');
      refreshApp();
      return;
    }
    indicator.classList.remove('visible', 'ready');
    indicator.style.transform = '';
  }, { passive: true });
}

function getModalRange() {
  return currentRegion === 'all' ? getAllRegionStats() : REGIONS[currentRegion];
}

function getAdjacentModalId(direction, fromId = currentPokemon) {
  if (!fromId) return null;
  const range = getModalRange();
  const baseId = getPokemonBaseId(fromId);
  if (!range) return null;
  let nextId = baseId + direction;
  while (nextId >= range.start && nextId <= range.end) {
    if (!isUnavailablePokemon(nextId)) return nextId;
    nextId += direction;
  }
  return null;
}

function goToAdjacentModal(direction) {
  const nextId = getAdjacentModalId(direction);
  if (!nextId) return;
  openModal(nextId);
}

function updateModalNavCard(direction) {
  const button = document.getElementById(direction < 0 ? 'modalPrevCard' : 'modalNextCard');
  if (!button) return;
  const id = getAdjacentModalId(direction);
  if (!id) {
    button.disabled = true;
    button.innerHTML = '';
    return;
  }
  const p = progress[id] || {};
  const name = getPokemonDisplayName(id);
  button.disabled = false;
  button.setAttribute('aria-label', direction < 0 ? `Pokémon précédent : ${name}` : `Pokémon suivant : ${name}`);
  button.innerHTML = `
    <img src="${getPokemonSpriteUrl(id, !!p.caught, isHomeSpriteMode() ? 'home' : 'pixel')}"
         alt="" width="34" height="34" onerror="handleSpriteError(this, ${id}, ${!!p.caught})">
    <span>${name}</span>`;
}

function updateRegionalFormLink(id) {
  const button = document.getElementById('regionalFormLink');
  if (!button) return;
  const form = getRegionalFormById(id);
  const targetId = form ? form.baseId : getPrimaryRegionalFormId(id);
  if (!targetId) {
    button.classList.remove('visible');
    button.onclick = null;
    button.textContent = '';
    return;
  }
  const targetName = getPokemonDisplayName(targetId);
  button.classList.add('visible');
  button.textContent = form ? 'Forme de base' : 'Forme régionale';
  button.setAttribute('aria-label', `Ouvrir ${targetName}`);
  button.onclick = () => openModal(targetId);
}

function updateModalNavigation(id) {
  updateModalNavCard(-1);
  updateModalNavCard(1);
  updateRegionalFormLink(id);
}

function initModalSwipe() {
  const modal = document.querySelector('#overlay .modal');
  const overlay = document.getElementById('overlay');
  if (!modal || !overlay) return;

  let startX = 0;
  let startY = 0;
  let dragging = false;
  let canSwipe = false;

  modal.addEventListener('touchstart', e => {
    if (!overlay.classList.contains('open') || !currentPokemon || e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dragging = false;
    canSwipe = true;
  }, { passive: true });

  modal.addEventListener('touchmove', e => {
    if (!canSwipe || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!dragging && Math.abs(dx) > 24 && Math.abs(dx) > Math.abs(dy) * 1.35) {
      dragging = true;
    }
    if (dragging) e.preventDefault();
  }, { passive: false });

  modal.addEventListener('touchend', e => {
    if (!canSwipe) return;
    const endX = e.changedTouches[0]?.clientX || startX;
    const endY = e.changedTouches[0]?.clientY || startY;
    const dx = endX - startX;
    const dy = endY - startY;
    canSwipe = false;
    dragging = false;
    if (Math.abs(dx) < 72 || Math.abs(dx) < Math.abs(dy) * 1.35) return;
    goToAdjacentModal(dx < 0 ? 1 : -1);
  }, { passive: true });

  modal.addEventListener('touchcancel', () => {
    canSwipe = false;
    dragging = false;
  }, { passive: true });
}

function refreshApp() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistration().then(registration => {
      if (registration) return registration.update();
    }).finally(() => window.location.reload());
    return;
  }
  window.location.reload();
}

function switchRegion(i) {
  if (i === currentRegion && !currentPokemon) {
    if (window.innerWidth <= 720) setSidebar(false);
    return;
  }
  currentRegion = i;
  currentPokemon = null;
  sessionStorage.setItem(REGION_SESSION_KEY, String(i));
  scrollMainToTop();
  document.getElementById('searchInput').value = '';
  const filterSelect = document.getElementById('filterSelect');
  if (filterSelect) filterSelect.value = 'all';
  renderSidebar();
  renderStats();
  renderRegion();
  if (window.innerWidth <= 720) setSidebar(false);
  updateAppHistory('push');
  requestAnimationFrame(() => {
    scrollMainToTop();
    requestAnimationFrame(scrollMainToTop);
  });
}

function goHomeFromLogo() {
  currentRegion = 'all';
  currentPokemon = null;
  sessionStorage.setItem(REGION_SESSION_KEY, 'all');
  document.getElementById('searchInput').value = '';
  const filterSelect = document.getElementById('filterSelect');
  if (filterSelect) filterSelect.value = 'all';
  const sortSelect = document.getElementById('sortSelect');
  if (sortSelect) sortSelect.value = 'number';
  closeModal({ skipHistory: true });
  renderSidebar();
  renderStats();
  renderRegion();
  setSidebar(false);
  updateAppHistory('push');
  requestAnimationFrame(() => {
    scrollMainToTop();
    requestAnimationFrame(scrollMainToTop);
  });
}

function scrollMainToTop() {
  const main = document.getElementById('mainContent');
  if (main) {
    main.scrollTop = 0;
    main.scrollLeft = 0;
    main.scrollTo({ top: 0, left: 0, behavior: 'auto' });
  }
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
  window.scrollTo(0, 0);
}

function isHuntingMode() {
  return counterMode;
}

function setModalCounterMode(enabled) {
  enabled = !!enabled && !!currentPokemon && !progress[currentPokemon]?.caught;
  const modal = document.querySelector('#overlay .modal');
  modal?.classList.toggle('hunt-mode', enabled);
  document.getElementById('huntPanel')?.classList.toggle('open', enabled);
  const button = document.getElementById('modalCounterBtn');
  if (button) button.textContent = enabled ? 'Formulaire' : 'Compteur';
  if (enabled) renderHuntCounter();
}

function toggleModalCounter() {
  const modal = document.querySelector('#overlay .modal');
  const enabled = !modal?.classList.contains('hunt-mode');
  setModalCounterMode(enabled);
  document.getElementById('modalCounterBtn')?.blur();
}

function saveProgressEntry(id, entry) {
  const hasIvs = entry.ivs && Object.values(entry.ivs).some(Boolean);
  const isEmpty = !entry.caught && !entry.perfect && !entry.hunting && !entry.huntCount && !entry.nickname && !entry.encounters && !entry.eggs && !entry.date && !entry.context && !entry.youtube && !entry.pokeball && !entry.nature && !hasIvs;
  if (isEmpty) delete progress[id];
  else progress[id] = entry;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  updateHeaderHuntSprite();
}

function registerHuntStart(id) {
  const order = readStoredIdList(HUNT_ORDER_KEY).filter(storedId => {
    const p = progress[storedId] || {};
    return !p.caught && (parseInt(p.huntCount) || 0) > 0;
  });
  if (!order.includes(id)) order.push(id);
  writeStoredIdList(HUNT_ORDER_KEY, order);
}

function unregisterHunt(id) {
  writeStoredIdList(HUNT_ORDER_KEY, readStoredIdList(HUNT_ORDER_KEY).filter(storedId => storedId !== id));
}

function registerHuntCapture(id) {
  unregisterHunt(id);
  const captured = readStoredIdList(HUNT_CAPTURED_KEY).filter(storedId => storedId !== id && progress[storedId]?.caught);
  captured.push(id);
  localStorage.setItem(HUNT_CAPTURED_KEY, JSON.stringify(captured.slice(-2)));
}

function getCurrentHuntEntry() {
  if (!currentPokemon) return null;
  const existing = progress[currentPokemon] || {};
  const entry = { ...existing };
  entry.hunting = true;
  entry.huntCount = parseInt(entry.huntCount) || 0;
  return entry;
}

function renderHuntCounter() {
  const counter = document.getElementById('huntCount');
  if (!counter || !currentPokemon) return;
  const count = parseInt(progress[currentPokemon]?.huntCount) || 0;
  const oddsMeta = getHuntOddsMeta(currentPokemon);
  const chance = getCumulativeShinyChance(count, oddsMeta.odds);
  const chanceText = chance.toLocaleString('fr-FR', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  }) + '%';
  counter.textContent = count.toLocaleString('fr-FR');
  const oddsLabel = document.getElementById('huntOddsLabel');
  const oddsChance = document.getElementById('huntOddsChance');
  const oddsFill = document.getElementById('huntOddsFill');
  if (oddsLabel) oddsLabel.textContent = oddsMeta.label;
  if (oddsChance) oddsChance.textContent = chanceText;
  if (oddsFill) oddsFill.style.width = `${Math.min(100, chance)}%`;
}

function adjustHuntCounter(delta) {
  const entry = getCurrentHuntEntry();
  if (!entry) return;
  const previousCount = parseInt(entry.huntCount) || 0;
  entry.huntCount = Math.max(0, (parseInt(entry.huntCount) || 0) + delta);
  if (previousCount === 0 && entry.huntCount > 0) registerHuntStart(currentPokemon);
  if (entry.huntCount === 0) {
    entry.hunting = false;
    unregisterHunt(currentPokemon);
  }
  saveProgressEntry(currentPokemon, entry);
  renderHuntCounter();
  renderGrid();
}

function resetHuntCounter() {
  const entry = getCurrentHuntEntry();
  if (!entry) return;
  entry.huntCount = 0;
  entry.hunting = false;
  unregisterHunt(currentPokemon);
  saveProgressEntry(currentPokemon, entry);
  renderHuntCounter();
  renderGrid();
}

function markHuntFound() {
  const entry = getCurrentHuntEntry();
  if (!entry) return;
  entry.caught = true;
  entry.hunting = false;
  entry.encounters = parseInt(entry.huntCount) || parseInt(entry.encounters) || 0;
  entry.huntCount = 0;
  registerHuntCapture(currentPokemon);
  saveProgressEntry(currentPokemon, entry);
  closeModal();
  renderAll();
}

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
function openModal(id, options = {}) {
  if (isUnavailablePokemon(id)) return;
  currentPokemon = id;
  initModalChoiceLists();
  const form = getRegionalFormById(id);
  const baseId = form?.baseId || id;
  const p    = progress[id] || {};
  const name = getPokemonDisplayName(id);
  const r    = REGIONS.find(r => baseId >= r.start && baseId <= r.end) || getAllRegionStats();
  const huntMode = isHuntingMode() && !p.caught;

  const normalSprite = document.getElementById('mSprite');
  const shinySprite = document.getElementById('mSpriteShiny');
  normalSprite.onerror = () => handleSpriteError(normalSprite, id, false);
  shinySprite.onerror = () => handleSpriteError(shinySprite, id, true);
  normalSprite.src = getPokemonModalSpriteUrl(id, false);
  shinySprite.src = getPokemonModalSpriteUrl(id, true);
  document.getElementById('mNum').textContent = `#${String(baseId).padStart(4,'0')}`;
  document.getElementById('mName').textContent = name;
  document.getElementById('mRegion').innerHTML = `<span style="color:${r.color};font-family:var(--font-logo);font-size:10px;line-height:1.45">${r.name} · Génération ${r.gen}</span>`;
  updateModalNavigation(id);
  document.getElementById('fPokeball').value = p.pokeball || '';
  document.getElementById('fNature').value = p.nature || '';
  updatePokeballPreview();
  updateModalBallIcon(p.pokeball || '');

  document.getElementById('fCaught').checked   = !!p.caught;
  document.getElementById('fPerfect').checked  = !!p.perfect;
  document.getElementById('fNickname').value   = p.nickname   || '';
  document.getElementById('fEncounters').value = p.encounters || '';
  document.getElementById('fEggs').value       = p.eggs       || '';
  document.getElementById('fDate').value       = p.date       || '';
  document.getElementById('fContext').value    = p.context    || '';
  document.getElementById('fYoutube').value    = p.youtube    || '';

  const ivs = p.ivs || {};
  document.getElementById('ivHP').checked  = !!ivs.hp;
  document.getElementById('ivAtk').checked = !!ivs.atk;
  document.getElementById('ivDef').checked = !!ivs.def;
  document.getElementById('ivSpa').checked = !!ivs.spa;
  document.getElementById('ivSpd').checked = !!ivs.spd;
  document.getElementById('ivSpe').checked = !!ivs.spe;

  const btn = document.getElementById('saveBtn');
  btn.style.background   = r.dark;
  btn.style.borderColor  = r.color;
  btn.style.color        = r.color;

  const modal = document.querySelector('#overlay .modal');
  setModalCounterMode(huntMode);
  if (modal) modal.scrollTop = 0;
  document.getElementById('overlay').classList.add('open');
  playPokemonCry(baseId);
  if (!options.skipHistory) updateAppHistory('push');
  requestAnimationFrame(() => {
    if (modal) modal.scrollTop = 0;
  });
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}
function closeModal(options = {}) {
  const modal = document.querySelector('#overlay .modal');
  document.getElementById('overlay').classList.remove('open');
  modal?.classList.remove('hunt-mode');
  document.getElementById('huntPanel')?.classList.remove('open');
  if (modal) modal.scrollTop = 0;
  currentPokemon = null;
  if (!options.skipHistory) updateAppHistory('push');
}

function saveModal() {
  if (!currentPokemon) return;
  const enc  = parseInt(document.getElementById('fEncounters').value) || 0;
  const eggs = parseInt(document.getElementById('fEggs').value) || 0;
  const existing = progress[currentPokemon] || {};
  const entry = {
    caught:    document.getElementById('fCaught').checked,
    perfect:   document.getElementById('fPerfect').checked,
    hunting:   !document.getElementById('fCaught').checked && !!existing.hunting,
    huntCount: !document.getElementById('fCaught').checked ? (parseInt(existing.huntCount) || 0) : 0,
    nickname:  document.getElementById('fNickname').value.trim(),
    encounters: enc,
    eggs:      eggs,
    date:      document.getElementById('fDate').value,
    context:   document.getElementById('fContext').value.trim(),
    youtube:   document.getElementById('fYoutube').value.trim(),
    pokeball:  document.getElementById('fPokeball').value,
    nature:    document.getElementById('fNature').value,
    ivs: {
      hp:  document.getElementById('ivHP').checked,
      atk: document.getElementById('ivAtk').checked,
      def: document.getElementById('ivDef').checked,
      spa: document.getElementById('ivSpa').checked,
      spd: document.getElementById('ivSpd').checked,
      spe: document.getElementById('ivSpe').checked,
    }
  };
  // Supprime les entrées vraiment vides
  saveProgressEntry(currentPokemon, entry);
  closeModal();
  renderAll();
}

/* ══════════════════════════════════════
   IMPORT / EXPORT
   — Exporte au format pokemon.json (tableau)
     pour pouvoir le republier sur GitHub
══════════════════════════════════════ */
function exportJSON() {
  const out = [];
  const exportIds = [
    ...Array.from({ length: 1025 }, (_, index) => index + 1),
    ...REGIONAL_FORMS.map(form => form.formId)
  ];
  for (const id of exportIds) {
    const p    = progress[id] || {};
    const ivs  = p.ivs || {};
    const ivStr = [
      ivs.hp  ? 'PV'      : '',
      ivs.atk ? 'Atq'     : '',
      ivs.def ? 'Déf'     : '',
      ivs.spa ? 'Atq Spé' : '',
      ivs.spd ? 'Déf Spé' : '',
      ivs.spe ? 'Vitesse' : '',
    ].filter(Boolean).join(' / ');

    // N'inclut que les entrées non vides
    if (!p.caught && !p.perfect && !p.hunting && !p.huntCount && !p.nickname && !p.encounters && !p.eggs && !p.date && !p.context && !p.youtube && !p.pokeball && !p.nature && !ivStr) continue;

    out.push({
      'N° pokédex':          id,
      'Noms':                getPokemonDisplayName(id),
      'Forme de base':       getRegionalFormById(id)?.baseId || '',
      'Région forme':        getRegionalFormById(id)?.region || '',
      'Capturé':             p.caught ? 'oui' : '',
      'Surnoms':             p.nickname   || '',
      'Oeufs parent parfait': p.eggs      || '',
      'Nombre de rencontres': p.encounters || '',
      'En cours':             p.hunting ? 'oui' : '',
      'Compteur en cours':    p.huntCount || '',
      'Date de capture':     p.date        || '',
      'Lien YouTube':        p.youtube     || '',
      'Contexte de capture': p.context     || '',
      'Pokéball':            p.pokeball    || '',
      'Nature':              p.nature      || '',
      'IV parfaits':         ivStr,
      'Parfait':             p.perfect ? '✓' : '',
    });
  }
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pokemon.json';
  a.click();
}

async function shareAppLink() {
  const url = new URL('./', location.href).href;
  const data = {
    title: 'Shiny Living Dex',
    text: 'Voici mon Shiny Living Dex',
    url
  };
  try {
    if (navigator.share) {
      await navigator.share(data);
    } else if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(url);
      alert('Lien copié dans le presse-papiers.');
    } else {
      prompt('Copie ce lien pour le partager :', url);
    }
  } catch (err) {
    if (err?.name !== 'AbortError') {
      try {
        await navigator.clipboard?.writeText(url);
        alert('Lien copié dans le presse-papiers.');
      } catch (_) {
        prompt('Copie ce lien pour le partager :', url);
      }
    }
  }
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        // Format tableau pokemon.json
        pokedexData = {};
        data.forEach(p => {
          const id = p['N° pokédex'] || p['id'];
          if (id) pokedexData[id] = p;
        });
        mergePokedexIntoProgress();
      } else {
        // Format objet progress direct
        progress = sanitizeProgress(data);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
      renderAll();
    } catch(err) {
      alert('Fichier JSON invalide ou corrompu.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function lockPortraitOrientation() {
  if (!screen.orientation?.lock) return;
  screen.orientation.lock('portrait-primary').catch(() => {});
}
