function hexToRgbString(hex) {
  const clean = String(hex || '').replace('#', '').trim();
  if (!/^[0-9a-fA-F]{6}$/.test(clean)) return '125,211,252';
  return [
    parseInt(clean.slice(0, 2), 16),
    parseInt(clean.slice(2, 4), 16),
    parseInt(clean.slice(4, 6), 16)
  ].join(',');
}

function setRegionVisualVars(element, region, prefix = 'region') {
  if (!element || !region) return;
  element.style.setProperty(`--${prefix}-color`, region.color);
  element.style.setProperty(`--${prefix}-rgb`, hexToRgbString(region.color));
}

function setGridVisualVars(grid, region) {
  if (!grid) return;
  const activeRegion = currentRegion === 'all' ? REGIONS[0] : region;
  const nextRegion = currentRegion === 'all'
    ? REGIONS[REGIONS.length - 1]
    : REGIONS[Math.min(REGIONS.length - 1, (REGIONS.indexOf(activeRegion) || 0) + 1)];
  grid.style.setProperty('--grid-rgb', hexToRgbString(activeRegion?.color || '#7dd3fc'));
  grid.style.setProperty('--grid-next-rgb', hexToRgbString(nextRegion?.color || '#c084fc'));
}

function createGenerationDivider(region, previousRegion = null) {
  const divider = document.createElement('div');
  divider.className = 'generation-divider';
  divider.style.setProperty('--gen-color', region.color);
  divider.style.setProperty('--gen-rgb', hexToRgbString(region.color));
  divider.style.setProperty('--prev-gen-color', previousRegion?.color || region.color);
  divider.style.setProperty('--prev-gen-rgb', hexToRgbString(previousRegion?.color || region.color));
  divider.innerHTML = `
    <strong>${region.name}</strong>
    <span>Génération ${region.gen} · #${region.start}-${region.end}</span>`;
  return divider;
}

function matchesRegionalSearch(form, search) {
  if (!search) return true;
  const baseName = (NAMES[form.baseId] || '').toLowerCase();
  return baseName.includes(search)
    || form.label.toLowerCase().includes(search)
    || form.region.toLowerCase().includes(search)
    || String(form.baseId).includes(search);
}

function getRegionalFormsForScope(range, search) {
  return REGIONAL_FORMS
    .filter(form => form.baseId >= range.start && form.baseId <= range.end)
    .filter(form => matchesRegionalSearch(form, search))
    .sort((a, b) => a.baseId - b.baseId || a.region.localeCompare(b.region, 'fr') || a.label.localeCompare(b.label, 'fr'));
}

function getCardStatusHtml(p, isHuntingCard = false) {
  if (isHuntingCard) return '<span>En cours</span>';
  if (p.caught && p.perfect) {
    return '<span class="status-pair"><span class="status-shiny">Shiny</span><span class="status-perfect">Parfait</span></span>';
  }
  return p.caught ? '<span class="status-shiny">Shiny</span>' : 'Manquant';
}

function createRegionalOriginalCard(id) {
  const name = NAMES[id] || `#${id}`;
  const p = progress[id] || {};
  const isHuntingCard = !p.caught && (p.hunting || p.huntCount);
  const statusHtml = getCardStatusHtml(p, isHuntingCard);
  const card = document.createElement('div');
  card.className = 'card form-original' + (isHomeSpriteMode() ? ' sprite-home' : '') + (p.caught ? ' caught' : '') + (p.perfect ? ' perfect' : '') + (isHuntingCard ? ' hunting' : '');
  setRegionVisualVars(card, getRegionByPokemonId(id));
  card.setAttribute('role', 'button');
  card.setAttribute('tabindex', '0');
  card.setAttribute('aria-label', `${name}, forme originale`);
  card.onclick = () => activatePokemonCard(card, id);
  card.onkeydown = e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      activatePokemonCard(card, id);
    }
  };
  card.innerHTML = `
    <div class="form-tag">Base</div>
    <div class="num">#${String(id).padStart(4,'0')}</div>
    <div class="pname">${name}</div>
    <div class="type-row">${renderTypeBadges(id)}</div>
    <img src="${getPokemonSpriteUrl(id, !!p.caught)}"
         alt="${name}" loading="lazy" width="64" height="64" onerror="handleSpriteError(this, ${id}, ${!!p.caught})">
    <div class="status">${statusHtml}</div>`;
  return card;
}

function createRegionalFormCard(form) {
  const p = progress[form.formId] || {};
  const isHuntingCard = !p.caught && (p.hunting || p.huntCount);
  const unavailable = isUnavailablePokemon(form.formId);
  const statusHtml = unavailable ? 'Indisponible' : getCardStatusHtml(p, isHuntingCard);
  const card = document.createElement('div');
  card.className = 'card form-card' + (isHomeSpriteMode() ? ' sprite-home' : '') + (p.caught && !unavailable ? ' caught' : '') + (p.perfect && !unavailable ? ' perfect' : '') + (isHuntingCard && !unavailable ? ' hunting' : '') + (unavailable ? ' unavailable' : '');
  setRegionVisualVars(card, REGIONS.find(region => region.name === form.region) || getRegionByPokemonId(form.baseId));
  card.setAttribute('role', 'button');
  card.setAttribute('tabindex', '0');
  card.setAttribute('aria-label', `${form.label}, forme de ${form.region}`);
  card.onclick = () => { if (!unavailable) activatePokemonCard(card, form.formId); };
  card.onkeydown = e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      if (!unavailable) activatePokemonCard(card, form.formId);
    }
  };
  card.innerHTML = `
    <div class="form-tag">${form.region}</div>
    <div class="num">#${String(form.baseId).padStart(4,'0')}</div>
    <div class="pname">${form.label}</div>
    <div class="type-row">${renderTypeBadgesForTypes(form.types)}</div>
    <img src="${getPokemonSpriteUrl(form.formId, !!p.caught, isHomeSpriteMode() ? 'home' : 'pixel')}"
         alt="${form.label}" loading="lazy" width="64" height="64" onerror="handleSpriteError(this, ${form.formId}, ${!!p.caught})">
    <div class="status">${statusHtml}</div>`;
  return card;
}

function renderRegionalFormsGrid(range, search, grid) {
  const forms = getRegionalFormsForScope(range, search);
  forms.forEach(form => grid.appendChild(createRegionalFormCard(form)));
  if (!forms.length) {
    grid.innerHTML = '<div class="empty">Aucune forme régionale trouvée.</div>';
  }
}

function renderGrid() {
  const r      = currentRegion === 'all' ? getAllRegionStats() : REGIONS[currentRegion];
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filter = document.getElementById('filterSelect')?.value || 'all';
  const sort   = document.getElementById('sortSelect')?.value || 'number';
  const isHuntingView = counterMode;
  const grid   = document.getElementById('grid');
  grid.classList.toggle('hunt-grid', isHuntingView);
  setGridVisualVars(grid, r);
  grid.innerHTML = '';
  const ids = [];

  if (!counterMode && sort === 'forms') {
    renderRegionalFormsGrid(r, search, grid);
    return;
  }

  for (let id = r.start; id <= r.end; id++) {
    const name = NAMES[id] || `#${id}`;
    const p    = progress[id] || {};
    const unavailable = isUnavailablePokemon(id);
    if (search && !name.toLowerCase().includes(search) && !String(id).includes(search)) continue;
    if (counterMode && (p.caught || (parseInt(p.huntCount) || 0) < 1)) continue;
    if (sort === 'legendary' && !LEGENDARY_ODDS_BASE_IDS.has(id)) continue;
    if (unavailable && ['caught','missing','perfect','date-desc','date-asc'].includes(sort)) continue;
    if (!pokemonMatchesSortMode(p, sort)) continue;
    if (filter === 'caught'  && !p.caught)  continue;
    if (filter === 'missing' && p.caught)   continue;
    if (filter === 'perfect' && (!p.caught || !p.perfect)) continue;
    ids.push(id);
  }

  ids.sort((a, b) => {
    if (!counterMode) return comparePokemonBySort(a, b, sort);
    const pa = progress[a] || {};
    const pb = progress[b] || {};
    const ha = !!pa.hunting || !!pa.huntCount;
    const hb = !!pb.hunting || !!pb.huntCount;
    if (ha !== hb) return ha ? -1 : 1;
    const ca = parseInt(pa.huntCount) || 0;
    const cb = parseInt(pb.huntCount) || 0;
    if (ca !== cb) return cb - ca;
    return a - b;
  });

  let lastDividerGen = null;
  let previousDividerRegion = null;
  const showGenerationDividers = currentRegion === 'all' && (sort === 'number' || sort === 'legendary') && !counterMode;

  ids.forEach(id => {
    const name = NAMES[id] || `#${id}`;
    const p    = progress[id] || {};
    const unavailable = isUnavailablePokemon(id);
    const isHuntingCard = !unavailable && !p.caught && (counterMode || p.hunting || p.huntCount);
    const cardRegion = showGenerationDividers ? getRegionByPokemonId(id) : null;
    if (showGenerationDividers) {
      const region = cardRegion;
      if (region && region.gen !== lastDividerGen) {
        grid.appendChild(createGenerationDivider(region, previousDividerRegion));
        previousDividerRegion = region;
        lastDividerGen = region.gen;
      }
    }
    const card = document.createElement('div');
    card.className = 'card' + (isHomeSpriteMode() ? ' sprite-home' : '') + (p.caught && !unavailable ? ' caught' : '') + (p.perfect && !unavailable ? ' perfect' : '') + (isHuntingCard ? ' hunting' : '') + (unavailable ? ' unavailable' : '');
    setRegionVisualVars(card, getRegionByPokemonId(id));
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', `${name}, #${String(id).padStart(4,'0')}${p.caught ? ', shiny capture' : (isHuntingCard ? ', en cours' : ', manquant')}`);
    card.onclick = () => { if (!unavailable) activatePokemonCard(card, id); };
    card.onkeydown = e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (!unavailable) activatePokemonCard(card, id);
      }
    };

    const useShinySprite = !!p.caught;
    const spriteUrl = getPokemonSpriteUrl(id, useShinySprite);
    const typeBadges = renderTypeBadges(id);
    const statusHtml = unavailable ? 'Indisponible' : getCardStatusHtml(p, isHuntingCard);

    card.innerHTML = `
      <div class="num">#${String(id).padStart(4,'0')}</div>
      <div class="pname">${name}</div>
      <div class="type-row">${typeBadges}</div>
      <img src="${spriteUrl}"
             alt="${name}" loading="lazy" width="64" height="64" onerror="handleSpriteError(this, ${id}, ${useShinySprite})">
      <div class="status">${statusHtml}</div>`;
    grid.appendChild(card);
  });

  if (ids.length === 0) {
    grid.innerHTML = '<div class="empty">Aucun Pokémon trouvé.</div>';
  }
}

/* ══════════════════════════════════════
   SIDEBAR TOGGLE
══════════════════════════════════════ */
function toggleSidebar() {
  setSidebar(!sidebarOpen);
}

function setSidebar(open) {
  sidebarOpen = open;
  const sb  = document.getElementById('sidebar');
  const tog = document.getElementById('sidebarToggle');
  const backdrop = document.getElementById('sidebarBackdrop');
  sb.classList.toggle('open', sidebarOpen);
  tog.classList.toggle('open', sidebarOpen);
  backdrop.classList.toggle('open', sidebarOpen);
  tog.innerHTML = sidebarOpen ? '&#9664;' : '&#9654;';
  sb.style.transform = '';
}

function initSidebarSwipe() {
  const sb = document.getElementById('sidebar');
  const maxWidth = () => parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'), 10) || 220;
  let startX = 0;
  let startY = 0;
  let dragging = false;
  let canDrag = false;

  document.addEventListener('touchstart', e => {
    if (window.innerWidth > 720 || e.touches.length !== 1) return;
    if (document.getElementById('overlay')?.classList.contains('open')) return;
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    canDrag = true;
    if (!canDrag) return;
    startX = x;
    startY = y;
    dragging = false;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!canDrag || window.innerWidth > 720 || e.touches.length !== 1) return;
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    const dx = x - startX;
    if (!dragging && Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(y - startY)) {
      dragging = true;
      sb.classList.add('dragging');
    }
    if (!dragging) return;
    e.preventDefault();
    const w = maxWidth();
    const offset = sidebarOpen ? Math.min(0, dx) : Math.min(0, -w + Math.max(0, dx));
    sb.style.transform = `translateX(${offset}px)`;
  }, { passive: false });

  document.addEventListener('touchend', e => {
    if (!canDrag) return;
    const endX = e.changedTouches[0]?.clientX || startX;
    const dx = endX - startX;
    sb.classList.remove('dragging');
    sb.style.transform = '';
    if (dragging) {
      if (!sidebarOpen && dx > 58) setSidebar(true);
      else if (sidebarOpen && dx < -58) setSidebar(false);
      else setSidebar(sidebarOpen);
    }
    canDrag = false;
    dragging = false;
  }, { passive: true });
}

function initPullToRefresh() {
  const main = document.getElementById('mainContent');
  const indicator = document.getElementById('pullRefresh');
  if (!main || !indicator) return;

  let startY = 0;
  let pulling = false;
  let distance = 0;
  const threshold = 76;

  main.addEventListener('touchstart', e => {
    if (main.scrollTop > 0 || e.touches.length !== 1) return;
    startY = e.touches[0].clientY;
    pulling = true;
    distance = 0;
  }, { passive: true });

  main.addEventListener('touchmove', e => {
    if (!pulling || e.touches.length !== 1) return;
    distance = e.touches[0].clientY - startY;
    if (distance <= 0 || main.scrollTop > 0) {
      indicator.classList.remove('visible', 'ready');
      return;
    }
    e.preventDefault();
    const offset = Math.min(distance * .42, 58);
    indicator.style.transform = `translate(-50%,${offset}px)`;
    indicator.textContent = distance >= threshold ? 'Relâche pour actualiser' : 'Tire pour actualiser';
    indicator.classList.toggle('ready', distance >= threshold);
    indicator.classList.add('visible');
  }, { passive: false });

  main.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    const shouldRefresh = distance >= threshold;
    distance = 0;
    if (shouldRefresh) {
      indicator.textContent = 'Actualisation...';
      indicator.classList.add('visible', 'ready');
      refreshApp();
      return;
    }
    indicator.classList.remove('visible', 'ready');
    indicator.style.transform = '';
  }, { passive: true });
}

function getModalRange() {
  return currentRegion === 'all' ? getAllRegionStats() : REGIONS[currentRegion];
}

function getAdjacentModalId(direction, fromId = currentPokemon) {
  if (!fromId) return null;
  const range = getModalRange();
  const baseId = getPokemonBaseId(fromId);
  if (!range) return null;
  let nextId = baseId + direction;
  while (nextId >= range.start && nextId <= range.end) {
    if (!isUnavailablePokemon(nextId)) return nextId;
    nextId += direction;
  }
  return null;
}

function goToAdjacentModal(direction) {
  const nextId = getAdjacentModalId(direction);
  if (!nextId) return;
  openModal(nextId);
}

function updateModalNavCard(direction) {
  const button = document.getElementById(direction < 0 ? 'modalPrevCard' : 'modalNextCard');
  if (!button) return;
  const id = getAdjacentModalId(direction);
  if (!id) {
    button.disabled = true;
    button.innerHTML = '';
    return;
  }
  const p = progress[id] || {};
  const name = getPokemonDisplayName(id);
  button.disabled = false;
  button.setAttribute('aria-label', direction < 0 ? `Pokémon précédent : ${name}` : `Pokémon suivant : ${name}`);
  button.innerHTML = `
    <img src="${getPokemonSpriteUrl(id, !!p.caught, isHomeSpriteMode() ? 'home' : 'pixel')}"
         alt="" width="34" height="34" onerror="handleSpriteError(this, ${id}, ${!!p.caught})">
    <span>${name}</span>`;
}

function updateRegionalFormLink(id) {
  const button = document.getElementById('regionalFormLink');
  if (!button) return;
  const form = getRegionalFormById(id);
  const targetId = form ? form.baseId : getPrimaryRegionalFormId(id);
  if (!targetId) {
    button.classList.remove('visible');
    button.onclick = null;
    button.textContent = '';
    return;
  }
  const targetName = getPokemonDisplayName(targetId);
  button.classList.add('visible');
  button.textContent = form ? 'Forme de base' : 'Forme régionale';
  button.setAttribute('aria-label', `Ouvrir ${targetName}`);
  button.onclick = () => openModal(targetId);
}

function updateModalNavigation(id) {
  updateModalNavCard(-1);
  updateModalNavCard(1);
  updateRegionalFormLink(id);
}

function initModalSwipe() {
  const modal = document.querySelector('#overlay .modal');
  const overlay = document.getElementById('overlay');
  if (!modal || !overlay) return;

  let startX = 0;
  let startY = 0;
  let dragging = false;
  let canSwipe = false;

  modal.addEventListener('touchstart', e => {
    if (!overlay.classList.contains('open') || !currentPokemon || e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dragging = false;
    canSwipe = true;
  }, { passive: true });

  modal.addEventListener('touchmove', e => {
    if (!canSwipe || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!dragging && Math.abs(dx) > 24 && Math.abs(dx) > Math.abs(dy) * 1.35) {
      dragging = true;
    }
    if (dragging) e.preventDefault();
  }, { passive: false });

  modal.addEventListener('touchend', e => {
    if (!canSwipe) return;
    const endX = e.changedTouches[0]?.clientX || startX;
    const endY = e.changedTouches[0]?.clientY || startY;
    const dx = endX - startX;
    const dy = endY - startY;
    canSwipe = false;
    dragging = false;
    if (Math.abs(dx) < 72 || Math.abs(dx) < Math.abs(dy) * 1.35) return;
    goToAdjacentModal(dx < 0 ? 1 : -1);
  }, { passive: true });

  modal.addEventListener('touchcancel', () => {
    canSwipe = false;
    dragging = false;
  }, { passive: true });
}

function refreshApp() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistration().then(registration => {
      if (registration) return registration.update();
    }).finally(() => window.location.reload());
    return;
  }
  window.location.reload();
}

function switchRegion(i) {
  if (i === currentRegion && !currentPokemon) {
    if (window.innerWidth <= 720) setSidebar(false);
    return;
  }
  currentRegion = i;
  currentPokemon = null;
  sessionStorage.setItem(REGION_SESSION_KEY, String(i));
  scrollMainToTop();
  document.getElementById('searchInput').value = '';
  const filterSelect = document.getElementById('filterSelect');
  if (filterSelect) filterSelect.value = 'all';
  renderSidebar();
  renderStats();
  renderRegion();
  if (window.innerWidth <= 720) setSidebar(false);
  updateAppHistory('push');
  requestAnimationFrame(() => {
    scrollMainToTop();
    requestAnimationFrame(scrollMainToTop);
  });
}

function goHomeFromLogo() {
  currentRegion = 'all';
  currentPokemon = null;
  sessionStorage.setItem(REGION_SESSION_KEY, 'all');
  document.getElementById('searchInput').value = '';
  const filterSelect = document.getElementById('filterSelect');
  if (filterSelect) filterSelect.value = 'all';
  const sortSelect = document.getElementById('sortSelect');
  if (sortSelect) sortSelect.value = 'number';
  closeModal({ skipHistory: true });
  renderSidebar();
  renderStats();
  renderRegion();
  setSidebar(false);
  updateAppHistory('push');
  requestAnimationFrame(() => {
    scrollMainToTop();
    requestAnimationFrame(scrollMainToTop);
  });
}

function scrollMainToTop() {
  const main = document.getElementById('mainContent');
  if (main) {
    main.scrollTop = 0;
    main.scrollLeft = 0;
    main.scrollTo({ top: 0, left: 0, behavior: 'auto' });
  }
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
  window.scrollTo(0, 0);
}

function isHuntingMode() {
  return counterMode;
}

function setModalCounterMode(enabled) {
  enabled = !!enabled && !!currentPokemon && !progress[currentPokemon]?.caught;
  const modal = document.querySelector('#overlay .modal');
  modal?.classList.toggle('hunt-mode', enabled);
  document.getElementById('huntPanel')?.classList.toggle('open', enabled);
  const button = document.getElementById('modalCounterBtn');
  if (button) button.textContent = enabled ? 'Formulaire' : 'Compteur';
  if (enabled) renderHuntCounter();
}

function toggleModalCounter() {
  const modal = document.querySelector('#overlay .modal');
  const enabled = !modal?.classList.contains('hunt-mode');
  setModalCounterMode(enabled);
  document.getElementById('modalCounterBtn')?.blur();
}

function saveProgressEntry(id, entry) {
  const hasIvs = entry.ivs && Object.values(entry.ivs).some(Boolean);
  const isEmpty = !entry.caught && !entry.perfect && !entry.hunting && !entry.huntCount && !entry.nickname && !entry.encounters && !entry.eggs && !entry.date && !entry.context && !entry.youtube && !entry.pokeball && !entry.nature && !hasIvs;
  if (isEmpty) delete progress[id];
  else progress[id] = entry;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  updateHeaderHuntSprite();
}

function registerHuntStart(id) {
  const order = readStoredIdList(HUNT_ORDER_KEY).filter(storedId => {
    const p = progress[storedId] || {};
    return !p.caught && (parseInt(p.huntCount) || 0) > 0;
  });
  if (!order.includes(id)) order.push(id);
  writeStoredIdList(HUNT_ORDER_KEY, order);
}

function unregisterHunt(id) {
  writeStoredIdList(HUNT_ORDER_KEY, readStoredIdList(HUNT_ORDER_KEY).filter(storedId => storedId !== id));
}

function registerHuntCapture(id) {
  unregisterHunt(id);
  const captured = readStoredIdList(HUNT_CAPTURED_KEY).filter(storedId => storedId !== id && progress[storedId]?.caught);
  captured.push(id);
  localStorage.setItem(HUNT_CAPTURED_KEY, JSON.stringify(captured.slice(-2)));
}

function getCurrentHuntEntry() {
  if (!currentPokemon) return null;
  const existing = progress[currentPokemon] || {};
  const entry = { ...existing };
  entry.hunting = true;
  entry.huntCount = parseInt(entry.huntCount) || 0;
  return entry;
}

function renderHuntCounter() {
  const counter = document.getElementById('huntCount');
  if (!counter || !currentPokemon) return;
  const count = parseInt(progress[currentPokemon]?.huntCount) || 0;
  const oddsMeta = getHuntOddsMeta(currentPokemon);
  const chance = getCumulativeShinyChance(count, oddsMeta.odds);
  const chanceText = chance.toLocaleString('fr-FR', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  }) + '%';
  counter.textContent = count.toLocaleString('fr-FR');
  const oddsLabel = document.getElementById('huntOddsLabel');
  const oddsChance = document.getElementById('huntOddsChance');
  const oddsFill = document.getElementById('huntOddsFill');
  if (oddsLabel) oddsLabel.textContent = oddsMeta.label;
  if (oddsChance) oddsChance.textContent = chanceText;
  if (oddsFill) oddsFill.style.width = `${Math.min(100, chance)}%`;
}

function adjustHuntCounter(delta) {
  const entry = getCurrentHuntEntry();
  if (!entry) return;
  const previousCount = parseInt(entry.huntCount) || 0;
  entry.huntCount = Math.max(0, (parseInt(entry.huntCount) || 0) + delta);
  if (previousCount === 0 && entry.huntCount > 0) registerHuntStart(currentPokemon);
  if (entry.huntCount === 0) {
    entry.hunting = false;
    unregisterHunt(currentPokemon);
  }
  saveProgressEntry(currentPokemon, entry);
  renderHuntCounter();
  renderGrid();
}

function resetHuntCounter() {
  const entry = getCurrentHuntEntry();
  if (!entry) return;
  entry.huntCount = 0;
  entry.hunting = false;
  unregisterHunt(currentPokemon);
  saveProgressEntry(currentPokemon, entry);
  renderHuntCounter();
  renderGrid();
}

function markHuntFound() {
  const entry = getCurrentHuntEntry();
  if (!entry) return;
  entry.caught = true;
  entry.hunting = false;
  entry.encounters = parseInt(entry.huntCount) || parseInt(entry.encounters) || 0;
  entry.huntCount = 0;
  registerHuntCapture(currentPokemon);
  saveProgressEntry(currentPokemon, entry);
  closeModal();
  renderAll();
}

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
function openModal(id, options = {}) {
  if (isUnavailablePokemon(id)) return;
  currentPokemon = id;
  initModalChoiceLists();
  const form = getRegionalFormById(id);
  const baseId = form?.baseId || id;
  const p    = progress[id] || {};
  const name = getPokemonDisplayName(id);
  const r    = REGIONS.find(r => baseId >= r.start && baseId <= r.end) || getAllRegionStats();
  const huntMode = isHuntingMode() && !p.caught;

  const normalSprite = document.getElementById('mSprite');
  const shinySprite = document.getElementById('mSpriteShiny');
  normalSprite.onerror = () => handleSpriteError(normalSprite, id, false);
  shinySprite.onerror = () => handleSpriteError(shinySprite, id, true);
  normalSprite.src = getPokemonModalSpriteUrl(id, false);
  shinySprite.src = getPokemonModalSpriteUrl(id, true);
  document.getElementById('mNum').textContent = `#${String(baseId).padStart(4,'0')}`;
  document.getElementById('mName').textContent = name;
  document.getElementById('mRegion').innerHTML = `<span style="color:${r.color};font-family:var(--font-logo);font-size:10px;line-height:1.45">${r.name} · Génération ${r.gen}</span>`;
  updateModalNavigation(id);
  document.getElementById('fPokeball').value = p.pokeball || '';
  document.getElementById('fNature').value = p.nature || '';
  updatePokeballPreview();
  updateModalBallIcon(p.pokeball || '');

  document.getElementById('fCaught').checked   = !!p.caught;
  document.getElementById('fPerfect').checked  = !!p.perfect;
  document.getElementById('fNickname').value   = p.nickname   || '';
  document.getElementById('fEncounters').value = p.encounters || '';
  document.getElementById('fEggs').value       = p.eggs       || '';
  document.getElementById('fDate').value       = p.date       || '';
  document.getElementById('fContext').value    = p.context    || '';
  document.getElementById('fYoutube').value    = p.youtube    || '';

  const ivs = p.ivs || {};
  document.getElementById('ivHP').checked  = !!ivs.hp;
  document.getElementById('ivAtk').checked = !!ivs.atk;
  document.getElementById('ivDef').checked = !!ivs.def;
  document.getElementById('ivSpa').checked = !!ivs.spa;
  document.getElementById('ivSpd').checked = !!ivs.spd;
  document.getElementById('ivSpe').checked = !!ivs.spe;

  const btn = document.getElementById('saveBtn');
  btn.style.background   = r.dark;
  btn.style.borderColor  = r.color;
  btn.style.color        = r.color;

  const modal = document.querySelector('#overlay .modal');
  setModalCounterMode(huntMode);
  if (modal) modal.scrollTop = 0;
  document.getElementById('overlay').classList.add('open');
  playPokemonCry(baseId);
  if (!options.skipHistory) updateAppHistory('push');
  requestAnimationFrame(() => {
    if (modal) modal.scrollTop = 0;
  });
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}
function closeModal(options = {}) {
  const modal = document.querySelector('#overlay .modal');
  document.getElementById('overlay').classList.remove('open');
  modal?.classList.remove('hunt-mode');
  document.getElementById('huntPanel')?.classList.remove('open');
  if (modal) modal.scrollTop = 0;
  currentPokemon = null;
  if (!options.skipHistory) updateAppHistory('push');
}

function saveModal() {
  if (!currentPokemon) return;
  const enc  = parseInt(document.getElementById('fEncounters').value) || 0;
  const eggs = parseInt(document.getElementById('fEggs').value) || 0;
  const existing = progress[currentPokemon] || {};
  const entry = {
    caught:    document.getElementById('fCaught').checked,
    perfect:   document.getElementById('fPerfect').checked,
    hunting:   !document.getElementById('fCaught').checked && !!existing.hunting,
    huntCount: !document.getElementById('fCaught').checked ? (parseInt(existing.huntCount) || 0) : 0,
    nickname:  document.getElementById('fNickname').value.trim(),
    encounters: enc,
    eggs:      eggs,
    date:      document.getElementById('fDate').value,
    context:   document.getElementById('fContext').value.trim(),
    youtube:   document.getElementById('fYoutube').value.trim(),
    pokeball:  document.getElementById('fPokeball').value,
    nature:    document.getElementById('fNature').value,
    ivs: {
      hp:  document.getElementById('ivHP').checked,
      atk: document.getElementById('ivAtk').checked,
      def: document.getElementById('ivDef').checked,
      spa: document.getElementById('ivSpa').checked,
      spd: document.getElementById('ivSpd').checked,
      spe: document.getElementById('ivSpe').checked,
    }
  };
  // Supprime les entrées vraiment vides
  saveProgressEntry(currentPokemon, entry);
  closeModal();
  renderAll();
}

/* ══════════════════════════════════════
   IMPORT / EXPORT
   — Exporte au format pokemon.json (tableau)
     pour pouvoir le republier sur GitHub
══════════════════════════════════════ */
function exportJSON() {
  const out = [];
  const exportIds = [
    ...Array.from({ length: 1025 }, (_, index) => index + 1),
    ...REGIONAL_FORMS.map(form => form.formId)
  ];
  for (const id of exportIds) {
    const p    = progress[id] || {};
    const ivs  = p.ivs || {};
    const ivStr = [
      ivs.hp  ? 'PV'      : '',
      ivs.atk ? 'Atq'     : '',
      ivs.def ? 'Déf'     : '',
      ivs.spa ? 'Atq Spé' : '',
      ivs.spd ? 'Déf Spé' : '',
      ivs.spe ? 'Vitesse' : '',
    ].filter(Boolean).join(' / ');

    // N'inclut que les entrées non vides
    if (!p.caught && !p.perfect && !p.hunting && !p.huntCount && !p.nickname && !p.encounters && !p.eggs && !p.date && !p.context && !p.youtube && !p.pokeball && !p.nature && !ivStr) continue;

    out.push({
      'N° pokédex':          id,
      'Noms':                getPokemonDisplayName(id),
      'Forme de base':       getRegionalFormById(id)?.baseId || '',
      'Région forme':        getRegionalFormById(id)?.region || '',
      'Capturé':             p.caught ? 'oui' : '',
      'Surnoms':             p.nickname   || '',
      'Oeufs parent parfait': p.eggs      || '',
      'Nombre de rencontres': p.encounters || '',
      'En cours':             p.hunting ? 'oui' : '',
      'Compteur en cours':    p.huntCount || '',
      'Date de capture':     p.date        || '',
      'Lien YouTube':        p.youtube     || '',
      'Contexte de capture': p.context     || '',
      'Pokéball':            p.pokeball    || '',
      'Nature':              p.nature      || '',
      'IV parfaits':         ivStr,
      'Parfait':             p.perfect ? '✓' : '',
    });
  }
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pokemon.json';
  a.click();
}

async function shareAppLink() {
  const url = new URL('./', location.href).href;
  const data = {
    title: 'Shiny Living Dex',
    text: 'Voici mon Shiny Living Dex',
    url
  };
  try {
    if (navigator.share) {
      await navigator.share(data);
    } else if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(url);
      alert('Lien copié dans le presse-papiers.');
    } else {
      prompt('Copie ce lien pour le partager :', url);
    }
  } catch (err) {
    if (err?.name !== 'AbortError') {
      try {
        await navigator.clipboard?.writeText(url);
        alert('Lien copié dans le presse-papiers.');
      } catch (_) {
        prompt('Copie ce lien pour le partager :', url);
      }
    }
  }
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        // Format tableau pokemon.json
        pokedexData = {};
        data.forEach(p => {
          const id = p['N° pokédex'] || p['id'];
          if (id) pokedexData[id] = p;
        });
        mergePokedexIntoProgress();
      } else {
        // Format objet progress direct
        progress = sanitizeProgress(data);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
      renderAll();
    } catch(err) {
      alert('Fichier JSON invalide ou corrompu.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function lockPortraitOrientation() {
  if (!screen.orientation?.lock) return;
  screen.orientation.lock('portrait-primary').catch(() => {});
}

/* ══ START ══ */
init();
initSidebarSwipe();
initPullToRefresh();
initModalSwipe();
initStatsButtonSwipe();
initAppHistory();
lockPortraitOrientation();
document.addEventListener('click', closeStatsOnOutsideClick, true);
if ('serviceWorker' in navigator) {
  let swRefreshed = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (swRefreshed) return;
    swRefreshed = true;
    window.location.reload();
  });
  navigator.serviceWorker.register('./service-worker.js?v=167', { scope: './' }).then(registration => {
    registration.update();
    if (registration.waiting) registration.waiting.postMessage({ type: 'SKIP_WAITING' });
    registration.addEventListener('updatefound', () => {
      const newWorker = registration.installing;
      if (!newWorker) return;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && registration.waiting) {
          registration.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
      });
    });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') registration.update();
    });
  }).catch(() => {});
}
