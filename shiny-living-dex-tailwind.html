<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiny Living Dex — Tailwind</title>

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          pixel: ['"Press Start 2P"', 'monospace'],

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  html,body{ height:100%; }
  body{
    font-family:'Nunito', sans-serif;
    background:
      radial-gradient(circle at 50% -10%, rgba(192,132,252,.12), transparent 40%),
      radial-gradient(circle at 92% 8%, rgba(125,211,252,.07), transparent 30%),
      linear-gradient(180deg,#11111a 0%, #0b0b10 45%, #07070b 100%);
    color:#e8e8f0;
  }
  /* scanline overlay for the retro game-boy feel */
  .scanlines{
    position:fixed; inset:0; pointer-events:none; z-index:100;
    background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.055) 2px, rgba(0,0,0,.055) 4px);
  }
  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.12); border-radius:8px; }
  ::-webkit-scrollbar-thumb:hover{ background:rgba(255,255,255,.2); }
  ::-webkit-scrollbar-track{ background:transparent; }

  .topbar-line{
    background:linear-gradient(90deg, rgba(192,132,252,.8), rgba(212,175,55,.6), rgba(126,214,96,.55), rgba(125,211,252,.65), transparent);
  }

  .filter-input, .sort-control, .action-btn, .sidebar-btn{
    background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.012)), rgba(24,24,31,.94);
    border:1px solid rgba(255,255,255,.1);
    border-radius:10px;
    color:#e8e8f0;
    font-family:'Nunito', sans-serif;
    font-size:13px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 7px 16px rgba(0,0,0,.12);
  }
  .filter-input{ padding:9px 12px; outline:none; }
  .filter-input:focus{ border-color:rgba(255,255,255,.22); }
  .sort-control{ display:flex; align-items:center; gap:7px; padding-left:12px; height:38px; color:#8a8a9c; font-weight:700; }
  .sort-control select{ background:transparent; border:0; outline:none; color:#e8e8f0; height:100%; padding-right:10px; font-size:12px; }
  .sort-control select option{ background:#18181f; color:#e8e8f0; }
  .action-btn{ display:flex; align-items:center; justify-content:center; gap:6px; height:38px; padding:0 12px; font-weight:800; cursor:pointer; transition:all .15s; white-space:nowrap; }
  .action-btn:hover{ border-color:rgba(255,255,255,.2); }
  .sidebar-btn{ display:flex; align-items:center; gap:8px; width:100%; padding:8px 10px; font-size:12px; font-weight:700; cursor:pointer; transition:all .12s; background:rgba(255,255,255,.035); }
  .sidebar-btn:hover{ background:rgba(255,255,255,.07); border-color:rgba(255,255,255,.16); }

  .detail-chip{
    position:relative; min-width:0; padding:6px 8px 5px 11px; border-radius:8px;
    background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.18));
    border:1px solid rgba(255,255,255,.08);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  }
  .detail-chip::before{
    content:''; position:absolute; left:0; top:6px; bottom:6px; width:2px; border-radius:2px;
    background:var(--accent,#7dd3fc); opacity:.65;
  }
  .detail-chip strong{ display:block; font-size:12px; font-weight:900; color:var(--accent,#7dd3fc); font-variant-numeric:tabular-nums; }
  .detail-chip span{ display:block; font-size:8px; font-weight:800; text-transform:uppercase; letter-spacing:.03em; color:rgba(255,255,255,.6); margin-top:2px; }

  .pokeball{ position:relative; width:32px; height:32px; border-radius:50%; overflow:hidden; border:1px solid rgba(0,0,0,.4); box-shadow:0 4px 10px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.25); flex-shrink:0; }
  .pokeball::before{ content:''; position:absolute; inset:0 0 50% 0; background:linear-gradient(180deg,#ff6b6b,#e8484f); }
  .pokeball::after{ content:''; position:absolute; inset:50% 0 0 0; background:#f3f3f7; }
  .pokeball .band{ position:absolute; left:0; right:0; top:50%; height:3px; transform:translateY(-1.5px); background:#15151c; z-index:2; }
  .pokeball .core{ position:absolute; left:50%; top:50%; width:11px; height:11px; transform:translate(-50%,-50%); border-radius:50%; background:#f3f3f7; border:2px solid #15151c; z-index:3; box-shadow:0 0 0 1px rgba(255,255,255,.3); }

  .card{ -webkit-tap-highlight-color: transparent; }
  .card img.is-pixel{ image-rendering: pixelated; }

  .gen-row:hover .gen-name{ text-decoration: underline; text-decoration-color: currentColor; text-underline-offset: 3px; }

  @media (max-width: 1023px){
    #sidebar.sidebar-open{ transform: translateX(0); }
  }
</style>
</head>
<body class="min-h-screen overflow-x-hidden">
<div class="scanlines"></div>

<!-- ============ TOPBAR ============ -->
<header class="fixed top-0 left-0 right-0 h-16 z-50 flex items-center justify-between gap-3 px-3 sm:px-5 bg-[#14141c]/95 backdrop-blur border-b border-white/10 shadow-[0_10px_26px_rgba(0,0,0,.3)]">
  <button onclick="switchRegion(0)" class="flex items-center gap-2.5 h-11 pl-1.5 pr-3 rounded-2xl border border-white/10 bg-gradient-to-b from-white/[0.07] to-white/[0.015] hover:border-white/20 transition shadow-[inset_0_1px_0_rgba(255,255,255,.06),0_8px_18px_rgba(0,0,0,.2)]">
    <span class="pokeball"><span class="band"></span><span class="core"></span></span>
    <span class="flex flex-col items-start leading-none gap-1">
      <span class="font-pixel text-[10px] sm:text-[11px] tracking-wide flex items-center gap-[0.35em]">
        <span class="text-[#c084fc]">Shiny</span><span class="text-white">Living</span><span class="text-white">Dex</span>
      </span>
      <span class="text-[9px] font-extrabold text-white/45">Merci Thieu</span>
    </span>
  </button>

  <div id="topbarSummary" class="hidden sm:flex items-center gap-2 text-xs px-3 py-1.5 rounded-xl bg-white/5 border border-white/10 text-[#cbd5e1] font-bold"></div>
</header>
<div class="topbar-line fixed top-16 left-0 right-0 h-px z-50 opacity-70"></div>

<!-- ============ LAYOUT ============ -->
<div class="flex pt-16 min-h-screen">

  <!-- mobile sidebar toggle -->
  <button id="sidebarToggle" onclick="toggleSidebar()" aria-label="Ouvrir le menu des régions"
    class="fixed left-0 top-1/2 -translate-y-1/2 z-40 w-3 h-9 rounded-r-lg bg-gradient-to-b from-[#242435] to-[#171720] border border-white/10 border-l-0 flex items-center justify-center text-[8px] text-[#8a8a9c] hover:text-white transition shadow-[0_10px_24px_rgba(0,0,0,.35)] lg:hidden">▶</button>

  <!-- mobile backdrop -->
  <div id="sidebarBackdrop" onclick="toggleSidebar(false)"
    class="fixed inset-0 top-16 bg-black/45 z-30 hidden"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar"
    class="fixed lg:sticky top-16 lg:top-16 left-0 bottom-0 lg:bottom-auto lg:h-[calc(100vh-4rem)] w-[230px] -translate-x-full lg:translate-x-0 transition-transform duration-300 z-40 bg-[#15151c] border-r border-white/[0.07] overflow-y-auto">
    <div class="p-3">
      <div class="mb-4 rounded-xl border border-white/10 bg-gradient-to-b from-white/[0.055] to-white/[0.015] p-3 shadow-[inset_0_1px_0_rgba(255,255,255,.04)]">
        <div class="font-pixel text-[10px] text-white leading-relaxed">Générations</div>
        <div class="text-[11px] text-[#8a8a9c] mt-1">Progression par région</div>
      </div>

      <div id="genList"></div>

      <div class="mt-4 pt-3 border-t border-white/[0.07] space-y-2">
        <div class="px-1 pb-1 text-[10px] font-extrabold uppercase tracking-wider text-[#8a8a9c]">Données</div>
        <button class="sidebar-btn"><span>📥</span><span>Importer JSON</span></button>
        <button class="sidebar-btn"><span>📤</span><span>Exporter JSON</span></button>
        <button class="sidebar-btn"><span>🔗</span><span>Partager</span></button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 min-w-0 p-3 sm:p-5 lg:p-6">
    <div id="regionHeader" class="mb-5"></div>

    <div class="mb-4 grid grid-cols-1 sm:grid-cols-[1fr_180px_auto_auto] gap-2">
      <input id="searchInput" type="text" placeholder="🔍  Rechercher..." class="filter-input" oninput="onSearch(this.value)">
      <label class="sort-control">
        <span class="pl-0 text-[11px]">Trier</span>
        <select id="sortSelect" onchange="onSort(this.value)" class="flex-1">
          <option value="number">Numéro</option>
          <option value="caught">Shinys trouvés</option>
          <option value="missing">Manquants</option>
          <option value="perfect">Shinys parfaits</option>
        </select>
      </label>
      <button id="counterButton" onclick="toggleCounterMode()" class="action-btn">
        <span>🎯</span><span class="hidden sm:inline">Chasse</span>
      </button>
      <button id="spriteToggle" onclick="toggleSpriteMode()" class="action-btn">
        <span>🏠</span><span class="hidden sm:inline">HOME</span>
      </button>
    </div>

    <div id="grid" class="grid grid-cols-[repeat(auto-fill,minmax(108px,1fr))] gap-2.5 p-3 rounded-2xl border border-white/10 bg-[#1c1c26] shadow-[inset_0_1px_0_rgba(255,255,255,.06),0_12px_30px_rgba(0,0,0,.24)]"></div>
  </main>
</div>

<!-- ============ MODAL ============ -->
<div id="overlay" onclick="if(event.target===this) closeModal()"
  class="fixed inset-0 z-[200] hidden items-center justify-center bg-black/75 backdrop-blur-sm p-4">
  <div class="relative w-full max-w-md rounded-2xl border border-white/10 bg-[#171720] p-6 pt-7 max-h-[90vh] overflow-y-auto shadow-[0_28px_80px_rgba(0,0,0,.6)]">
    <div class="absolute top-0 left-0 right-0 h-[3px] rounded-t-2xl" style="background:linear-gradient(90deg,#c084fc,#d4af37,#7ed660,#7dd3fc)"></div>
    <button onclick="closeModal()" aria-label="Fermer" class="absolute top-3 right-3 w-8 h-8 grid place-items-center rounded-lg bg-white/5 border border-white/10 text-[#8a8a9c] hover:text-white hover:bg-white/10 transition">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

/* Mythiques / event-only -> grisés "indisponible" pour la démo */
const UNAVAILABLE = new Set([151,251,385,386,490,491,492,493,494,647,648,649,719,720,721,801,802,807,808,809,893]);

/* ======================================================================
   ÉTAT
   ====================================================================== */
let currentRegion = 0;     // index dans REGIONS, ou 'all'
let searchTerm = '';
let sortMode = 'number';
let spriteMode = 'home';   // 'home' | 'pixel'
let counterMode = false;
const progress = {};

/* ======================================================================
   GÉNÉRATION DE PROGRESSION (démo déterministe)
   ====================================================================== */
const COMPLETION = [0.82, 0.6, 0.42, 0.27, 0.16, 0.08, 0.04, 0.015, 0];
function rnd(seed){ const x = Math.sin(seed*12.9898)*43758.5453; return x - Math.floor(x); }
function buildProgress(){
  REGIONS.forEach((r, ri) => {
    const rate = COMPLETION[ri];
    for (let id = r.start; id <= r.end; id++){
      if (UNAVAILABLE.has(id)){
        progress[id] = {unavailable:true, caught:false, perfect:false, hunting:false, eggs:0, encounters:0};
        continue;
      }
      const caught   = rnd(id*7+1)  < rate;
      const perfect  = caught && rnd(id*13+2) < 0.22;
      const hunting  = !caught && rnd(id*17+3) < 0.06;
      const eggs       = caught ? 40 + Math.floor(rnd(id*19+4)*260) : 0;
      const encounters = caught ? 90 + Math.floor(rnd(id*23+5)*1800) : 0;
      progress[id] = {caught, perfect, hunting, eggs, encounters, unavailable:false};
    }
  });
}

/* ======================================================================
   HELPERS
   ====================================================================== */
function getSpriteUrl(id, shiny, mode){
  mode = mode || spriteMode;
  const base = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon';
  if (mode === 'home') return `${base}/other/home/${shiny ? 'shiny/' : ''}${id}.png`;
  return `${base}/${shiny ? 'shiny/' : ''}${id}.png`;
}
function getRegionByPokemonId(id){
  return REGIONS.find(r => id >= r.start && id <= r.end);
}
function getRegionIds(region){
  const ids = [];
  for (let id = region.start; id <= region.end; id++) ids.push(id);
  return ids;
}
function getStats(regionKey){
  let ids = [];
  if (regionKey === 'all') REGIONS.forEach(r => ids.push(...getRegionIds(r)));
  else ids = getRegionIds(REGIONS[regionKey]);

  const available = ids.filter(id => !progress[id].unavailable);
  const total = available.length;
  let caught = 0, perfect = 0, eggsSum = 0, encSum = 0;
  available.forEach(id => {
    const p = progress[id];
    if (p.caught){ caught++; eggsSum += p.eggs; encSum += p.encounters; if (p.perfect) perfect++; }
  });
  const missing = total - caught;
  const pct = total ? caught/total*100 : 0;
  return {
    total, caught, missing, perfect, pct,
    avgEggs: caught ? Math.round(eggsSum/caught) : 0, totalEggs: eggsSum,
    avgEnc:  caught ? Math.round(encSum/caught)  : 0, totalEnc:  encSum,
  };
}
function typesPillsHtml(types){
  return (types||[]).map(t => {
    const info = TYPE_INFO[t] || {label:t, color:'#999'};
    return `<span class="text-[6.5px] font-extrabold uppercase tracking-wider px-1.5 py-[3px] rounded-[3px] text-black/80 shadow-[0_2px_4px_rgba(0,0,0,.3)]" style="background:${info.color}">${info.label}</span>`;
  }).join('');
}
function fr(n){ return n.toLocaleString('fr-FR'); }

function sidebarRowHtml({label, badge, range, color, stats, active, onclick}){
  const pct = stats.total ? stats.pct : 0;
  return `
  <button onclick="${onclick}" class="gen-row w-full text-left rounded-lg p-2 mb-1.5 transition ${active ? 'bg-white/[0.07] ring-1 ring-white/10' : 'hover:bg-white/[0.04]'}">
    <div class="flex items-center gap-2">
      <span class="w-2 h-2 rounded-full flex-shrink-0" style="background:${color};box-shadow:0 0 8px ${color}66"></span>
      <span class="flex-1 min-w-0">
        <span class="flex items-center gap-1.5 min-w-0">
          <span class="gen-name font-extrabold text-[12px] truncate" style="color:${color}">${label}</span>
          <span class="text-[8px] font-bold text-[#8a8a9c] border border-white/10 rounded-full px-1.5 py-[1px] bg-white/5 flex-shrink-0">${badge}</span>
        </span>
        <span class="block text-[10px] text-white/35 mt-0.5 tabular-nums">${range}</span>
      </span>
      <span class="text-[10px] text-white/75 whitespace-nowrap tabular-nums font-bold">${stats.caught}/${stats.total} · ${pct.toFixed(0)}%</span>
    </div>
    <div class="h-[3px] rounded-full bg-white/[0.08] mt-2 mb-1.5 overflow-hidden">
      <div class="h-full rounded-full transition-all duration-500" style="width:${pct}%;background:${color}"></div>
    </div>
    <div class="text-right text-[10px] font-extrabold tabular-nums" style="color:#d4af37">${stats.perfect} ${stats.perfect===1?'shiny parfait':'shinys parfaits'}</div>
  </button>`;
}
function renderSidebar(){
  const list = document.getElementById('genList');
  const allStats = getStats('all');
  let html = `<div class="px-1 pb-2 text-[10px] font-extrabold uppercase tracking-wider text-[#8a8a9c] flex items-center gap-2"><span>Progression</span><span class="flex-1 h-px bg-white/10"></span></div>`;
  html += sidebarRowHtml({
    label:'Toutes', badge:'G1-9', range:'#1-1025', color:'#7dd3fc',
    stats: allStats, active: currentRegion === 'all', onclick:`switchRegion('all')`
  });
  html += `<div class="mt-3 px-1 pb-2 text-[10px] font-extrabold uppercase tracking-wider text-[#8a8a9c] flex items-center gap-2"><span>Régions</span><span class="flex-1 h-px bg-white/10"></span></div>`;
  REGIONS.forEach((r, i) => {
    html += sidebarRowHtml({
      label: r.name, badge: `G${r.gen}`, range: `#${r.start}-${r.end}`, color: r.color,
      stats: getStats(i), active: currentRegion === i, onclick:`switchRegion(${i})`
    });
  });
  list.innerHTML = html;
}

/* ======================================================================
   RENDU — EN-TÊTE DE RÉGION
   ====================================================================== */
function statsPanelHtml(stats, color){
  return `
  <div class="rounded-xl border border-white/10 bg-gradient-to-b from-white/[0.06] to-black/20 p-3 shadow-[inset_0_1px_0_rgba(255,255,255,.06)]">
    <div class="grid grid-cols-4 gap-2 text-center">
      <div><div class="text-sm sm:text-base font-black tabular-nums" style="color:${color}">${stats.caught}<span class="text-[10px] text-white/45 font-bold">/${stats.total}</span></div><div class="text-[7.5px] sm:text-[8px] uppercase font-extrabold text-white/55 mt-1">Capturés</div></div>
      <div><div class="text-sm sm:text-base font-black tabular-nums" style="color:#c084fc">${stats.missing}</div><div class="text-[7.5px] sm:text-[8px] uppercase font-extrabold text-white/55 mt-1">Manquants</div></div>
      <div><div class="text-sm sm:text-base font-black tabular-nums" style="color:#d4af37">${stats.perfect}</div><div class="text-[7.5px] sm:text-[8px] uppercase font-extrabold text-white/55 mt-1">${stats.perfect===1?'Shiny parfait':'Shinys parfaits'}</div></div>
      <div><div class="text-sm sm:text-base font-black tabular-nums" style="color:#c084fc">${stats.pct.toFixed(1)}%</div><div class="text-[7.5px] sm:text-[8px] uppercase font-extrabold text-white/55 mt-1">Complété</div></div>
    </div>
    <div class="h-[5px] rounded-full bg-white/[0.09] mt-3 overflow-hidden">
      <div class="h-full rounded-full transition-all duration-500" style="width:${stats.pct}%;background:${color}"></div>
    </div>
  </div>
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mt-2">
    <div class="detail-chip" style="--accent:${color}"><strong>${fr(stats.avgEggs)}</strong><span>Moy. oeufs</span></div>
    <div class="detail-chip" style="--accent:${color}"><strong>${fr(stats.totalEggs)}</strong><span>Total oeufs</span></div>
    <div class="detail-chip" style="--accent:${color}"><strong>${fr(stats.avgEnc)}</strong><span>Moy. renc.</span></div>
    <div class="detail-chip" style="--accent:${color}"><strong>${fr(stats.totalEnc)}</strong><span>Total renc.</span></div>
  </div>`;
}
function renderRegionHeader(){
  const el = document.getElementById('regionHeader');
  if (currentRegion === 'all'){
    const stats = getStats('all');
    el.innerHTML = `
    <div class="relative overflow-hidden rounded-2xl border border-white/10 p-5 min-h-[180px] flex flex-col sm:flex-row sm:items-center gap-5"
         style="background:linear-gradient(135deg, rgba(125,211,252,.10), rgba(192,132,252,.05) 55%, transparent), #15151c">
      <div class="relative z-10 flex flex-col gap-3 w-full sm:max-w-md">
        <div>
          <div class="font-pixel text-[13px]" style="color:#7dd3fc">Toutes les régions</div>
          <div class="font-pixel text-[8px] text-[#8a8a9c] mt-2 leading-relaxed">Génération 1 à 9</div>
        </div>
        ${statsPanelHtml(stats, '#7dd3fc')}
      </div>
      <div class="relative z-10 grid grid-cols-3 sm:grid-cols-3 gap-1.5 sm:flex-1 sm:self-stretch">
        ${REGIONS.map(r => `
          <button onclick="switchRegion(${REGIONS.indexOf(r)})" class="rounded-lg border flex flex-col items-center justify-center gap-1 py-3 transition hover:-translate-y-0.5" style="background:${r.color}14;border-color:${r.color}40">
            <span class="font-pixel text-[8px]" style="color:${r.color}">${r.name}</span>
            <span class="text-[9px] text-white/40 font-bold">Gen ${r.gen}</span>
          </button>`).join('')}
      </div>
    </div>`;
  } else {
    const r = REGIONS[currentRegion];
    const stats = getStats(currentRegion);
    el.innerHTML = `
    <div class="relative overflow-hidden rounded-2xl border border-white/10 p-5 min-h-[180px] flex items-center"
         style="background:linear-gradient(135deg, ${r.color}22, transparent 60%), radial-gradient(circle at 90% 90%, ${r.color}14, transparent 50%), #15151c">
      <div class="relative z-10 flex flex-col gap-3 w-full max-w-lg">
        <div>
          <div class="font-pixel text-[13px]" style="color:${r.color}">${r.name}</div>
          <div class="font-pixel text-[8px] text-[#8a8a9c] mt-2 leading-relaxed">Génération ${r.gen}</div>
        </div>
        ${statsPanelHtml(stats, r.color)}
      </div>
    </div>`;
  }
}

/* ======================================================================
   RENDU — GRILLE
   ====================================================================== */
function dividerHtml(r){
  return `<div class="col-span-full sticky top-0 z-[2] flex items-center gap-2 rounded-lg border border-white/[0.08] px-3 py-1.5 mb-0.5 backdrop-blur" style="background:rgba(24,24,31,.92);border-left:3px solid ${r.color}">
    <span class="w-[7px] h-[7px] rounded-full flex-shrink-0" style="background:${r.color};box-shadow:0 0 8px ${r.color}77"></span>
    <span class="font-pixel text-[9px]" style="color:${r.color}">${r.name}</span>
    <span class="text-[10px] text-[#8a8a9c]">Génération ${r.gen} · #${r.start}-${r.end}</span>
  </div>`;
}
function cardHtml(id){
  const name = NAMES[id] || `#${id}`;
  const p = progress[id];
  const types = POKEMON_TYPES[id] || [];
  let borderClasses = 'border-white/10';
  let shadow = 'shadow-[inset_0_1px_0_rgba(255,255,255,.08),0_8px_16px_rgba(0,0,0,.28)]';
  let nameColor = 'text-white';
  let extra = '';
  let statusHtml, statusClasses = 'bg-white/[0.05] text-white/55 border-white/10';

  if (p.unavailable){
    extra = 'opacity-45 grayscale';
    statusHtml = 'Indispo.';
  } else if (p.caught && p.perfect){
    borderClasses = 'border-[#d4af37]/70';
    shadow = 'shadow-[inset_0_1px_0_rgba(255,255,255,.1),0_0_0_1px_rgba(212,175,55,.42),0_0_16px_rgba(212,175,55,.32),0_8px_16px_rgba(0,0,0,.3)]';
    nameColor = 'text-[#f6dd8c]';
    statusHtml = `<span style="color:#c084fc">Shiny</span> · <span style="color:#d4af37">Parfait</span>`;
    statusClasses = 'bg-[#d4af37]/10 text-[#ffe9a8] border-[#d4af37]/40';
  } else if (p.caught){
    borderClasses = 'border-[#c084fc]/70';
    shadow = 'shadow-[inset_0_1px_0_rgba(255,255,255,.1),0_0_0_1px_rgba(192,132,252,.36),0_0_14px_rgba(192,132,252,.28),0_8px_16px_rgba(0,0,0,.3)]';
    nameColor = 'text-[#dcb6ff]';
    statusHtml = 'Shiny';
    statusClasses = 'bg-[#c084fc]/10 text-[#fdf2ff] border-[#c084fc]/40';
  } else if (p.hunting){
    borderClasses = 'border-[#7dd3fc]/70';
    shadow = 'shadow-[inset_0_1px_0_rgba(255,255,255,.1),0_0_0_1px_rgba(125,211,252,.34),0_0_14px_rgba(125,211,252,.26),0_8px_16px_rgba(0,0,0,.3)]';
    nameColor = 'text-[#bfeeff]';
    statusHtml = 'En cours';
    statusClasses = 'bg-[#7dd3fc]/10 text-[#dff6ff] border-[#7dd3fc]/40';
  } else {
    statusHtml = 'Manquant';
  }

  const sprite = getSpriteUrl(id, !!p.caught);
  const fallback = getSpriteUrl(id, !!p.caught, 'pixel');
  const imgClass = spriteMode === 'pixel' ? 'is-pixel w-12 h-12' : 'w-14 h-14';

  return `
  <button onclick="openModal(${id})" class="card relative flex flex-col items-center gap-1 rounded-xl border ${borderClasses} ${shadow} ${extra} bg-gradient-to-b from-[#20202a] via-[#181821] to-[#101017] p-2 pt-2.5 min-h-[148px] text-center transition-all duration-150 hover:-translate-y-0.5">
    <span class="self-start text-[8px] font-bold text-white/65 bg-black/30 border border-white/[0.08] rounded-full px-1.5 py-[2px] tabular-nums">#${String(id).padStart(4,'0')}</span>
    <span class="text-[11px] font-extrabold leading-tight min-h-[26px] flex items-center justify-center px-1 ${nameColor}">${name}</span>
    <span class="flex gap-1 justify-center flex-wrap min-h-[14px]">${typesPillsHtml(types)}</span>
    <img src="${sprite}" loading="lazy" width="56" height="56" class="${imgClass} object-contain drop-shadow-md" alt="${name}"
         onerror="this.onerror=null;this.src='${fallback}'">
    <span class="mt-auto text-[8px] font-extrabold px-2 py-1 rounded-full border ${statusClasses}">${statusHtml}</span>
  </button>`;
}
function renderGrid(){
  const grid = document.getElementById('grid');
  let entries = [];

  if (currentRegion === 'all'){
    REGIONS.forEach(r => {
      entries.push({divider: r});
      getRegionIds(r).forEach(id => entries.push({id}));
    });
  } else {
    getRegionIds(REGIONS[currentRegion]).forEach(id => entries.push({id}));
  }

  if (searchTerm){
    entries = entries.filter(e => e.divider || (NAMES[e.id]||'').toLowerCase().includes(searchTerm) || String(e.id).includes(searchTerm));
  }

  if (currentRegion !== 'all'){
    const ids = entries.map(e => e.id);
    ids.sort((a,b) => {
      const pa = progress[a], pb = progress[b];
      switch (sortMode){
        case 'caught':  return (pb.caught?1:0)  - (pa.caught?1:0)  || a-b;
        case 'missing': return (pa.caught?1:0)  - (pb.caught?1:0)  || a-b;
        case 'perfect': return (pb.perfect?1:0) - (pa.perfect?1:0) || a-b;
        default: return a-b;
      }
    });
    entries = ids.map(id => ({id}));
  }

  if (entries.filter(e => e.id !== undefined).length === 0){
    grid.innerHTML = `<div class="col-span-full text-center text-[#8a8a9c] py-16 text-sm">Aucun Pokémon trouvé.</div>`;
    return;
  }

  grid.innerHTML = entries.map(e => e.divider ? dividerHtml(e.divider) : cardHtml(e.id)).join('');
}

/* ======================================================================
   MODALE
   ====================================================================== */
function openModal(id){
  const p = progress[id];
  const name = NAMES[id] || `#${id}`;
  const region = getRegionByPokemonId(id);
  const types = POKEMON_TYPES[id] || [];

  document.getElementById('modalContent').innerHTML = `
    <div class="flex items-center justify-center gap-6 mb-4 mt-1">
      <div class="text-center">
        <img src="${getSpriteUrl(id,false)}" loading="lazy" class="w-24 h-24 object-contain mx-auto drop-shadow-lg" alt="${name}"
             onerror="this.onerror=null;this.src='${getSpriteUrl(id,false,'pixel')}'">
        <div class="text-[10px] text-[#8a8a9c] mt-1 font-bold">Normal</div>
      </div>
      <div class="text-center">
        <img src="${getSpriteUrl(id,true)}" loading="lazy" class="w-24 h-24 object-contain mx-auto drop-shadow-lg" alt="${name} shiny"
             onerror="this.onerror=null;this.src='${getSpriteUrl(id,true,'pixel')}'">
        <div class="text-[10px] mt-1 font-bold" style="color:#c084fc">✦ Shiny</div>
      </div>
    </div>
    <div class="text-center mb-3">
      <div class="font-pixel text-[10px] text-[#8a8a9c] tabular-nums">#${String(id).padStart(4,'0')}</div>
      <div class="text-xl font-black mt-1.5">${name}</div>
      <div class="text-[11px] font-bold mt-1" style="color:${region?region.color:'#888'}">${region?region.name:''} · Génération ${region?region.gen:''}</div>
      <div class="flex gap-1.5 justify-center mt-2.5">${typesPillsHtml(types)}</div>
    </div>
    ${p.unavailable ? `
    <div class="text-center text-sm text-[#8a8a9c] py-3 border-t border-white/[0.07] mt-3">
      Pokémon mythique non disponible dans cette living dex.
    </div>` : `
    <div class="space-y-2 mt-4 border-t border-white/[0.07] pt-4">
      <label class="flex items-center gap-2.5 rounded-lg border border-white/10 bg-white/[0.04] px-3 py-2.5 cursor-pointer hover:border-white/20 transition">
        <input type="checkbox" ${p.caught?'checked':''} onchange="toggleCaught(${id})" class="accent-[#c084fc] w-4 h-4">
        <span class="text-sm font-bold" style="color:#c084fc">✦ Shiny capturé !</span>
      </label>
      <label class="flex items-center gap-2.5 rounded-lg border border-white/10 bg-white/[0.04] px-3 py-2.5 cursor-pointer hover:border-white/20 transition ${!p.caught?'opacity-40 pointer-events-none':''}">
        <input type="checkbox" ${p.perfect?'checked':''} ${!p.caught?'disabled':''} onchange="togglePerfect(${id})" class="accent-[#d4af37] w-4 h-4">
        <span class="text-sm font-bold" style="color:#d4af37">⬡ Shiny parfait</span>
      </label>
    </div>
    ${p.caught ? `
    <div class="grid grid-cols-2 gap-2 mt-3 text-center">
      <div class="detail-chip" style="--accent:#c084fc"><strong>${fr(p.eggs)}</strong><span>Oeufs parent parfait</span></div>
      <div class="detail-chip" style="--accent:#7dd3fc"><strong>${fr(p.encounters)}</strong><span>Rencontres</span></div>
    </div>` : ''}
    `}
  `;
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('overlay').classList.add('flex');
}
function closeModal(){
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('overlay').classList.remove('flex');
}
function toggleCaught(id){
  const p = progress[id];
  p.caught = !p.caught;
  if (!p.caught){ p.perfect = false; p.eggs = 0; p.encounters = 0; }
  else {
    p.eggs = p.eggs || (40 + Math.floor(rnd(id*19+4)*260));
    p.encounters = p.encounters || (90 + Math.floor(rnd(id*23+5)*1800));
  }
  refreshAfterEdit(id);
}
function togglePerfect(id){
  progress[id].perfect = !progress[id].perfect;
  refreshAfterEdit(id);
}
function refreshAfterEdit(id){
  renderSidebar();
  renderRegionHeader();
  renderGrid();
  renderTopbarSummary();
  openModal(id);
}

/* ======================================================================
   CONTRÔLES
   ====================================================================== */
function switchRegion(region){
  currentRegion = region;
  renderSidebar();
  renderRegionHeader();
  renderGrid();
  if (window.innerWidth < 1024) toggleSidebar(false);
}
function onSearch(v){ searchTerm = v.trim().toLowerCase(); renderGrid(); }
function onSort(v){ sortMode = v; renderGrid(); }
function toggleSidebar(force){
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebarBackdrop');
  const willOpen = force !== undefined ? force : sb.classList.contains('-translate-x-full');
  if (willOpen){ sb.classList.remove('-translate-x-full'); bd.classList.remove('hidden'); }
  else { sb.classList.add('-translate-x-full'); bd.classList.add('hidden'); }
}
function toggleSpriteMode(){
  spriteMode = spriteMode === 'home' ? 'pixel' : 'home';
  document.getElementById('spriteToggle').innerHTML = spriteMode === 'home'
    ? '<span>🏠</span><span class="hidden sm:inline">HOME</span>'
    : '<span>🕹️</span><span class="hidden sm:inline">Pixel</span>';
  renderGrid();
}
function toggleCounterMode(){
  counterMode = !counterMode;
  const btn = document.getElementById('counterButton');
  btn.classList.toggle('bg-[#7dd3fc]/10');
  btn.classList.toggle('border-[#7dd3fc]/45');
  btn.classList.toggle('text-[#dff6ff]');
}
function renderTopbarSummary(){
  const s = getStats('all');
  document.getElementById('topbarSummary').innerHTML =
    `<span style="color:#c084fc">✦ ${s.caught}</span><span class="text-white/30 mx-1">/</span>${s.total}` +
    `<span class="text-white/20 mx-2">·</span>` +
    `<span style="color:#d4af37">${s.perfect} parfaits</span>`;
}

/* ======================================================================
   INIT
   ====================================================================== */
buildProgress();
renderSidebar();
renderRegionHeader();
renderGrid();
renderTopbarSummary();
</script>
</body>
</html>
