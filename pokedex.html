<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiny Living Dex</title>
<link rel="manifest" href="./manifest.json?v=70">
<link rel="icon" href="./Assets/icon-192.png">
<link rel="apple-touch-icon" href="./Assets/icon-192.png">
<meta name="theme-color" content="#0f0f13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LivingDex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<style>
@font-face{
  font-family:'Logo Retro Pixel v70';
  src:url('./Assets/fonts/logo-retro-pixel-v70.ttf') format('truetype');
  font-weight:400;
  font-style:normal;
  font-display:block;
}
@font-face{
  font-family:'Region GameBoy v70';
  src:url('./Assets/fonts/region-gameboy-v70.ttf') format('truetype');
  font-weight:400;
  font-style:normal;
  font-display:block;
}
@font-face{
  font-family:'Pokemon Classic';
  src:url('./Assets/fonts/pokemon-classic.ttf') format('truetype');
  font-weight:400;
  font-style:normal;
  font-display:block;
}
@font-face{
  font-family:'Pokemon 3DS';
  src:url('./Assets/fonts/pokemon_x_and_y.woff2') format('woff2');
  font-weight:400;
  font-style:normal;
  font-display:block;
}
:root {
  --bg:       #0f0f13;
  --surface:  #18181f;
  --surface2: #222230;
  --border:   rgba(255,255,255,0.07);
  --text:     #e8e8f0;
  --muted:    #777788;
  --font-logo:'Logo Retro Pixel v70', 'Pokemon Classic', monospace;
  --font-region:'Region GameBoy v70', 'Pokemon Classic', monospace;
  --font:     'Pokemon 3DS', sans-serif;
  --r:        10px;
  --r-lg:     16px;
  --sidebar-w: 220px;
  --header-h:  60px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100%;overflow:hidden}
button,.btn,.card,.gen-btn{-webkit-tap-highlight-color:transparent}

/* scanlines */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9999}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:grid;grid-template-columns:auto auto minmax(0,1fr);align-items:center;
  gap:1rem;padding:0 1.25rem;z-index:100;
}
.logo{font-family:var(--font-logo);font-size:20px;line-height:1;white-space:nowrap;letter-spacing:.5px;color:#fff;background:none;border:0;cursor:pointer;text-align:left;padding:0;display:inline-flex;align-items:center;gap:9px;min-width:0;height:38px}
.logo-icon{width:30px;height:30px;border-radius:8px;object-fit:cover;box-shadow:0 0 0 1px rgba(255,255,255,.12),0 6px 14px rgba(0,0,0,.22)}
.logo-text{display:inline-flex;align-items:center;line-height:1;transform:translateY(-1px)}
.logo:hover .logo-dex,.logo:focus-visible .logo-dex{color:#fff}
.logo-shiny{color:#c084fc}
.logo-dex{color:#fff}
.title-actions{display:flex;align-items:center;gap:8px;min-width:0;height:100%}
.topbar-stats{display:flex;gap:8px;min-width:0;flex-wrap:wrap}
#statsButton{
  min-height:38px;padding:8px 15px;
  justify-content:center;align-self:center;gap:8px;
  color:#fff;
  background:
    linear-gradient(180deg,rgba(212,175,55,.16),rgba(192,132,252,.09)),
    linear-gradient(180deg,rgba(42,42,58,.96),rgba(25,25,34,.96));
  border-color:rgba(212,175,55,.22);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 8px 22px rgba(0,0,0,.18);
}
#statsButton svg{width:16px;height:16px;color:#d4af37;flex-shrink:0}
#statsButton:hover,#statsButton[aria-expanded="true"]{
  border-color:rgba(212,175,55,.42);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 0 0 1px rgba(212,175,55,.08),0 10px 26px rgba(0,0,0,.24);
}
.tstat{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);padding:4px 12px;font-size:12px;color:var(--muted);
  display:flex;align-items:center;gap:6px;
}
.tstat strong{color:var(--text);font-size:14px}
.topbar-btns{display:flex;gap:6px;flex-shrink:0}
.stats-popin{
  position:fixed;top:calc(var(--header-h) + 10px);left:1.25rem;
  width:min(430px,calc(100vw - 2rem));padding:1rem;
  background:
    linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,0)),
    #171720;
  border:1px solid rgba(255,255,255,.12);
  border-radius:var(--r-lg);box-shadow:0 24px 70px rgba(0,0,0,.68);
  z-index:180;display:none;overflow:hidden;
}
.stats-popin::before{
  content:'';position:absolute;left:0;right:0;top:0;height:3px;
  background:linear-gradient(90deg,#c084fc,#d4af37,#7ed660);
  opacity:.9;
}
.stats-popin.open{display:block}
.stats-popin-head{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:.9rem}
.stats-popin-kicker{font-size:11px;color:#7dd3fc;font-weight:700;text-transform:uppercase;letter-spacing:.9px;margin-bottom:2px}
.stats-popin-title{font-family:var(--font);font-size:22px;color:#fff}
.stats-close{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:4px 8px;border-radius:8px}
.stats-close:hover{color:var(--text);background:var(--surface2)}
.stats-content{display:block}
.stats-highlight-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.stats-highlight{
  min-width:0;padding:12px;
  background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.025)),#20202b;
  border:1px solid rgba(255,255,255,.09);border-radius:var(--r);
}
.stats-highlight span,.stats-item span{display:block;color:var(--muted);font-size:12px;line-height:1.2}
.stats-highlight strong{display:block;margin-top:4px;font-size:24px;line-height:1;font-variant-numeric:tabular-nums}
.stats-highlight.shiny strong{color:#c084fc}
.stats-highlight.perfect strong{color:#d4af37}
.stats-highlight.caught strong,.stats-highlight.missing strong{color:#c084fc}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stats-item{display:flex;flex-direction:column;gap:4px;min-width:0;padding:10px;background:#20202b;border:1px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--muted)}
.stats-item strong{color:var(--text);font-size:15px;font-variant-numeric:tabular-nums}
.pull-refresh{
  position:fixed;left:50%;top:calc(var(--header-h) + 10px);z-index:170;
  transform:translate(-50%,-18px);opacity:0;pointer-events:none;
  min-height:34px;padding:7px 14px;border-radius:999px;
  background:rgba(24,24,31,.96);border:1px solid rgba(255,255,255,.12);
  color:var(--text);font-size:12px;font-weight:700;
  box-shadow:0 14px 34px rgba(0,0,0,.34);
  transition:opacity .12s,transform .12s;
}
.pull-refresh.visible{opacity:1;transform:translate(-50%,0)}
.pull-refresh.ready{border-color:rgba(192,132,252,.44);color:#fff}

/* ── LAYOUT ── */
.layout{display:flex;margin-top:var(--header-h);height:calc(100dvh - var(--header-h));min-height:0}

/* ── SIDEBAR ── */
.sidebar{
  width:0;overflow:hidden;flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  transition:width .25s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  position:relative;
}
.sidebar.open{width:var(--sidebar-w)}
.sidebar.dragging{transition:none}
.sidebar-backdrop{display:none}
.sidebar-inner{width:var(--sidebar-w);padding:1rem .75rem;overflow-y:auto;height:100%}
.sidebar-title{font-family:var(--font);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:.75rem;padding:0 .25rem}
.sidebar-actions{display:grid;gap:8px;margin-top:1rem;padding:0 .25rem}
.sidebar-actions .btn{width:100%;justify-content:flex-start;padding:8px 10px;font-size:13px}
.gen-item{
  padding:2px 0 7px;margin-bottom:7px;
  border-bottom:1px solid rgba(255,255,255,.065);
}
.gen-item.active{
  background:linear-gradient(90deg,rgba(255,255,255,.04),transparent);
  border-radius:var(--r);
  border-bottom-color:rgba(212,175,55,.16);
}
.gen-item:last-child{border-bottom:none}
.gen-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:var(--r);border:none;
  background:transparent;color:var(--muted);font-family:var(--font);font-size:13px;
  cursor:pointer;text-align:left;transition:background .12s,color .12s;
  margin-bottom:2px;
}
.gen-btn:hover{background:var(--surface2);color:var(--text)}
.gen-btn.active{background:var(--surface2);color:var(--text)}
.gen-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gen-name{font-weight:800}
.gen-progress{font-size:11px;margin-left:auto;opacity:.86;font-variant-numeric:tabular-nums}
.gen-bar-wrap{height:3px;background:var(--surface2);border-radius:2px;margin:4px 10px 8px;overflow:hidden}
.gen-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.gen-perfect-row{display:flex;align-items:center;justify-content:flex-end;margin:-3px 10px 0;color:#d4af37;font-size:10px;font-weight:800;font-variant-numeric:tabular-nums}

/* toggle button */
.sidebar-toggle{
  position:fixed;left:0;top:50%;transform:translateY(-50%);
  width:18px;height:42px;background:linear-gradient(180deg,#242435,#171720);
  border:1px solid rgba(255,255,255,.12);border-left:none;
  border-radius:0 10px 10px 0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  z-index:101;transition:left .25s cubic-bezier(.4,0,.2,1),color .12s,box-shadow .12s;
  color:var(--muted);box-shadow:0 10px 26px rgba(0,0,0,.34);
  font-size:9px;
}
.sidebar-toggle:hover{color:var(--text);box-shadow:0 10px 28px rgba(0,0,0,.48),0 0 0 1px rgba(192,132,252,.18)}
.sidebar-toggle.open{left:var(--sidebar-w)}
.sidebar-toggle:focus-visible,.btn:focus-visible,.gen-btn:focus-visible,.card:focus-visible,.modal-close:focus-visible,.btn-save:focus-visible{outline:2px solid #c084fc;outline-offset:2px}
@media (max-width: 720px){
  .topbar{grid-template-columns:minmax(0,1fr) auto;gap:.6rem;padding:0 .75rem}
  .title-actions{gap:6px}
  .logo{font-size:18px;gap:7px}
  .logo-icon{width:28px;height:28px;border-radius:7px}
  .topbar-stats{display:none}
  #statsButton{min-height:34px;padding:7px 11px}
  .sidebar{position:fixed;top:var(--header-h);bottom:0;left:0;z-index:150;width:var(--sidebar-w);transform:translateX(calc(-1 * var(--sidebar-w)));box-shadow:12px 0 34px rgba(0,0,0,.38);will-change:transform}
  .sidebar.open{width:var(--sidebar-w);transform:translateX(0)}
  .sidebar-toggle.open{left:var(--sidebar-w)}
  .sidebar-backdrop{position:fixed;top:var(--header-h);left:0;right:0;bottom:0;background:rgba(0,0,0,.42);z-index:140;display:none}
  .sidebar-backdrop.open{display:block}
  .layout{display:block}
  .main{height:calc(100dvh - var(--header-h));padding:1rem 1rem calc(5.5rem + env(safe-area-inset-bottom))}
  .btn{padding:6px 9px;font-size:12px}
  .topbar-btns .btn{font-size:0;gap:0}
  .topbar-btns .btn svg{margin:0}
  .stats-popin{left:.75rem;top:calc(var(--header-h) + 8px);width:calc(100vw - 1.5rem);padding:.9rem}
  .stats-popin-title{font-size:20px}
  .stats-highlight-grid,.stats-grid{grid-template-columns:1fr 1fr;gap:7px}
  .stats-highlight{padding:10px}
  .stats-highlight strong{font-size:20px}
  .region-header.map-hero{min-height:150px;padding:.9rem}
  .region-header.all-hero{min-height:170px;padding:.9rem}
  .region-header.all-hero .all-hero-copy{padding:.75rem}
  .home-signature{right:.75rem;top:.6rem;font-size:12px}
  .region-map-mosaic{inset:6px;opacity:.9;filter:saturate(1.12) contrast(1.04) brightness(1.18)}
  .filters{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .filters input{grid-column:1/-1;width:100%}
  .filters select,.sort-control{width:100%;min-width:0}
  .sort-control select{width:100%}
  .grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
  .card{min-height:132px;padding:8px 4px 7px}
  .card-sprite{width:56px;height:56px}
  .card .pname{font-size:11px;min-height:27px;padding:0}
  .card .status{font-size:9px;padding:3px 6px}
  .card .status-pair{gap:4px}
  .type-row{gap:3px;margin:1px 0 3px;padding:0}
  .type-pill,.type-pill img{width:40px;height:10px}
  .two-col{grid-template-columns:1fr}
  .iv-grid{grid-template-columns:1fr 1fr}
  .modal{padding:1.35rem;max-height:92vh}
  .modal-hero{display:grid;grid-template-columns:1fr;justify-items:center;text-align:center;gap:.85rem}
  .sprite-pair{gap:6px}
  .modal-sprite,.modal-sprite-shiny{width:74px;height:74px}
  .modal-footer{position:sticky;bottom:-1.35rem;margin-left:-1.35rem;margin-right:-1.35rem;padding:1rem 1.35rem;background:linear-gradient(180deg,rgba(24,24,31,.72),var(--surface) 34%);border-top:1px solid var(--border)}
  .btn-save{flex:1}
}

/* ── MAIN ── */
.main{
  flex:1;min-height:0;overflow-y:auto;
  padding:1.5rem 1.5rem calc(5.5rem + env(safe-area-inset-bottom));
  scroll-padding-top:1.5rem;overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
}

/* region header */
.region-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}
.region-header.map-hero{
  min-height:190px;align-items:flex-end;position:relative;overflow:hidden;isolation:isolate;
  border:1px solid var(--border);border-radius:var(--r-lg);padding:1.15rem;
  background:linear-gradient(180deg,#20202a,#15151c);
  box-shadow:0 14px 36px rgba(0,0,0,.28),inset 0 0 0 1px rgba(255,255,255,.04);
}
.region-header.map-hero::before{
  content:'';position:absolute;inset:7px;border-radius:calc(var(--r-lg) - 5px);z-index:1;
  background:linear-gradient(180deg,rgba(15,15,19,.08),rgba(15,15,19,.84)),linear-gradient(90deg,rgba(15,15,19,.72),rgba(15,15,19,.12));
}
.region-header.map-hero::after{
  content:'';position:absolute;inset:7px;border-radius:calc(var(--r-lg) - 5px);z-index:0;
  background-image:var(--region-map);background-position:center;background-size:cover;background-repeat:no-repeat;
  filter:saturate(1.08) contrast(1.03);
}
.region-header.map-hero > *{position:relative;z-index:2}
.region-header.map-hero .region-name{text-shadow:0 2px 14px rgba(0,0,0,.65)}
.region-header.map-hero .region-meta,.region-header.map-hero .progress-label{color:rgba(255,255,255,.82)}
.region-header.all-hero{
  min-height:210px;display:flex;align-items:center;justify-content:center;text-align:center;
  position:relative;overflow:hidden;isolation:isolate;border:1px solid var(--border);border-radius:var(--r-lg);
  padding:1.25rem;background:var(--surface);
  box-shadow:0 14px 36px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.04);
}
.region-header.all-hero::before{
  content:'';position:absolute;inset:0;z-index:1;border-radius:inherit;
  background:radial-gradient(circle at 50% 42%,rgba(15,15,19,.24),rgba(15,15,19,.42) 48%,rgba(15,15,19,.58)),linear-gradient(180deg,rgba(15,15,19,.06),rgba(15,15,19,.34));
}
.region-header.all-hero .all-hero-copy{position:relative;z-index:2;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:.85rem;min-width:0;width:min(560px,100%);padding:.9rem 1rem;border-radius:var(--r);background:rgba(15,15,19,.46);box-shadow:0 10px 28px rgba(0,0,0,.28);backdrop-filter:blur(2px)}
.region-header.all-hero .progress-wrap{width:100%;flex:none}
.region-header.all-hero .region-name{text-shadow:0 2px 14px rgba(0,0,0,.75)}
.region-header.all-hero .region-meta,.region-header.all-hero .progress-label{color:rgba(255,255,255,.82)}
.home-signature{position:absolute;right:1.1rem;top:.85rem;z-index:2;font-family:'Pacifico',cursive;font-size:14px;line-height:1;color:#fff7c7;text-shadow:0 2px 10px rgba(0,0,0,.72),0 0 18px rgba(192,132,252,.26);transform:rotate(-3deg);pointer-events:none}
.region-map-mosaic{position:absolute;inset:7px;z-index:0;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:2px;opacity:.94;filter:saturate(1.16) contrast(1.05) brightness(1.28);border-radius:calc(var(--r-lg) - 5px);overflow:hidden}
.region-map-thumb{position:relative;overflow:hidden;background:var(--surface2);border:0}
.region-map-thumb img{width:100%;height:100%;display:block;object-fit:cover}
.region-map-thumb span{display:none}
.region-name{font-family:var(--font-region);font-size:24px}
.region-meta{font-size:12px;color:var(--muted);margin-top:3px}
.progress-wrap{flex:1;min-width:140px}
.progress-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.progress-label{font-size:12px;color:var(--muted)}

/* filters */
.filters{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.filters input,.filters select{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);color:var(--text);
  font-family:var(--font);font-size:13px;padding:9px 12px;outline:none;
  min-height:38px;transition:border-color .15s,background .15s,box-shadow .15s;
}
.filters input{width:min(320px,100%)}
.filters input:focus,.filters select:focus{border-color:rgba(192,132,252,.42);box-shadow:0 0 0 3px rgba(192,132,252,.08)}
.sort-control{
  display:flex;align-items:center;gap:7px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--r);padding-left:10px;min-height:38px;
  color:var(--muted);font-size:12px;font-weight:700;
}
.sort-control select{
  border:0;background:transparent;padding-left:0;
}
.perfect-summary{
  display:flex;align-items:center;justify-content:center;gap:7px;
  min-height:38px;padding:9px 12px;border-radius:var(--r);
  background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.32);
  color:#d4af37;font-family:var(--font);font-size:13px;font-weight:800;white-space:nowrap;cursor:pointer;
}
.perfect-summary strong{font-family:var(--font);font-size:14px;color:#f7d774}
.perfect-summary:hover{background:rgba(212,175,55,.13);border-color:rgba(212,175,55,.5)}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(112px,1fr));
  gap:10px;
}
.scroll-end{height:1px}
.card{
  background:
    radial-gradient(circle at 50% 34%,rgba(255,255,255,.055),transparent 42%),
    linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012)),
    var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);padding:9px 7px 8px;min-height:148px;
  text-align:center;cursor:pointer;position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:4px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 8px 18px rgba(0,0,0,.24);
  transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;
}
.card::after{content:'';position:absolute;inset:5px;border:1px solid rgba(255,255,255,.08);border-radius:calc(var(--r) - 3px);pointer-events:none;z-index:1;box-shadow:inset 0 0 14px rgba(255,255,255,.025)}
.card:hover{transform:translateY(-2px);box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 10px 22px rgba(0,0,0,.3)}
.card.caught{border-color:#c084fc;box-shadow:0 0 0 1px rgba(192,132,252,.5),0 0 16px rgba(192,132,252,.22),inset 0 1px 0 rgba(255,255,255,.1)}
.card.caught::after{border-color:rgba(192,132,252,.36);box-shadow:inset 0 0 18px rgba(192,132,252,.08)}
.card.perfect{border-color:#d4af37;box-shadow:0 0 0 1px rgba(212,175,55,.58),0 0 17px rgba(212,175,55,.28),inset 0 1px 0 rgba(255,255,255,.1)}
.card.perfect::after{border-color:rgba(212,175,55,.42);box-shadow:inset 0 0 18px rgba(212,175,55,.09)}
.card-sprite{
  width:64px;height:64px;image-rendering:pixelated;display:block;order:2;margin:1px 0 0;
  box-sizing:border-box;padding:4px;border-radius:14px;

  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 3px 8px rgba(0,0,0,.28);

}

.card.perfect .card-sprite{border-color:rgba(212,175,55,.35);box-shadow:inset 0 1px 0 rgba(255,232,171,.12),0 3px 8px rgba(0,0,0,.28),0 0 10px rgba(212,175,55,.16)}

/* ══════════════════════════════════════
   EFFET HOLOGRAPHIQUE — discret et premium, uniquement sur les
   cartes Shiny trouvé / Parfait — jamais sur les cartes
   manquantes, ni sur .region-header / .gen-btn.
   De petites étincelles, dans la couleur propre de la carte
   (via un masque CSS), placées autour du sprite. Chacune a son
   propre délai : elles apparaissent l'une après l'autre plutôt
   qu'ensemble, pour un rendu plus naturel, puis s'effacent.
   Tout est animé via "transform" / "opacity" (GPU, sans
   repaint) et toutes les étincelles d'un même rang partagent
   la même animation pour rester parfaitement synchronisées
   entre les cartes.
══════════════════════════════════════ */
.card .holo{
  position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden;
}
.card .holo::before{
  content:'';position:absolute;
  top:-20%;left:0;width:100%;height:140%;
  mix-blend-mode:screen;
  opacity:0;
  will-change:transform,opacity;
  transform:translateX(-100%);
}
.card.caught .holo::before{
  background:linear-gradient(105deg,transparent 20%,#c084fc 40%,rgba(255,255,255,.75) 50%,#c084fc 60%,transparent 80%);
  animation:holoFlash 4.5s linear infinite;
}
.card.perfect .holo::before{
  background:linear-gradient(105deg,transparent 20%,#d4af37 40%,rgba(255,255,255,.75) 50%,#d4af37 60%,transparent 80%);
  animation:holoFlash 4.5s linear infinite;
}
@keyframes holoFlash{
  0%       {transform:translateX(-100%);opacity:0}
  2%       {opacity:.55}
  16%      {transform:translateX(200%);opacity:0}
  17%,100% {transform:translateX(-100%);opacity:0}
}
@media (prefers-reduced-motion:reduce){
  .card.caught .holo::before,.card.perfect .holo::before{animation:none;opacity:0}
}

<script>
/* ══════════════════════════════════════

══════════════════════════════════════ */
const REGIONS = [
  {name:"Kanto",   gen:1, start:1,   end:151,  color:"#f05252", dark:"#3d1010", map:"region-kanto.jpg"},

  {name:"Sinnoh",  gen:4, start:387,  end:493,  color:"#60a5fa", dark:"#0d2440", map:"region-sinnoh.jpg"},
  {name:"Unys",    gen:5, start:494,  end:649,  color:"#cbd5e1", dark:"#1e1e28", map:"region-unova.jpg"},
  {name:"Kalos",   gen:6, start:650,  end:721,  color:"#a78bfa", dark:"#1e103a", map:"region-kalos.jpg"},
  {name:"Alola",   gen:7, start:722,  end:809,  color:"#fb923c", dark:"#3a1800", map:"region-alola.jpg"},
  {name:"Galar",   gen:8, start:810,  end:905,  color:"#f472b6", dark:"#320028", map:"region-galar.jpg"},

function renderTypeBadges(id) {
  return (POKEMON_TYPES[id] || []).map(type => {
    const meta = TYPE_META[type] || TYPE_META.normal;
    return '<span class="type-pill" title="Type ' + meta.label + '" aria-label="Type ' + meta.label + '"><img src="' + meta.src + '" alt=""></span>';
  }).join('');
}

function typeLabel(type) {
  return TYPE_META[type]?.label || type || '';
}

function comparePokemonBySort(a, b, mode) {
  const pa = progress[a] || {};
  const pb = progress[b] || {};

  if (mode === 'date-desc' || mode === 'date-asc') {
    const da = pa.date || '';
    const db = pb.date || '';
    if (da !== db) return mode === 'date-asc' ? da.localeCompare(db) : db.localeCompare(da);
    return a - b;
  }

  if (mode === 'type') {
    const ta = POKEMON_TYPES[a] || [];
    const tb = POKEMON_TYPES[b] || [];
    const primary = typeLabel(ta[0]).localeCompare(typeLabel(tb[0]), 'fr', { sensitivity: 'base' });
    if (primary) return primary;
    const secondary = typeLabel(ta[1]).localeCompare(typeLabel(tb[1]), 'fr', { sensitivity: 'base' });
    if (secondary) return secondary;
    return a - b;
  }

  if (mode === 'caught') {
    if (!!pa.caught !== !!pb.caught) return pa.caught ? -1 : 1;
    return a - b;
  }

  if (mode === 'missing') {
    if (!!pa.caught !== !!pb.caught) return pa.caught ? 1 : -1;
    return a - b;
  }

  if (mode === 'perfect') {
    if (!!pa.perfect !== !!pb.perfect) return pa.perfect ? -1 : 1;
    return a - b;
  }

  return a - b;
}

function pokemonMatchesSortMode(p, mode) {
  if (mode === 'caught') return !!p.caught;
  if (mode === 'missing') return !p.caught;
  if (mode === 'perfect') return !!p.caught && !!p.perfect;
  if (mode === 'date-desc' || mode === 'date-asc') return !!p.caught && !!p.date;
  return true;
}

function getPokemonFamily(id) {
  return FAMILY_BY_POKEMON[id] || null;
}

function isFamilyComplete(id) {
  const family = getPokemonFamily(id);
  return !!family && family.every(familyId => progress[familyId]?.caught);
}

// progress = données éditables locales (même structure que pokemon.json + ivs détaillés)
let progress = {};

const STORAGE_KEY = 'shiny_dex_v4';

/* ══════════════════════════════════════
   INIT — charge pokemon.json depuis GitHub Pages
══════════════════════════════════════ */
function init() {
  // Charge la progression locale depuis le localStorage
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const legacyRaw = localStorage.getItem(LEGACY_STORAGE_KEY);
    const sessionRegion = sessionStorage.getItem(REGION_SESSION_KEY);
    const savedSpriteMode = localStorage.getItem(SPRITE_MODE_KEY);
    currentRegion = sessionRegion === 'all' || REGIONS[parseInt(sessionRegion)] ? (sessionRegion === 'all' ? 'all' : parseInt(sessionRegion)) : 'all';
    spriteMode = savedSpriteMode === 'home' ? 'home' : 'pixel';
    if (raw) {
      progress = sanitizeProgress(JSON.parse(raw), { trustCaught: true });
    } else if (legacyRaw) {
      progress = sanitizeProgress(JSON.parse(legacyRaw), { trustCaught: false });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    }
  } catch(e) { progress = {}; }

  // Affichage initial avec les données locales déjà disponibles
  renderAll();
}

function hasUserData(p) {
  if (!p) return false;
  const ivs = p.ivs || {};
  return !!(
    p.perfect ||
    p.ball ||
    p.nickname ||
    p.encounters ||
    p.eggs ||
    p.date ||
    p.context ||
    p.youtube ||
    ivs.hp || ivs.atk || ivs.def || ivs.spa || ivs.spd || ivs.spe
  );
}

function sanitizeProgress(data, options = {}) {
  const trustCaught = options.trustCaught !== false;
  const clean = {};
  Object.entries(data || {}).forEach(([id, p]) => {
    if (!p || typeof p !== 'object') return;
    const entry = { ...p };
    // Ancienne logique: pokemon.json pouvait mettre caught=true juste parce que le nom etait rempli.
    if (!trustCaught && entry.caught && !hasUserData(entry)) delete entry.caught;
    const isEmpty = !entry.caught && !hasUserData(entry);
    if (!isEmpty) clean[id] = entry;
  });
  return clean;
}

function rowMeansCaught(p) {
  const explicit = p['Capturé'] ?? p['Capture'] ?? p['Caught'] ?? p['captured'];
  if (explicit !== undefined) {
    const value = String(explicit).trim().toLowerCase();
    return ['true', '1', 'oui', 'yes', '✓', 'x'].includes(value);
  }
  return !!(
    p['Surnoms'] ||
    p['Oeufs parent parfait'] ||
    p['Nombre de rencontres'] ||
    p['Date de capture'] ||
    p['Ball'] ||
    p['Poké Ball'] ||
    p['Lien YouTube'] ||
    p['Contexte de capture'] ||
    p['IV parfaits'] ||
    p['Parfait']
  );
}

// Au chargement de la page, on tente de récupérer le fichier pokemon.json
document.addEventListener('DOMContentLoaded', () => {
  fetch('pokemon.json')
    .then(response => {
      if (!response.ok) {
        throw new Error("Le fichier pokemon.json n'a pas pu être chargé automatiquement.");
      }
      return response.json();
    })
    .then(data => {
      if (Array.isArray(data)) {
        pokedexData = {};
        data.forEach(p => {
          const id = p['N° pokédex'] || p['id'];
          if (id) pokedexData[id] = p;
        });

        // On fusionne avec la progression (appelle la fonction déjà existante dans ton code)
        mergePokedexIntoProgress();

        renderAll();
        console.log("Données Pokémon chargées avec succès depuis le serveur !");
      }
    })
    .catch(error => {
      console.warn("Chargement auto désactivé ou impossible (normal en local sans serveur) :", error.message);
    });
});

// Fusionne les champs du pokemon.json dans progress (sans écraser ce qui existe déjà)
function mergePokedexIntoProgress() {
  Object.entries(pokedexData).forEach(([id, p]) => {
    const numId = parseInt(id);
    if (!progress[numId]) progress[numId] = {};
    const existing = progress[numId];
    // Champs venant du JSON public (ne remplace que si vide)
    if (!existing.nickname   && p['Surnoms'])             existing.nickname   = p['Surnoms'];
    if (!existing.encounters && p['Nombre de rencontres'])existing.encounters = parseInt(p['Nombre de rencontres']) || 0;
    if (!existing.eggs       && p['Oeufs parent parfait'])existing.eggs       = parseInt(p['Oeufs parent parfait']) || 0;
    if (!existing.date       && p['Date de capture'])     existing.date       = p['Date de capture'];
    if (!existing.context    && p['Contexte de capture']) existing.context    = p['Contexte de capture'];
    if (!existing.ball) existing.ball = normalizeBallValue(p['Ball'] || p['Poké Ball'] || p['Poke Ball']);
    if (!existing.youtube    && p['Lien YouTube'])        existing.youtube    = p['Lien YouTube'];
    // Statuts: le nom seul ne signifie pas que le shiny est capturé.
    if (rowMeansCaught(p)) existing.caught = true;
    if (p['Parfait'] === true || p['Parfait'] === 'true' || p['Parfait'] === '✓') existing.perfect = true;
    // IVs depuis la chaîne "PV/Atq/Déf/..." ou objet
    if (!existing.ivs && p['IV parfaits']) existing.ivs = parseIVs(p['IV parfaits']);
  });
}

function parseIVs(raw) {
  if (!raw || raw === '') return {hp:false,atk:false,def:false,spa:false,spd:false,spe:false};
  if (typeof raw === 'object') return raw;
  // Chaîne type "PV / Atq / Vitesse"
  const s = raw.toLowerCase();
  return {
    hp:  s.includes('pv') || s.includes('hp'),
    atk: s.includes('atq') || s.includes('atk'),
    def: s.includes('déf') || s.includes('def'),
    spa: s.includes('atq spé') || s.includes('spa') || s.includes('spé'),
    spd: s.includes('déf spé') || s.includes('spd'),
    spe: s.includes('vitesse') || s.includes('spe') || s.includes('speed'),
  };
}

function normalizeBallValue(raw) {
  if (!raw) return '';
  const value = String(raw).trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[_-]+/g, ' ');
  const compact = value.replace(/\s+/g, '');
  if (compact === 'poke' || compact === 'pokeball') return 'poke';
  if (compact.includes('super')) return 'super';
  if (compact.includes('hyper')) return 'hyper';
  if (compact.includes('luxe') || compact.includes('luxury')) return 'luxe';
  if (compact.includes('honor') || compact.includes('honour') || compact.includes('premier')) return 'honor';
  if (compact.includes('scuba') || compact.includes('plongee') || compact.includes('dive')) return 'scuba';
  return BALL_OPTIONS.some(ball => ball.value === raw) ? raw : '';
}

function getBallOption(value) {
  const normalized = normalizeBallValue(value);
  return BALL_OPTIONS.find(ball => ball.value === normalized) || BALL_OPTIONS[0];
}

function renderBallChoices(selectedValue = '') {
  const container = document.getElementById('fBallChoices');
  if (!container) return;
  const selected = getBallOption(selectedValue).value;
  container.innerHTML = BALL_OPTIONS.map(ball => `
    <label class="ball-choice">
      <input type="radio" name="fBall" value="${ball.value}" ${ball.value === selected ? 'checked' : ''} onchange="updateBallPreview()">
      ${ball.src ? `<img src="${ball.src}" alt="">` : '<span aria-hidden="true">-</span>'}
      <span>${ball.label}</span>
    </label>
  `).join('');
  updateBallPreview();
}

function getSelectedBallValue() {
  return document.querySelector('input[name="fBall"]:checked')?.value || '';
}

function updateBallPreview() {
  const preview = document.getElementById('fBallPreview');
  if (!preview) return;
  const ball = getBallOption(getSelectedBallValue());
  preview.innerHTML = ball.src ? `<img src="${ball.src}" alt=""> <span>${ball.label}</span>` : '<span>Aucune ball sélectionnée</span>';
}

function renderCardBall(value) {
  const ball = getBallOption(value);
  if (!ball.src) return '';
  return `<img class="card-ball" src="${ball.src}" alt="${ball.label}" loading="lazy">`;
}

function getCurrentRegionPerfectCount() {
  const r = currentRegion === 'all' ? getAllRegionStats() : REGIONS[currentRegion];
  let perfect = 0;
  for (let id = r.start; id <= r.end; id++) {
    if (progress[id]?.caught && progress[id]?.perfect) perfect++;
  }
  return perfect;
}

function getCurrentStats() {
  const r = currentRegion === 'all' ? getAllRegionStats() : REGIONS[currentRegion];
  const total = r.end - r.start + 1;
  const entries = [];
  for (let id = r.start; id <= r.end; id++) {
    if (progress[id]) entries.push(progress[id]);
  }
  const caught = entries.filter(p => p.caught).length;
  const missing = Math.max(0, total - caught);
  const perfect = entries.filter(p => p.caught && p.perfect).length;
  const totalEncounters = entries.reduce((a,p) => a + (parseInt(p.encounters) || 0), 0);
  const totalEggs = entries.reduce((a,p) => a + (parseInt(p.eggs) || 0), 0);
  const avgEncounters = caught > 0 ? Math.round(totalEncounters / caught) : 0;
  const avgEggs = caught > 0 ? Math.round(totalEggs / caught) : 0;
  const caughtPercent = total > 0 ? caught / total * 100 : 0;
  return {
    regionName: r.name,
    gen: r.gen,
    total,
    caught,
    missing,
    perfect,
    totalEncountersText: totalEncounters.toLocaleString('fr-FR'),
    avgEncountersText: avgEncounters.toLocaleString('fr-FR'),
    totalEggsText: totalEggs.toLocaleString('fr-FR'),
    avgEggsText: avgEggs.toLocaleString('fr-FR'),
    caughtPercentText: formatPercent(caughtPercent),
  };
}

function isHomeSpriteMode() {
  return spriteMode === 'home';
}

function getPokemonSpriteUrl(id, shiny = false, mode = spriteMode) {
  const base = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon';
  if (mode === 'home') {
    const file = SPRITE_FILES[id];
    if (file) return `./sprites/3d/${shiny ? 'shiny' : 'normal'}/${file}.png`;
    return `${base}/other/home/${shiny ? 'shiny/' : ''}${id}.png`;
  }
  return `${base}/${shiny ? 'shiny/' : ''}${id}.png`;
}

function handleSpriteError(img, id, shiny = false) {
  // Une 1re erreur peut être un simple 429 (rate-limit GitHub) plutôt qu'un sprite
  // manquant : on retente une fois la même URL après un court délai avant
  // de basculer définitivement sur une image de secours.
  if (!img.dataset.retried) {
    img.dataset.retried = '1';
    const originalSrc = img.src;
    const delay = 800 + Math.random() * 1200;
    setTimeout(() => {
      img.onerror = () => handleSpriteError(img, id, shiny);
      img.src = originalSrc.includes('?') ? `${originalSrc}&retry=1` : `${originalSrc}?retry=1`;
    }, delay);
    return;
  }

  const fallback = isHomeSpriteMode()
    ? (shiny ? getPokemonSpriteUrl(id, false, 'home') : getPokemonSpriteUrl(id, false, 'pixel'))
    : (shiny ? getPokemonSpriteUrl(id, false, 'pixel') : SPRITE_FALLBACK);
  img.onerror = () => { img.onerror = null; img.src = SPRITE_FALLBACK; };
  img.src = fallback;
}

function toggleSpriteMode() {
  spriteMode = isHomeSpriteMode() ? 'pixel' : 'home';
  localStorage.setItem(SPRITE_MODE_KEY, spriteMode);

function initStatsButtonSwipe() {
  const button = document.getElementById('statsButton');
  if (!button) return;

  let startX = 0;
  let startY = 0;
  let canSwipe = false;

  button.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    canSwipe = true;
  }, { passive: true });

  button.addEventListener('touchend', e => {
    if (!canSwipe) return;
    canSwipe = false;
    const endX = e.changedTouches[0]?.clientX || startX;
    const endY = e.changedTouches[0]?.clientY || startY;
    const dx = endX - startX;
    const dy = endY - startY;
    if (dy > 36 && Math.abs(dy) > Math.abs(dx) * 1.25) {
      suppressStatsButtonClick = true;
      setStatsPopinOpen(true);
    }
  }, { passive: true });

  button.addEventListener('touchcancel', () => {
    canSwipe = false;
  }, { passive: true });
}

let suppressStatsOutsideClick = false;

function shouldCloseStatsFromTarget(target) {
  const popin = document.getElementById('statsPopin');
  const button = document.getElementById('statsButton');
  return !!popin?.classList.contains('open') && !popin.contains(target) && !button?.contains(target);
}

function closeStatsOnOutsidePress(e) {
  if (!shouldCloseStatsFromTarget(e.target)) return;
  e.preventDefault();
  e.stopPropagation();
  e.stopImmediatePropagation();
  suppressStatsOutsideClick = true;
  closeStatsPopin();
}

function closeStatsOnOutsideClick(e) {
  if (suppressStatsOutsideClick) {
    e.preventDefault();
    e.stopPropagation();
    e.stopImmediatePropagation();
    suppressStatsOutsideClick = false;
    return;
  }
  if (!shouldCloseStatsFromTarget(e.target)) return;
  e.preventDefault();
  e.stopPropagation();
  e.stopImmediatePropagation();
  closeStatsPopin();
}

function countCaught(r) {
  let c = 0;
  for (let i = r.start; i <= r.end; i++) if (progress[i]?.caught) c++;
  return c;
}

function countPerfect(r) {
  let c = 0;
  for (let i = r.start; i <= r.end; i++) if (progress[i]?.perfect) c++;
  return c;
}

function getAllRegionStats() {
  const start = REGIONS[0].start;
  const end = REGIONS[REGIONS.length - 1].end;
  let caught = 0;
  let perfect = 0;
  for (let i = start; i <= end; i++) {
    if (progress[i]?.caught) caught++;
    if (progress[i]?.perfect) perfect++;
  }
  return {
    name: 'Toutes',
    gen: '1 à 9',
    start,
    end,
    color: '#38bdf8',
    caught,
    perfect,
    total: end - start + 1

}

function renderGrid() {
  const r      = currentRegion === 'all' ? getAllRegionStats() : REGIONS[currentRegion];
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filter = document.getElementById('filterSelect')?.value || 'all';
  const sort   = document.getElementById('sortSelect')?.value || 'number';
  const grid   = document.getElementById('grid');
  grid.innerHTML = '';
  const ids = [];

  for (let id = r.start; id <= r.end; id++) {
    const name = NAMES[id] || `#${id}`;
    const p    = progress[id] || {};
    if (search && !name.toLowerCase().includes(search) && !String(id).includes(search)) continue;
    if (!pokemonMatchesSortMode(p, sort)) continue;
    if (filter === 'caught'  && !p.caught)  continue;
    if (filter === 'missing' && p.caught)   continue;
    if (filter === 'perfect' && (!p.caught || !p.perfect)) continue;
    ids.push(id);
  }

  ids.sort((a, b) => comparePokemonBySort(a, b, sort));

  ids.forEach(id => {
    const name = NAMES[id] || `#${id}`;
    const p    = progress[id] || {};
    const card = document.createElement('div');
    card.className = 'card' + (p.caught ? ' caught' : '') + (p.perfect ? ' perfect' : '');
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', `${name}, #${String(id).padStart(4,'0')}${p.caught ? ', shiny capture' : ', manquant'}`);
    card.onclick = () => openModal(id);
    card.onkeydown = e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openModal(id);
      }
    };

    const useShinySprite = !!p.caught;
    const spriteUrl = getPokemonSpriteUrl(id, useShinySprite);
    const typeBadges = renderTypeBadges(id);
    const ballHtml = p.caught ? renderCardBall(p.ball) : '';
    const statusHtml = p.caught && p.perfect
      ? '<span class="status-pair"><span class="status-shiny">Shiny</span><span class="status-perfect">Parfait</span></span>'
      : (p.caught ? '<span class="status-shiny">Shiny</span>' : 'Manquant');
    const sparkHtml = '';

    card.innerHTML = `
      <div class="num">#${String(id).padStart(4,'0')}</div>
      <div class="pname">${name}</div>
      <div class="type-row">${typeBadges}</div>
      <img class="card-sprite" src="${spriteUrl}"
             alt="${name}" loading="lazy" width="64" height="64" onerror="handleSpriteError(this, ${id}, ${useShinySprite})">
      ${ballHtml}
      <div class="status">${statusHtml}</div>
      <div class="holo" aria-hidden="true">${sparkHtml}</div>`;
    grid.appendChild(card);
  });

  if (ids.length === 0) {
    grid.innerHTML = '<div class="empty">Aucun Pokémon trouvé.</div>';
  }
}

   SIDEBAR TOGGLE
══════════════════════════════════════ */
function toggleSidebar() {
  setSidebar(!sidebarOpen);
}

function setSidebar(open) {
  sidebarOpen = open;
  const sb  = document.getElementById('sidebar');
  const tog = document.getElementById('sidebarToggle');
  const backdrop = document.getElementById('sidebarBackdrop');
  sb.classList.toggle('open', sidebarOpen);
  tog.classList.toggle('open', sidebarOpen);
  backdrop.classList.toggle('open', sidebarOpen);
  tog.innerHTML = sidebarOpen ? '&#9664;' : '&#9654;';
  sb.style.transform = '';
}

function initSidebarSwipe() {
  const sb = document.getElementById('sidebar');
  const maxWidth = () => parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'), 10) || 220;
  let startX = 0;
  let startY = 0;
  let dragging = false;
  let canDrag = false;

  document.addEventListener('touchstart', e => {
    if (window.innerWidth > 720 || e.touches.length !== 1) return;
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    canDrag = sidebarOpen || x >= 0;
    if (!canDrag) return;
    startX = x;
    startY = y;
    dragging = false;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!canDrag || window.innerWidth > 720 || e.touches.length !== 1) return;
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    const dx = x - startX;
    if (!dragging && Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(y - startY)) {
      dragging = true;
      sb.classList.add('dragging');
    }
    if (!dragging) return;
    e.preventDefault();
    const w = maxWidth();
    const offset = sidebarOpen ? Math.min(0, dx) : Math.min(0, -w + Math.max(0, dx));
    sb.style.transform = `translateX(${offset}px)`;
  }, { passive: false });

  document.addEventListener('touchend', e => {
    if (!canDrag) return;
    const endX = e.changedTouches[0]?.clientX || startX;
    const dx = endX - startX;
    sb.classList.remove('dragging');
    sb.style.transform = '';
    if (dragging) {
      if (!sidebarOpen && dx > 58) setSidebar(true);
      else if (sidebarOpen && dx < -58) setSidebar(false);
      else setSidebar(sidebarOpen);
    }
    canDrag = false;
    dragging = false;
  }, { passive: true });
}

function initPullToRefresh() {
  const main = document.getElementById('mainContent');
  const indicator = document.getElementById('pullRefresh');
  if (!main || !indicator) return;

  let startY = 0;
  let pulling = false;
  let distance = 0;
  const threshold = 76;

  main.addEventListener('touchstart', e => {
    if (main.scrollTop > 0 || e.touches.length !== 1) return;
    startY = e.touches[0].clientY;
    pulling = true;
    distance = 0;
  }, { passive: true });

  main.addEventListener('touchmove', e => {
    if (!pulling || e.touches.length !== 1) return;
    distance = e.touches[0].clientY - startY;
    if (distance <= 0 || main.scrollTop > 0) {
      indicator.classList.remove('visible', 'ready');
      return;
    }
    e.preventDefault();
    const offset = Math.min(distance * .42, 58);
    indicator.style.transform = `translate(-50%,${offset}px)`;
    indicator.textContent = distance >= threshold ? 'Relâche pour actualiser' : 'Tire pour actualiser';
    indicator.classList.toggle('ready', distance >= threshold);
    indicator.classList.add('visible');
  }, { passive: false });

  main.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    const shouldRefresh = distance >= threshold;
    distance = 0;
    if (shouldRefresh) {
      indicator.textContent = 'Actualisation...';
      indicator.classList.add('visible', 'ready');
      refreshApp();
      return;
    }
    indicator.classList.remove('visible', 'ready');
    indicator.style.transform = '';
  }, { passive: true });
}

function getModalRange() {

function goToAdjacentModal(direction) {
  if (!currentPokemon) return;

}

function initModalSwipe() {
  const modal = document.querySelector('#overlay .modal');
  const overlay = document.getElementById('overlay');
  if (!modal || !overlay) return;

  let startX = 0;
  let startY = 0;
  let dragging = false;
  let canSwipe = false;

  modal.addEventListener('touchstart', e => {
    if (!overlay.classList.contains('open') || !currentPokemon || e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dragging = false;
    canSwipe = true;
  }, { passive: true });

  modal.addEventListener('touchmove', e => {
    if (!canSwipe || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!dragging && Math.abs(dx) > 24 && Math.abs(dx) > Math.abs(dy) * 1.35) {
      dragging = true;
    }
    if (dragging) e.preventDefault();
  }, { passive: false });

  modal.addEventListener('touchend', e => {
    if (!canSwipe) return;
    const endX = e.changedTouches[0]?.clientX || startX;
    const endY = e.changedTouches[0]?.clientY || startY;
    const dx = endX - startX;
    const dy = endY - startY;
    canSwipe = false;
    dragging = false;
    if (Math.abs(dx) < 72 || Math.abs(dx) < Math.abs(dy) * 1.35) return;
    goToAdjacentModal(dx < 0 ? 1 : -1);
  }, { passive: true });

  modal.addEventListener('touchcancel', () => {
    canSwipe = false;
    dragging = false;
  }, { passive: true });
}

function refreshApp() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistration().then(registration => {
      if (registration) return registration.update();
    }).finally(() => window.location.reload());
    return;
  }
  window.location.reload();
}

function switchRegion(i) {
  currentRegion = i;
  sessionStorage.setItem(REGION_SESSION_KEY, String(i));
  scrollMainToTop();
  document.getElementById('searchInput').value = '';
  const filterSelect = document.getElementById('filterSelect');
  if (filterSelect) filterSelect.value = 'all';
  renderSidebar();
  renderStats();
  renderRegion();
  if (window.innerWidth <= 720) setSidebar(false);
  requestAnimationFrame(() => {
    scrollMainToTop();
    requestAnimationFrame(scrollMainToTop);
  });
}

function scrollMainToTop() {
  const main = document.getElementById('mainContent');
  if (main) {
    main.scrollTop = 0;
    main.scrollLeft = 0;
    main.scrollTo({ top: 0, left: 0, behavior: 'auto' });
  }
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
  window.scrollTo(0, 0);
}

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
function openModal(id) {
  currentPokemon = id;
  const p    = progress[id] || {};
  const name = NAMES[id] || `#${id}`;
  const r    = REGIONS.find(r => id >= r.start && id <= r.end);

  const normalSprite = document.getElementById('mSprite');
  const shinySprite = document.getElementById('mSpriteShiny');
  normalSprite.onerror = () => handleSpriteError(normalSprite, id, false);
  shinySprite.onerror = () => handleSpriteError(shinySprite, id, true);
  normalSprite.src = getPokemonSpriteUrl(id, false);
  shinySprite.src = getPokemonSpriteUrl(id, true);
  document.getElementById('mNum').textContent = `#${String(id).padStart(4,'0')}`;
  document.getElementById('mName').textContent = name;
  document.getElementById('mRegion').innerHTML = `<span style="color:${r.color};font-family:var(--font)">${r.name} · Génération ${r.gen}</span>`;

  document.getElementById('fCaught').checked   = !!p.caught;
  document.getElementById('fPerfect').checked  = !!p.perfect;
  document.getElementById('fNickname').value   = p.nickname   || '';
  document.getElementById('fEncounters').value = p.encounters || '';
  document.getElementById('fEggs').value       = p.eggs       || '';
  document.getElementById('fDate').value       = p.date       || '';
  document.getElementById('fContext').value    = p.context    || '';
  renderBallChoices(p.ball || '');
  document.getElementById('fYoutube').value    = p.youtube    || '';

  const ivs = p.ivs || {};
  document.getElementById('ivHP').checked  = !!ivs.hp;
  document.getElementById('ivAtk').checked = !!ivs.atk;
  document.getElementById('ivDef').checked = !!ivs.def;
  document.getElementById('ivSpa').checked = !!ivs.spa;
  document.getElementById('ivSpd').checked = !!ivs.spd;
  document.getElementById('ivSpe').checked = !!ivs.spe;

  const btn = document.getElementById('saveBtn');
  btn.style.background   = r.dark;
  btn.style.borderColor  = r.color;
  btn.style.color        = r.color;

  const modal = document.querySelector('#overlay .modal');
  if (modal) modal.scrollTop = 0;
  document.getElementById('overlay').classList.add('open');
  requestAnimationFrame(() => {
    if (modal) modal.scrollTop = 0;
  });
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}
function closeModal() {
  const modal = document.querySelector('#overlay .modal');
  document.getElementById('overlay').classList.remove('open');
  if (modal) modal.scrollTop = 0;
  currentPokemon = null;
}

function saveModal() {
  if (!currentPokemon) return;
  const enc  = parseInt(document.getElementById('fEncounters').value) || 0;
  const eggs = parseInt(document.getElementById('fEggs').value) || 0;
  const entry = {
    caught:    document.getElementById('fCaught').checked,
    perfect:   document.getElementById('fPerfect').checked,
    nickname:  document.getElementById('fNickname').value.trim(),
    encounters: enc,
    eggs:      eggs,
    date:      document.getElementById('fDate').value,
    context:   document.getElementById('fContext').value.trim(),
    ball:      getSelectedBallValue(),
    youtube:   document.getElementById('fYoutube').value.trim(),
    ivs: {
      hp:  document.getElementById('ivHP').checked,
      atk: document.getElementById('ivAtk').checked,
      def: document.getElementById('ivDef').checked,
      spa: document.getElementById('ivSpa').checked,
      spd: document.getElementById('ivSpd').checked,
      spe: document.getElementById('ivSpe').checked,
    }
  };
  // Supprime les entrées vraiment vides
  const isEmpty = !entry.caught && !entry.perfect && !entry.nickname && !enc && !eggs && !entry.date && !entry.context && !entry.ball && !entry.youtube;
  if (isEmpty) {
    delete progress[currentPokemon];
  } else {
    progress[currentPokemon] = entry;
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  closeModal();
  renderAll();
}

/* ══════════════════════════════════════
   IMPORT / EXPORT
   — Exporte au format pokemon.json (tableau)
     pour pouvoir le republier sur GitHub
══════════════════════════════════════ */
function exportJSON() {
  const out = [];
  for (let id = 1; id <= 1025; id++) {
    const p    = progress[id] || {};
    const ivs  = p.ivs || {};
    const ivStr = [
      ivs.hp  ? 'PV'      : '',
      ivs.atk ? 'Atq'     : '',
      ivs.def ? 'Déf'     : '',
      ivs.spa ? 'Atq Spé' : '',
      ivs.spd ? 'Déf Spé' : '',
      ivs.spe ? 'Vitesse' : '',
    ].filter(Boolean).join(' / ');

    // N'inclut que les entrées non vides
    if (!p.caught && !p.perfect && !p.nickname && !p.encounters && !p.eggs && !p.date && !p.context && !p.youtube && !ivStr) continue;

    out.push({
      'N° pokédex':          id,
      'Noms':                NAMES[id] || '',
      'Capturé':             p.caught ? 'oui' : '',
      'Surnoms':             p.nickname   || '',
      'Oeufs parent parfait': p.eggs      || '',
      'Nombre de rencontres': p.encounters || '',
      'Date de capture':     p.date        || '',
      'Ball':                getBallOption(p.ball).label !== 'Aucune' ? getBallOption(p.ball).label : '',
      'Lien YouTube':        p.youtube     || '',
      'Contexte de capture': p.context     || '',
      'IV parfaits':         ivStr,
      'Parfait':             p.perfect ? '✓' : '',
    });
  }
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pokemon.json';
  a.click();
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        // Format tableau pokemon.json
        pokedexData = {};
        data.forEach(p => {
          const id = p['N° pokédex'] || p['id'];
          if (id) pokedexData[id] = p;
        });
        mergePokedexIntoProgress();
      } else {
        // Format objet progress direct
        progress = sanitizeProgress(data);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
      renderAll();
    } catch(err) {
      alert('Fichier JSON invalide ou corrompu.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function lockPortraitOrientation() {
  if (!screen.orientation?.lock) return;
  screen.orientation.lock('portrait-primary').catch(() => {});
}
