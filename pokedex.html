<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shiny Living Dex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0f0f13;
  --surface:  #18181f;
  --surface2: #222230;
  --border:   rgba(255,255,255,0.07);
  --text:     #e8e8f0;
  --muted:    #777788;
  --font-px:  'Pixelify Sans', monospace;
  --font:     'DM Sans', sans-serif;
  --r:        10px;
  --r-lg:     16px;
  --sidebar-w: 220px;
  --header-h:  60px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}

/* scanlines */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9999}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:1rem;padding:0 1.25rem;z-index:100;
}
.logo{font-family:var(--font-px);font-size:20px;white-space:nowrap;letter-spacing:.5px}
.logo em{color:#f5c842;font-style:normal}
.title-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.topbar-stats{display:flex;gap:8px;flex:1;flex-wrap:wrap}
.tstat{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);padding:4px 12px;font-size:12px;color:var(--muted);
  display:flex;align-items:center;gap:6px;
}
.tstat strong{color:var(--text);font-size:14px}
.topbar-btns{display:flex;gap:6px;flex-shrink:0}
.stats-popin{
  position:fixed;top:calc(var(--header-h) + 10px);left:1.25rem;
  width:min(360px,calc(100vw - 2rem));padding:1rem;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);box-shadow:0 18px 48px rgba(0,0,0,.46);
  z-index:180;display:none;
}
.stats-popin.open{display:block}
.stats-popin-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem}
.stats-popin-title{font-family:var(--font-px);font-size:18px;color:#fff}
.stats-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:3px 6px;border-radius:6px}
.stats-close:hover{color:var(--text);background:var(--surface2)}
.stats-grid{display:grid;grid-template-columns:1fr;gap:8px}
.stats-item{display:flex;justify-content:space-between;gap:12px;padding:9px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--muted)}
.stats-item strong{color:var(--text);font-variant-numeric:tabular-nums}

/* ── LAYOUT ── */
.layout{display:flex;margin-top:var(--header-h);height:calc(100vh - var(--header-h))}

/* ── SIDEBAR ── */
.sidebar{
  width:0;overflow:hidden;flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  transition:width .25s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  position:relative;
}
.sidebar.open{width:var(--sidebar-w)}
.sidebar.dragging{transition:none}
.sidebar-backdrop{display:none}
.sidebar-inner{width:var(--sidebar-w);padding:1rem .75rem;overflow-y:auto;height:100%}
.sidebar-title{font-family:var(--font-px);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:.75rem;padding:0 .25rem}
.gen-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:var(--r);border:none;
  background:transparent;color:var(--muted);font-family:var(--font);font-size:13px;
  cursor:pointer;text-align:left;transition:background .12s,color .12s;
  margin-bottom:2px;
}
.gen-btn:hover{background:var(--surface2);color:var(--text)}
.gen-btn.active{background:var(--surface2);color:var(--text)}
.gen-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gen-progress{font-size:11px;margin-left:auto;opacity:.6;font-variant-numeric:tabular-nums}
.gen-bar-wrap{height:3px;background:var(--surface2);border-radius:2px;margin:4px 10px 8px;overflow:hidden}
.gen-bar-fill{height:100%;border-radius:2px;transition:width .4s}

/* toggle button */
.sidebar-toggle{
  position:fixed;left:0;top:50%;transform:translateY(-50%);
  width:20px;height:48px;background:var(--surface);
  border:1px solid var(--border);border-left:none;
  border-radius:0 var(--r) var(--r) 0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  z-index:101;transition:left .25s cubic-bezier(.4,0,.2,1);color:var(--muted);
  font-size:11px;
}
.sidebar-toggle:hover{color:var(--text)}
.sidebar-toggle.open{left:var(--sidebar-w)}
@media (max-width: 720px){
  .topbar{gap:.6rem;padding:0 .75rem}
  .title-actions{gap:6px}
  .topbar-stats{display:none}
  .sidebar{position:fixed;top:var(--header-h);bottom:0;left:0;z-index:150;width:var(--sidebar-w);transform:translateX(calc(-1 * var(--sidebar-w)));box-shadow:12px 0 34px rgba(0,0,0,.38);will-change:transform}
  .sidebar.open{width:var(--sidebar-w);transform:translateX(0)}
  .sidebar-toggle.open{left:var(--sidebar-w)}
  .sidebar-backdrop{position:fixed;top:var(--header-h);left:0;right:0;bottom:0;background:rgba(0,0,0,.42);z-index:140;display:none}
  .sidebar-backdrop.open{display:block}
  .layout{display:block}
  .main{height:calc(100vh - var(--header-h));padding:1rem}
  .btn{padding:6px 9px;font-size:12px}
  .topbar-btns .btn{font-size:0;gap:0}
  .topbar-btns .btn svg{margin:0}
  .stats-popin{left:.75rem;top:calc(var(--header-h) + 8px)}
}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:1.5rem}

/* region header */
.region-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}
.region-name{font-family:var(--font-px);font-size:24px}
.region-meta{font-size:12px;color:var(--muted);margin-top:3px}
.progress-wrap{flex:1;min-width:140px}
.progress-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.progress-label{font-size:12px;color:var(--muted)}

/* filters */
.filters{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.filters input,.filters select{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);color:var(--text);
  font-family:var(--font);font-size:13px;padding:7px 12px;outline:none;
  transition:border-color .15s;
}
.filters input{width:200px}
.filters input:focus,.filters select:focus{border-color:rgba(255,255,255,.2)}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(96px,1fr));
  gap:8px;
}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:8px 4px 7px;
  text-align:center;cursor:pointer;position:relative;overflow:hidden;
  transition:transform .12s,border-color .15s,box-shadow .15s;
  display:flex;flex-direction:column;align-items:center;gap:0;
}
.card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.18);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.card.caught{background:#0c1f0a;border-color:#2d6620}
.card.caught:hover{border-color:#4a9e30}
.card.perfect{border-color:#f5c842;box-shadow:0 0 0 1px rgba(245,200,66,.55),0 0 14px rgba(245,200,66,.28)}
.card.perfect:hover{border-color:#ffd95c;box-shadow:0 6px 20px rgba(0,0,0,.4),0 0 0 1px rgba(245,200,66,.7),0 0 18px rgba(245,200,66,.36)}
.card img{width:64px;height:64px;image-rendering:pixelated;display:block}
.card .num{font-family:var(--font-px);font-size:10px;color:var(--muted);margin-bottom:2px}
.card .pname{font-size:11px;font-weight:500;line-height:1.25;color:var(--text);word-break:break-word;padding:0 4px}
.card.caught .pname{color:#7ed660}
.card .status{
  margin-top:5px;font-size:10px;padding:2px 7px;border-radius:20px;
  font-weight:500;letter-spacing:.3px;
}
.card.caught .status{background:rgba(90,184,48,.18);color:#7ed660}
.card:not(.caught) .status{background:var(--surface2);color:var(--muted)}
.card .status-perfect{color:#f5c842}
.card-info{width:100%;margin-top:6px;padding:0 4px;display:flex;flex-direction:column;gap:2px;font-size:9px;line-height:1.2;color:var(--muted)}
.card-info div{display:flex;justify-content:space-between;gap:4px;min-width:0}
.card-info span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-info strong{color:var(--text);font-weight:600;font-variant-numeric:tabular-nums;text-align:right}
.empty{color:var(--muted);font-size:14px;padding:4rem 0;text-align:center;grid-column:1/-1}

/* ── BUTTONS ── */
.btn{
  font-family:var(--font);font-size:13px;font-weight:500;
  padding:6px 13px;border-radius:var(--r);
  border:1px solid var(--border);cursor:pointer;
  background:var(--surface2);color:var(--text);
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  transition:background .12s,border-color .12s;
}
.btn:hover{background:#2a2a3a;border-color:rgba(255,255,255,.15)}
.btn svg{width:14px;height:14px;flex-shrink:0}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);
  display:none;align-items:center;justify-content:center;
  z-index:200;padding:1rem;
}
.overlay.open{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);width:500px;max-width:100%;
  max-height:90vh;overflow-y:auto;padding:1.75rem;position:relative;
}
.modal-close{
  position:absolute;top:1rem;right:1rem;
  background:none;border:none;color:var(--muted);
  cursor:pointer;font-size:20px;line-height:1;padding:4px;
  border-radius:6px;transition:color .12s;
}
.modal-close:hover{color:var(--text)}
.modal-hero{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.modal-sprite{
  width:88px;height:88px;image-rendering:pixelated;
  background:var(--surface2);border-radius:var(--r);flex-shrink:0;
}
.modal-sprite-shiny{
  width:88px;height:88px;image-rendering:pixelated;
  background:var(--surface2);border-radius:var(--r);flex-shrink:0;
  position:relative;
}
.sprite-pair{display:flex;gap:8px}
.sprite-label{font-size:10px;color:var(--muted);text-align:center;margin-top:3px}
.modal-num{font-family:var(--font-px);font-size:12px;color:var(--muted)}
.modal-name{font-family:var(--font-px);font-size:22px;color:#fff}
.modal-region{font-size:12px;margin-top:4px}
.caught-toggle{
  display:flex;align-items:center;gap:10px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);padding:10px 14px;cursor:pointer;
  transition:border-color .15s,background .15s;margin-bottom:1.25rem;
}
.caught-toggle:has(input:checked){border-color:#f5c842;background:#1a1400}
.caught-toggle input{width:16px;height:16px;cursor:pointer;accent-color:#f5c842}
.caught-toggle span{font-size:14px;font-weight:500}
.caught-toggle:has(input:checked) span{color:#f5c842}
.shiny-perfect{
  display:flex;align-items:center;gap:10px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);padding:10px 14px;cursor:pointer;
  transition:border-color .15s,background .15s;margin-bottom:1.25rem;
}
.shiny-perfect:has(input:checked){border-color:#c084fc;background:#120a1f}
.shiny-perfect input{width:16px;height:16px;cursor:pointer;accent-color:#c084fc}
.shiny-perfect span{font-size:14px;font-weight:500}
.shiny-perfect:has(input:checked) span{color:#c084fc}
hr.div{border:none;border-top:1px solid var(--border);margin:1.1rem 0}
.form-row{margin-bottom:1rem}
.form-row label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-row input[type=text],.form-row input[type=date],.form-row input[type=url],.form-row textarea{
  width:100%;padding:8px 12px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);color:var(--text);
  font-family:var(--font);font-size:13px;outline:none;
  transition:border-color .15s;
}
.form-row input:focus,.form-row textarea:focus{border-color:rgba(255,255,255,.22)}
.form-row textarea{resize:vertical;min-height:60px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.iv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.iv-item{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);padding:7px 10px;
  font-size:13px;cursor:pointer;transition:border-color .15s,background .15s;
}
.iv-item:has(input:checked){border-color:#3a7d2a;background:#0d2010;color:#7ed660}
.iv-item input{width:14px;height:14px;cursor:pointer;accent-color:#5ab840}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem}
.btn-save{
  font-family:var(--font);font-size:13px;font-weight:600;
  padding:8px 20px;border-radius:var(--r);border:1px solid;
  cursor:pointer;transition:opacity .15s;
}
.btn-save:hover{opacity:.85}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="title-actions">
    <div class="logo">&#10022; Shiny <em>Living Dex</em></div>
    <button class="btn" id="statsButton" onclick="toggleStatsPopin()">Statistiques</button>
  </div>
  <div class="topbar-stats" id="statsBar"></div>
  <div class="topbar-btns">
    <label class="btn" title="Importer pokemon.json">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Importer JSON
      <input type="file" accept=".json" style="display:none" onchange="importJSON(event)">
    </label>
    <button class="btn" onclick="exportJSON()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exporter JSON
    </button>
  </div>
</div>

<div class="stats-popin" id="statsPopin" role="dialog" aria-labelledby="statsPopinTitle">
  <div class="stats-popin-head">
    <div class="stats-popin-title" id="statsPopinTitle">Statistiques</div>
    <button class="stats-close" onclick="closeStatsPopin()" aria-label="Fermer">&times;</button>
  </div>
  <div class="stats-grid" id="statsPopinContent"></div>
</div>

<!-- SIDEBAR TOGGLE -->
<button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Générations" aria-label="Ouvrir/fermer le menu">&#9654;</button>

<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="setSidebar(false)"></div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-title">Générations</div>
      <div id="genList"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainContent">
    <div class="region-header" id="regionHeader"></div>
    <div class="filters">
      <input type="text" id="searchInput" placeholder="🔍  Rechercher..." oninput="renderGrid()">
      <select id="filterSelect" onchange="renderGrid()">
        <option value="all">Tous</option>
        <option value="caught">Shinys trouvés</option>
        <option value="missing">Manquants</option>
        <option value="perfect">Shiny parfait</option>
      </select>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-hero">
      <div>
        <div class="sprite-pair">
          <div>
            <img class="modal-sprite" id="mSprite" src="" alt="">
            <div class="sprite-label">Normal</div>
          </div>
          <div>
            <img class="modal-sprite-shiny" id="mSpriteShiny" src="" alt="">
            <div class="sprite-label">✦ Shiny</div>
          </div>
        </div>
      </div>
      <div>
        <div class="modal-num" id="mNum"></div>
        <div class="modal-name" id="mName"></div>
        <div class="modal-region" id="mRegion"></div>
      </div>
    </div>

    <label class="caught-toggle">
      <input type="checkbox" id="fCaught">
      <span>✦ Shiny capturé !</span>
    </label>
    <label class="shiny-perfect">
      <input type="checkbox" id="fPerfect">
      <span>⬡ Shiny parfait (6IV)</span>
    </label>

    <div class="form-row">
      <label>Surnom</label>
      <input type="text" id="fNickname" placeholder="Aucun surnom">
    </div>
    <div class="two-col">
      <div class="form-row">
        <label>Nombre de rencontres</label>
        <input type="text" id="fEncounters" placeholder="ex: 849">
      </div>
      <div class="form-row">
        <label>Œufs parent parfait</label>
        <input type="text" id="fEggs" placeholder="ex: 140">
      </div>
    </div>
    <div class="form-row">
      <label>Date de capture</label>
      <input type="date" id="fDate">
    </div>
    <div class="form-row">
      <label>Contexte de capture</label>
      <input type="text" id="fContext" placeholder="ex: Stream Bruce">
    </div>
    <div class="form-row">
      <label>Lien YouTube</label>
      <input type="url" id="fYoutube" placeholder="https://youtu.be/...">
    </div>

    <hr class="div">
    <div class="form-row">
      <label>IVs parfaits</label>
      <div class="iv-grid">
        <label class="iv-item"><input type="checkbox" id="ivHP"> PV</label>
        <label class="iv-item"><input type="checkbox" id="ivAtk"> Atq</label>
        <label class="iv-item"><input type="checkbox" id="ivDef"> Déf</label>
        <label class="iv-item"><input type="checkbox" id="ivSpa"> Atq Spé</label>
        <label class="iv-item"><input type="checkbox" id="ivSpd"> Déf Spé</label>
        <label class="iv-item"><input type="checkbox" id="ivSpe"> Vitesse</label>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn-save" id="saveBtn" onclick="saveModal()">✦ Sauvegarder</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   DONNÉES STATIQUES
══════════════════════════════════════ */
const REGIONS = [
  {name:"Kanto",   gen:1, start:1,   end:151,  color:"#e05252", dark:"#3d1010"},
  {name:"Johto",   gen:2, start:152,  end:251,  color:"#e8a020", dark:"#3a2800"},
  {name:"Hoenn",   gen:3, start:252,  end:386,  color:"#2db87a", dark:"#0a2d1a"},
  {name:"Sinnoh",  gen:4, start:387,  end:493,  color:"#4a9de0", dark:"#0d2440"},
  {name:"Unys",    gen:5, start:494,  end:649,  color:"#9090a0", dark:"#1e1e28"},
  {name:"Kalos",   gen:6, start:650,  end:721,  color:"#8060e0", dark:"#1e103a"},
  {name:"Alola",   gen:7, start:722,  end:809,  color:"#e07830", dark:"#3a1800"},
  {name:"Galar",   gen:8, start:810,  end:905,  color:"#c040a0", dark:"#320028"},

// pokedexData = données du pokemon.json publié (indexé par N° pokédex)
let pokedexData = {};
// progress = données éditables locales (même structure que pokemon.json + ivs détaillés)
let progress = {};
let currentRegion = 0;
let currentPokemon = null;
let sidebarOpen = false;
const STORAGE_KEY = 'shiny_dex_v3';

/* ══════════════════════════════════════
   INIT — charge pokemon.json depuis GitHub Pages
══════════════════════════════════════ */
function init() {
  // Charge la progression locale depuis le localStorage
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) progress = JSON.parse(raw);
  } catch(e) { progress = {}; }

  // Affichage initial avec les données locales déjà disponibles
  renderAll();
}

// Au chargement de la page, on tente de récupérer le fichier pokemon.json
document.addEventListener('DOMContentLoaded', () => {
  fetch('pokemon.json')
    .then(response => {
      if (!response.ok) {
        throw new Error("Le fichier pokemon.json n'a pas pu être chargé automatiquement.");
      }
      return response.json();
    })
    .then(data => {
      if (Array.isArray(data)) {
        pokedexData = {};
        data.forEach(p => {
          const id = p['N° pokédex'] || p['id'];
          if (id) pokedexData[id] = p;
        });

        // On fusionne avec la progression (appelle la fonction déjà existante dans ton code)
        mergePokedexIntoProgress();

        // On rafraîchit l'affichage de la grille
        if (typeof renderGrid === 'function') renderGrid();
        console.log("Données Pokémon chargées avec succès depuis le serveur !");
      }
    })
    .catch(error => {
      console.warn("Chargement auto désactivé ou impossible (normal en local sans serveur) :", error.message);
    });
});

// Fusionne les champs du pokemon.json dans progress (sans écraser ce qui existe déjà)
function mergePokedexIntoProgress() {
  Object.entries(pokedexData).forEach(([id, p]) => {
    const numId = parseInt(id);
    if (!progress[numId]) progress[numId] = {};
    const existing = progress[numId];
    // Champs venant du JSON public (ne remplace que si vide)
    if (!existing.nickname   && p['Surnoms'])             existing.nickname   = p['Surnoms'];
    if (!existing.encounters && p['Nombre de rencontres'])existing.encounters = parseInt(p['Nombre de rencontres']) || 0;
    if (!existing.eggs       && p['Oeufs parent parfait'])existing.eggs       = parseInt(p['Oeufs parent parfait']) || 0;
    if (!existing.date       && p['Date de capture'])     existing.date       = p['Date de capture'];
    if (!existing.context    && p['Contexte de capture']) existing.context    = p['Contexte de capture'];
    if (!existing.youtube    && p['Lien YouTube'])        existing.youtube    = p['Lien YouTube'];
    // Statuts
    if (p['Noms'] && p['Noms'] !== '') existing.caught = true;
    if (p['Parfait'] === true || p['Parfait'] === 'true' || p['Parfait'] === '✓') existing.perfect = true;
    // IVs depuis la chaîne "PV/Atq/Déf/..." ou objet
    if (!existing.ivs && p['IV parfaits']) existing.ivs = parseIVs(p['IV parfaits']);
  });
}

function parseIVs(raw) {
  if (!raw || raw === '') return {hp:false,atk:false,def:false,spa:false,spd:false,spe:false};
  if (typeof raw === 'object') return raw;
  // Chaîne type "PV / Atq / Vitesse"
  const s = raw.toLowerCase();
  return {
    hp:  s.includes('pv') || s.includes('hp'),
    atk: s.includes('atq') || s.includes('atk'),
    def: s.includes('déf') || s.includes('def'),
    spa: s.includes('atq spé') || s.includes('spa') || s.includes('spé'),
    spd: s.includes('déf spé') || s.includes('spd'),
    spe: s.includes('vitesse') || s.includes('spe') || s.includes('speed'),
  };
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function renderAll() {
  renderStats();
  renderSidebar();
  renderRegion();
}

function renderStats() {
  const stats = getGlobalStats();
  document.getElementById('statsBar').innerHTML = `
    <div class="tstat"><strong style="color:#7ed660">${stats.caught}/1025</strong> Shinys</div>
    <div class="tstat"><strong style="color:#c084fc">${stats.perfect}</strong> Parfaits</div>
    <div class="tstat"><strong>${stats.totalEncountersText}</strong> Rencontres</div>
    <div class="tstat"><strong>${stats.avgEncountersText}</strong> Moy.</div>
  `;
  document.getElementById('statsPopinContent').innerHTML = `
    <div class="stats-item"><span>Moyenne de rencontres</span><strong>${stats.avgEncountersText}</strong></div>
    <div class="stats-item"><span>Total de rencontres</span><strong>${stats.totalEncountersText}</strong></div>
    <div class="stats-item"><span>Moyenne d'oeufs parent</span><strong>${stats.avgEggsText}</strong></div>
    <div class="stats-item"><span>Total oeufs parent</span><strong>${stats.totalEggsText}</strong></div>
    <div class="stats-item"><span>Pourcentage total de Shiny captur&eacute;s</span><strong>${stats.caughtPercentText}</strong></div>
  `;
}

function getGlobalStats() {
  const entries = Object.values(progress);
  const caught = entries.filter(p => p.caught).length;
  const perfect = entries.filter(p => p.perfect).length;
  const totalEncounters = entries.reduce((a,p) => a + (parseInt(p.encounters) || 0), 0);
  const totalEggs = entries.reduce((a,p) => a + (parseInt(p.eggs) || 0), 0);
  const avgEncounters = caught > 0 ? Math.round(totalEncounters / caught) : 0;
  const avgEggs = caught > 0 ? Math.round(totalEggs / caught) : 0;
  const caughtPercent = Math.round((caught / 1025) * 1000) / 10;
  return {
    caught,
    perfect,
    totalEncountersText: totalEncounters.toLocaleString('fr-FR'),
    avgEncountersText: avgEncounters.toLocaleString('fr-FR'),
    totalEggsText: totalEggs.toLocaleString('fr-FR'),
    avgEggsText: avgEggs.toLocaleString('fr-FR'),
    caughtPercentText: `${caughtPercent.toLocaleString('fr-FR')}%`,
  };
}

function toggleStatsPopin() {
  document.getElementById('statsPopin').classList.toggle('open');
}

function closeStatsPopin() {
  document.getElementById('statsPopin').classList.remove('open');
}

function countCaught(r) {
  let c = 0;
  for (let i = r.start; i <= r.end; i++) if (progress[i]?.caught) c++;
  return c;
}

function renderSidebar() {
  const list = document.getElementById('genList');
  list.innerHTML = REGIONS.map((r, i) => {
    const c     = countCaught(r);
    const total = r.end - r.start + 1;
    const pct   = Math.round(c / total * 100);
    const active = i === currentRegion ? 'active' : '';
    return `
      <button class="gen-btn ${active}" onclick="switchRegion(${i})">
        <span class="gen-dot" style="background:${r.color}"></span>
        <span>${r.name}</span>
        <span class="gen-progress">${c}/${total}</span>
      </button>
      <div class="gen-bar-wrap">
        <div class="gen-bar-fill" style="width:${pct}%;background:${r.color}"></div>
      </div>`;
  }).join('');
}

function renderRegion() {
  const r      = REGIONS[currentRegion];
  const caught = countCaught(r);
  const total  = r.end - r.start + 1;
  const pct    = Math.round(caught / total * 100);

  document.getElementById('regionHeader').innerHTML = `
    <div>
      <div class="region-name" style="color:${r.color}">${r.name}</div>
      <div class="region-meta">Génération ${r.gen} · #${r.start}–#${r.end}</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%;background:${r.color}"></div>
      </div>
      <div class="progress-label">${caught} / ${total} shinys capturés (${pct}%)</div>
    </div>`;

  renderGrid();
}

function renderGrid() {
  const r      = REGIONS[currentRegion];
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filter = document.getElementById('filterSelect').value;
  const grid   = document.getElementById('grid');
  grid.innerHTML = '';
  let count = 0;

  for (let id = r.start; id <= r.end; id++) {
    const name = NAMES[id] || `#${id}`;
    const p    = progress[id] || {};
    if (search && !name.toLowerCase().includes(search) && !String(id).includes(search)) continue;
    if (filter === 'caught'  && !p.caught)  continue;
    if (filter === 'missing' && p.caught)   continue;
    if (filter === 'perfect' && !p.perfect) continue;
    count++;

    const card = document.createElement('div');
    card.className = 'card' + (p.caught ? ' caught' : '') + (p.perfect ? ' perfect' : '');
    card.onclick = () => openModal(id);

    const spriteUrl = p.caught
      ? `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${id}.png`
      : `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
    const statusTxt = p.caught
      ? (p.perfect ? 'Shiny <span class="status-perfect">Parfait</span>' : 'Shiny')
      : '-';
    const cardInfo = [
      p.eggs ? ['Oeufs', p.eggs] : null,
      p.encounters ? ['Rencontres', p.encounters] : null,
      p.date ? ['Date', p.date] : null,
    ].filter(Boolean).map(([label, value]) =>
      `<div><span>${label}</span><strong>${value}</strong></div>`
    ).join('');

    card.innerHTML = `
      <div class="num">#${String(id).padStart(4,'0')}</div>
      <img src="${spriteUrl}"
           alt="${name}" loading="lazy" width="64" height="64">
      <div class="pname">${name}</div>
      <div class="status">${statusTxt}</div>
      ${cardInfo ? `<div class="card-info">${cardInfo}</div>` : ''}`;
    grid.appendChild(card);
  }

  if (count === 0) {
    grid.innerHTML = '<div class="empty">Aucun Pokémon trouvé.</div>';
  }
}

/* ══════════════════════════════════════
   SIDEBAR TOGGLE
══════════════════════════════════════ */
function toggleSidebar() {
  setSidebar(!sidebarOpen);
}

function setSidebar(open) {
  sidebarOpen = open;
  const sb  = document.getElementById('sidebar');
  const tog = document.getElementById('sidebarToggle');
  const backdrop = document.getElementById('sidebarBackdrop');
  sb.classList.toggle('open', sidebarOpen);
  tog.classList.toggle('open', sidebarOpen);
  backdrop.classList.toggle('open', sidebarOpen);
  tog.innerHTML = sidebarOpen ? '&#9664;' : '&#9654;';
  sb.style.transform = '';
}

function initSidebarSwipe() {
  const sb = document.getElementById('sidebar');
  const maxWidth = () => parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w'), 10) || 220;
  let startX = 0;
  let startY = 0;
  let dragging = false;
  let canDrag = false;

  document.addEventListener('touchstart', e => {
    if (window.innerWidth > 720 || e.touches.length !== 1) return;
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    canDrag = sidebarOpen || x < 28;
    if (!canDrag) return;
    startX = x;
    startY = y;
    dragging = false;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!canDrag || window.innerWidth > 720 || e.touches.length !== 1) return;
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    const dx = x - startX;
    if (!dragging && Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(y - startY)) {
      dragging = true;
      sb.classList.add('dragging');
    }
    if (!dragging) return;
    e.preventDefault();
    const w = maxWidth();
    const offset = sidebarOpen ? Math.min(0, dx) : Math.min(0, -w + Math.max(0, dx));
    sb.style.transform = `translateX(${offset}px)`;
  }, { passive: false });

  document.addEventListener('touchend', e => {
    if (!canDrag) return;
    const endX = e.changedTouches[0]?.clientX || startX;
    const dx = endX - startX;
    sb.classList.remove('dragging');
    sb.style.transform = '';
    if (dragging) {
      if (!sidebarOpen && dx > 58) setSidebar(true);
      else if (sidebarOpen && dx < -58) setSidebar(false);
      else setSidebar(sidebarOpen);
    }
    canDrag = false;
    dragging = false;
  }, { passive: true });
}

function switchRegion(i) {
  currentRegion = i;
  document.getElementById('searchInput').value = '';
  document.getElementById('filterSelect').value = 'all';
  renderSidebar();
  renderRegion();
  if (window.innerWidth <= 720) setSidebar(false);
}

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
function openModal(id) {
  currentPokemon = id;
  const p    = progress[id] || {};
  const name = NAMES[id] || `#${id}`;
  const r    = REGIONS.find(r => id >= r.start && id <= r.end);

  document.getElementById('mSprite').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
  document.getElementById('mSpriteShiny').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${id}.png`;
  document.getElementById('mNum').textContent = `#${String(id).padStart(4,'0')}`;
  document.getElementById('mName').textContent = name;
  document.getElementById('mRegion').innerHTML = `<span style="color:${r.color};font-family:'Pixelify Sans',monospace">${r.name} · Génération ${r.gen}</span>`;

  document.getElementById('fCaught').checked   = !!p.caught;
  document.getElementById('fPerfect').checked  = !!p.perfect;
  document.getElementById('fNickname').value   = p.nickname   || '';
  document.getElementById('fEncounters').value = p.encounters || '';
  document.getElementById('fEggs').value       = p.eggs       || '';
  document.getElementById('fDate').value       = p.date       || '';
  document.getElementById('fContext').value    = p.context    || '';
  document.getElementById('fYoutube').value    = p.youtube    || '';

  const ivs = p.ivs || {};
  document.getElementById('ivHP').checked  = !!ivs.hp;
  document.getElementById('ivAtk').checked = !!ivs.atk;
  document.getElementById('ivDef').checked = !!ivs.def;
  document.getElementById('ivSpa').checked = !!ivs.spa;
  document.getElementById('ivSpd').checked = !!ivs.spd;
  document.getElementById('ivSpe').checked = !!ivs.spe;

  const btn = document.getElementById('saveBtn');
  btn.style.background   = r.dark;
  btn.style.borderColor  = r.color;
  btn.style.color        = r.color;

  document.getElementById('overlay').classList.add('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  currentPokemon = null;
}

function saveModal() {
  if (!currentPokemon) return;
  const enc  = parseInt(document.getElementById('fEncounters').value) || 0;
  const eggs = parseInt(document.getElementById('fEggs').value) || 0;
  const entry = {
    caught:    document.getElementById('fCaught').checked,
    perfect:   document.getElementById('fPerfect').checked,
    nickname:  document.getElementById('fNickname').value.trim(),
    encounters: enc,
    eggs:      eggs,
    date:      document.getElementById('fDate').value,
    context:   document.getElementById('fContext').value.trim(),
    youtube:   document.getElementById('fYoutube').value.trim(),
    ivs: {
      hp:  document.getElementById('ivHP').checked,
      atk: document.getElementById('ivAtk').checked,
      def: document.getElementById('ivDef').checked,
      spa: document.getElementById('ivSpa').checked,
      spd: document.getElementById('ivSpd').checked,
      spe: document.getElementById('ivSpe').checked,
    }
  };
  // Supprime les entrées vraiment vides
  const isEmpty = !entry.caught && !entry.perfect && !entry.nickname && !enc && !eggs && !entry.date && !entry.context && !entry.youtube;
  if (isEmpty) {
    delete progress[currentPokemon];
  } else {
    progress[currentPokemon] = entry;
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  closeModal();
  renderAll();
}

/* ══════════════════════════════════════
   IMPORT / EXPORT
   — Exporte au format pokemon.json (tableau)
     pour pouvoir le republier sur GitHub
══════════════════════════════════════ */
function exportJSON() {
  const out = [];
  for (let id = 1; id <= 1025; id++) {
    const p    = progress[id] || {};
    const ivs  = p.ivs || {};
    const ivStr = [
      ivs.hp  ? 'PV'      : '',
      ivs.atk ? 'Atq'     : '',
      ivs.def ? 'Déf'     : '',
      ivs.spa ? 'Atq Spé' : '',
      ivs.spd ? 'Déf Spé' : '',
      ivs.spe ? 'Vitesse' : '',
    ].filter(Boolean).join(' / ');

    // N'inclut que les entrées non vides
    if (!p.caught && !p.nickname && !p.encounters && !p.date) continue;

    out.push({
      'N° pokédex':          id,
      'Noms':                NAMES[id] || '',
      'Surnoms':             p.nickname   || '',
      'Oeufs parent parfait': p.eggs      || '',
      'Nombre de rencontres': p.encounters || '',
      'Date de capture':     p.date        || '',
      'Lien YouTube':        p.youtube     || '',
      'Contexte de capture': p.context     || '',
      'IV parfaits':         ivStr,
      'Parfait':             p.perfect ? '✓' : '',
    });
  }
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pokemon.json';
  a.click();
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        // Format tableau pokemon.json
        pokedexData = {};
        data.forEach(p => {
          const id = p['N° pokédex'] || p['id'];
          if (id) pokedexData[id] = p;
        });
        mergePokedexIntoProgress();
      } else {
        // Format objet progress direct
        progress = data;
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
      renderAll();
    } catch(err) {
      alert('Fichier JSON invalide ou corrompu.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ══ START ══ */
init();
initSidebarSwipe();
</script>
